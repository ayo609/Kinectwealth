<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kinetic Wealth - Create Account</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* Animated Background */
        .bg-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
        }
        .blur-1 { background: #0052CC; top: -100px; right: -100px; animation: float1 15s infinite alternate; }
        .blur-2 { background: #00E5A0; bottom: -100px; left: -100px; animation: float2 18s infinite alternate; }
        @keyframes float1 { 0% { transform: translate(0,0); } 100% { transform: translate(50px, 30px); } }
        @keyframes float2 { 0% { transform: translate(0,0); } 100% { transform: translate(-40px, -40px); } }
        
        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Header */
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #0052CC, #00E5A0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0,82,204,0.4);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 6px;
        }
        
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }
        
        /* Welcome Bonus Banner */
        .bonus-banner {
            background: linear-gradient(135deg, rgba(0,82,204,0.12), rgba(0,229,160,0.08));
            border: 1px solid rgba(0,82,204,0.3);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            animation: borderPulse 2s infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0,82,204,0.3); }
            50% { border-color: rgba(0,82,204,0.8); box-shadow: 0 0 15px rgba(0,82,204,0.15); }
        }
        
        .bonus-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #0052CC, #00E5A0);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .bonus-content {
            flex: 1;
        }
        
        .bonus-title {
            font-weight: 700;
            color: #0052CC;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .bonus-text {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .bonus-text strong {
            color: #00E5A0;
        }
        
        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .label-hint {
            color: #64748b;
            font-weight: 400;
            font-size: 11px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #0052CC;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #0052CC;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 0 3px rgba(0,82,204,0.1);
        }
        
        input.error {
            border-color: #ef4444;
        }
        
        input.success {
            border-color: #00E5A0;
        }
        
        .input-feedback {
            font-size: 11px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 4px;
        }
        
        .input-feedback.show {
            display: flex;
        }
        
        .input-feedback.error {
            color: #ef4444;
        }
        
        .input-feedback.success {
            color: #00E5A0;
        }
        
        .input-feedback.checking {
            color: #f59e0b;
        }
        
        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(148,163,184,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 10px;
        }
        
        .strength-weak {
            background: #ef4444;
            width: 33%;
        }
        
        .strength-medium {
            background: #f59e0b;
            width: 66%;
        }
        
        .strength-strong {
            background: #00E5A0;
            width: 100%;
        }
        
        /* Terms */
        .terms-wrapper {
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        .terms-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin: 0;
        }
        
        .terms-label input {
            width: 18px;
            height: 18px;
            accent-color: #0052CC;
        }
        
        .terms-label span {
            color: #cbd5e1;
            font-size: 12px;
        }
        
        .terms-link {
            color: #0052CC;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0052CC, #003D99);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,82,204,0.5);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Login Link */
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
            font-size: 13px;
        }
        
        .login-link a {
            color: #0052CC;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            color: #00E5A0;
        }
        
        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-left: 4px solid #0052CC;
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @media (max-width: 550px) {
            .glass-card { padding: 24px; }
            h1 { font-size: 24px; }
            .logo-icon { width: 55px; height: 55px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <div class="glass-card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Start your investment journey today</p>
        </div>

        <!-- Welcome Bonus Banner -->
        <div class="bonus-banner">
            <div class="bonus-icon">
                <i class="fas fa-gift"></i>
            </div>
            <div class="bonus-content">
                <div class="bonus-title">🎁 ₦1,000 Welcome Bonus!</div>
                <div class="bonus-text">Create your account and get <strong>₦1,000</strong> credited instantly. No deposit needed!</div>
            </div>
        </div>

        <form id="registerForm">
            <!-- Full Name -->
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
            </div>

            <!-- Username (Referral Code) -->
            <div class="form-group">
                <label>Username <span class="label-hint">(this is your referral code)</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-at input-icon"></i>
                    <input type="text" id="username" placeholder="e.g., johnwealth" autocomplete="off">
                </div>
                <div class="input-feedback" id="usernameFeedback"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" id="phone" placeholder="08012345678" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>

            <!-- Referral Code (Optional) -->
            <div class="form-group">
                <label>Referral Code <span class="label-hint">(optional - enter referrer's username)</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-link input-icon"></i>
                    <input type="text" id="referralCode" placeholder="Enter referrer's username" autocomplete="off">
                </div>
                <div class="input-feedback" id="referralFeedback"></div>
            </div>

            <!-- Terms -->
            <div class="terms-wrapper">
                <label class="terms-label">
                    <input type="checkbox" id="termsCheckbox">
                    <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-gift"></i> Create Account & Claim ₦1,000
            </button>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
            authDomain: "kinetic-dc8e6.firebaseapp.com",
            projectId: "kinetic-dc8e6",
            storageBucket: "kinetic-dc8e6.firebasestorage.app",
            messagingSenderId: "980527555815",
            appId: "1:980527555815:web:131ccee594e0c8f122ee42"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Constants
        const WELCOME_BONUS = 1000;
        let checkTimeout;

        // Get referral code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');
        if (refFromUrl) {
            document.getElementById('referralCode').value = refFromUrl;
        }

        // Helper function to show toast notification
        function showToast(title, message, type = 'success') {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#0052CC';
            
            let icon = type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-info-circle' : 'fa-check-circle';
            let iconColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#00E5A0';
            
            toast.innerHTML = `
                <i class="fas ${icon}" style="color: ${iconColor}; font-size: 20px;"></i>
                <div>
                    <div style="font-weight: 600; font-size: 13px;">${title}</div>
                    <div style="font-size: 11px; color: #94a3b8;">${message}</div>
                </div>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
            }, 5000);
        }

        // Find user by username
        async function findUserByUsername(username) {
            const q = await db.collection('users').where('username', '==', username.toLowerCase()).get();
            return q.empty ? null : { id: q.docs[0].id, ...q.docs[0].data() };
        }

        // Check username availability
        async function checkUsername(username) {
            if (username.length < 3) return null;
            if (!/^[a-z0-9_]+$/.test(username)) return 'invalid';
            const exists = await findUserByUsername(username);
            return exists ? 'taken' : 'available';
        }

        // Username live validation
        document.getElementById('username').addEventListener('input', async (e) => {
            const username = e.target.value.toLowerCase().trim();
            const feedback = document.getElementById('usernameFeedback');
            clearTimeout(checkTimeout);
            
            if (username.length < 3) {
                feedback.className = 'input-feedback';
                e.target.classList.remove('success', 'error');
                return;
            }
            
            if (!/^[a-z0-9_]+$/.test(username)) {
                feedback.innerHTML = '<i class="fas fa-times-circle"></i> Only letters, numbers, and underscore allowed';
                feedback.className = 'input-feedback show error';
                e.target.classList.add('error');
                e.target.classList.remove('success');
                return;
            }
            
            feedback.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking availability...';
            feedback.className = 'input-feedback show checking';
            
            checkTimeout = setTimeout(async () => {
                const result = await checkUsername(username);
                if (result === 'taken') {
                    feedback.innerHTML = '<i class="fas fa-times-circle"></i> Username already taken';
                    feedback.className = 'input-feedback show error';
                    e.target.classList.add('error');
                    e.target.classList.remove('success');
                } else if (result === 'available') {
                    feedback.innerHTML = '<i class="fas fa-check-circle"></i> Available! This is your referral code.';
                    feedback.className = 'input-feedback show success';
                    e.target.classList.add('success');
                    e.target.classList.remove('error');
                }
            }, 500);
        });

        // Check referral code validity
        document.getElementById('referralCode').addEventListener('input', async (e) => {
            const code = e.target.value.toLowerCase().trim();
            const feedback = document.getElementById('referralFeedback');
            clearTimeout(checkTimeout);
            
            if (!code || code.length < 3) {
                feedback.className = 'input-feedback';
                e.target.classList.remove('success', 'error');
                return;
            }
            
            feedback.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            feedback.className = 'input-feedback show checking';
            
            checkTimeout = setTimeout(async () => {
                const user = await findUserByUsername(code);
                if (user) {
                    feedback.innerHTML = `<i class="fas fa-check-circle"></i> Verified! Referred by ${user.fullName || user.username}`;
                    feedback.className = 'input-feedback show success';
                    e.target.classList.add('success');
                    e.target.classList.remove('error');
                } else {
                    feedback.innerHTML = '<i class="fas fa-times-circle"></i> Invalid referral code';
                    feedback.className = 'input-feedback show error';
                    e.target.classList.add('error');
                    e.target.classList.remove('success');
                }
            }, 500);
        });

        // Password strength checker
        document.getElementById('password').addEventListener('input', (e) => {
            const pw = e.target.value;
            const bar = document.getElementById('strengthBar');
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (pw.match(/[a-z]/) && pw.match(/[A-Z]/)) strength++;
            if (pw.match(/[0-9]/)) strength++;
            if (pw.match(/[^a-zA-Z0-9]/)) strength++;
            
            bar.className = 'strength-bar';
            if (strength <= 1) bar.classList.add('strength-weak');
            else if (strength <= 2) bar.classList.add('strength-medium');
            else bar.classList.add('strength-strong');
        });

        // Password match validation
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            const confirm = e.target.value;
            if (confirm.length > 0) {
                if (password === confirm) {
                    e.target.classList.add('success');
                    e.target.classList.remove('error');
                } else {
                    e.target.classList.add('error');
                    e.target.classList.remove('success');
                }
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referralCode').value.trim().toLowerCase();
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            // Validation
            if (!fullName || fullName.length < 3) {
                showToast('Validation Error', 'Please enter your full name', 'error');
                return;
            }
            
            if (!username || username.length < 3) {
                showToast('Validation Error', 'Username must be at least 3 characters', 'error');
                return;
            }
            
            if (!/^[a-z0-9_]+$/.test(username)) {
                showToast('Validation Error', 'Only letters, numbers, and underscore allowed in username', 'error');
                return;
            }
            
            if (!email || !email.includes('@')) {
                showToast('Validation Error', 'Enter a valid email address', 'error');
                return;
            }
            
            if (!phone || phone.length < 10) {
                showToast('Validation Error', 'Enter a valid phone number', 'error');
                return;
            }
            
            if (password.length < 8) {
                showToast('Validation Error', 'Password must be at least 8 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('Validation Error', 'Passwords do not match', 'error');
                return;
            }
            
            if (!termsChecked) {
                showToast('Terms Required', 'Please accept the Terms of Service', 'warning');
                return;
            }
            
            // Check if username is taken
            const existingUser = await findUserByUsername(username);
            if (existingUser) {
                showToast('Username Taken', 'Please choose a different username', 'error');
                return;
            }
            
            // Disable button
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            
            try {
                // Step 1: Find referrer if provided
                let referrerUid = null;
                let level2Referrer = null;
                let level3Referrer = null;
                
                if (referralCode) {
                    const referrer = await findUserByUsername(referralCode);
                    if (referrer) {
                        referrerUid = referrer.id;
                        level2Referrer = referrer.referredBy || null;
                        
                        if (level2Referrer) {
                            const l2Doc = await db.collection('users').doc(level2Referrer).get();
                            if (l2Doc.exists) {
                                level3Referrer = l2Doc.data().referredBy || null;
                            }
                        }
                    }
                }
                
                // Step 2: Create Auth User
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                
                // Step 3: Update profile
                await userCredential.user.updateProfile({ displayName: fullName });
                
                // Step 4: Create Firestore user document
                const userDoc = {
                    uid: uid,
                    fullName: fullName,
                    username: username,
                    email: email,
                    phone: phone,
                    referredBy: referrerUid,
                    level2Referrer: level2Referrer,
                    level3Referrer: level3Referrer,
                    wallet: WELCOME_BONUS,
                    totalDeposits: 0,
                    totalWithdrawals: 0,
                    totalEarnings: WELCOME_BONUS,
                    totalInvested: 0,
                    activeInvestments: 0,
                    referralCount: 0,
                    isAdmin: false,
                    emailVerified: false,
                    createdAt: new Date().toISOString(),
                    lastLogin: new Date().toISOString()
                };
                
                await db.collection('users').doc(uid).set(userDoc);
                
                // Step 5: Create welcome bonus transaction
                await db.collection('transactions').add({
                    userId: uid,
                    userName: fullName,
                    type: 'welcome_bonus',
                    amount: WELCOME_BONUS,
                    status: 'completed',
                    description: '🎁 Welcome Bonus - ₦1,000 Credited!',
                    createdAt: new Date().toISOString()
                });
                
                // Step 6: Create referral records for upliners
                if (referrerUid) {
                    // Level 1 referral record
                    await db.collection(`users/${referrerUid}/referrals`).doc(uid).set({
                        referredUserId: uid,
                        referredUserName: fullName,
                        referredUsername: username,
                        level: 1,
                        commission: 10,
                        totalEarned: 0,
                        createdAt: new Date().toISOString()
                    });
                }
                
                if (level2Referrer) {
                    await db.collection(`users/${level2Referrer}/referrals`).doc(uid).set({
                        referredUserId: uid,
                        referredUserName: fullName,
                        referredUsername: username,
                        level: 2,
                        commission: 3,
                        totalEarned: 0,
                        createdAt: new Date().toISOString()
                    });
                }
                
                if (level3Referrer) {
                    await db.collection(`users/${level3Referrer}/referrals`).doc(uid).set({
                        referredUserId: uid,
                        referredUserName: fullName,
                        referredUsername: username,
                        level: 3,
                        commission: 1,
                        totalEarned: 0,
                        createdAt: new Date().toISOString()
                    });
                }
                
                // Success!
                showToast('🎉 Welcome to Kinetic Wealth!', `Account created! ₦${WELCOME_BONUS.toLocaleString()} bonus credited.`);
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                
                let errorMessage = 'Registration failed. Please try again.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'This email is already registered. Please sign in instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address format.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Use at least 8 characters with letters and numbers.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your internet connection.';
                }
                
                showToast('Registration Failed', errorMessage, 'error');
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-gift"></i> Create Account & Claim ₦1,000';
            }
        });
        
        // Redirect if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
