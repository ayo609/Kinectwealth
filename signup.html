<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kinetic Wealth - Create Account</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            background: linear-gradient(135deg, #0052CC, #003D99);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .bonus {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .form-section {
            padding: 30px 25px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s;
        }
        
        .input-wrapper:focus-within {
            border-color: #0052CC;
        }
        
        .input-wrapper i {
            color: #999;
            margin-right: 12px;
            font-size: 16px;
        }
        
        input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        
        .hint {
            font-size: 11px;
            margin-top: 5px;
            padding-left: 5px;
        }
        
        .hint.error {
            color: #dc2626;
        }
        
        .hint.success {
            color: #059669;
        }
        
        .referral-box {
            background: #f0fdf4;
            border: 1px solid #059669;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .referral-box i {
            color: #059669;
            font-size: 20px;
        }
        
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            font-size: 13px;
        }
        
        .terms input {
            width: 18px;
            height: 18px;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #0052CC, #003D99);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .login-link a {
            color: #0052CC;
            text-decoration: none;
            font-weight: 600;
        }
        
        .referral-detected {
            background: #dbeafe;
            border: 1px solid #0052CC;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        
        .referral-detected i {
            color: #0052CC;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">💰 Kinetic Wealth</div>
        <div class="bonus">
            <i class="fas fa-gift"></i> ₦1,000 Welcome Bonus
        </div>
    </div>
    
    <div class="form-section">
        <div class="referral-detected" id="referralDetected">
            <i class="fas fa-user-plus"></i>
            <span>You were referred by: <strong id="referrerName"></strong></span>
        </div>
        
        <div class="input-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="hint" id="nameHint">✓ Your full legal name</div>
        </div>
        
        <div class="input-group">
            <label>Username (Your Referral Code)</label>
            <div class="input-wrapper">
                <i class="fas fa-at"></i>
                <input type="text" id="username" placeholder="e.g., johnwealth">
            </div>
            <div class="hint" id="usernameHint">3-20 chars, letters and numbers only</div>
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="hint" id="emailHint">✓ We'll never share your email</div>
        </div>
        
        <div class="input-group">
            <label>Phone Number</label>
            <div class="input-wrapper">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="08012345678">
            </div>
            <div class="hint" id="phoneHint">✓ Nigerian phone number</div>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Minimum 8 characters">
                <i class="fas fa-eye" onclick="togglePassword('password')" style="cursor: pointer;"></i>
            </div>
            <div class="hint" id="passwordHint">✓ At least 8 characters</div>
        </div>
        
        <div class="input-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="Repeat your password">
                <i class="fas fa-eye" onclick="togglePassword('confirmPassword')" style="cursor: pointer;"></i>
            </div>
            <div class="hint" id="confirmHint">✓ Re-enter your password</div>
        </div>
        
        <div class="input-group">
            <label>Referral Code (Optional)</label>
            <div class="input-wrapper">
                <i class="fas fa-link"></i>
                <input type="text" id="refCode" placeholder="Enter referrer's username">
            </div>
            <div class="hint" id="refHint">Enter the username who invited you</div>
        </div>
        
        <div class="terms">
            <input type="checkbox" id="termsCheck">
            <label style="margin:0;">I agree to the <a href="#" style="color:#0052CC;">Terms of Service</a> and <a href="#" style="color:#0052CC;">Privacy Policy</a></label>
        </div>
        
        <button id="signupBtn" onclick="registerUser()">
            <i class="fas fa-gift"></i> Create Account & Claim ₦1,000
        </button>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
        authDomain: "kinetic-dc8e6.firebaseapp.com",
        projectId: "kinetic-dc8e6",
        storageBucket: "kinetic-dc8e6.firebasestorage.app",
        messagingSenderId: "980527555815",
        appId: "1:980527555815:web:131ccee594e0c8f122ee42"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const WELCOME_BONUS = 1000;
    
    function getReferralFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('ref') || params.get('referral') || '';
    }
    
    function showReferralDetected(username) {
        if (username) {
            document.getElementById('referrerName').innerText = '@' + username;
            document.getElementById('referralDetected').style.display = 'flex';
            document.getElementById('refCode').value = username;
        }
    }
    
    const urlReferral = getReferralFromURL();
    if (urlReferral) {
        showReferralDetected(urlReferral);
    }
    
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        field.type = field.type === 'password' ? 'text' : 'password';
    }
    
    // Validation Functions
    function validateName() {
        const name = document.getElementById('fullName').value.trim();
        const hint = document.getElementById('nameHint');
        if (name.length < 3) {
            hint.textContent = '❌ Name must be at least 3 characters';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Looks good!';
        hint.className = 'hint success';
        return true;
    }
    
    function validateUsername() {
        const username = document.getElementById('username').value.trim().toLowerCase();
        const hint = document.getElementById('usernameHint');
        const regex = /^[a-z0-9_]{3,20}$/;
        if (!regex.test(username)) {
            hint.textContent = '❌ 3-20 characters, letters, numbers, underscore only';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Available - This is your referral code!';
        hint.className = 'hint success';
        return true;
    }
    
    function validateEmail() {
        const email = document.getElementById('email').value.trim();
        const hint = document.getElementById('emailHint');
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!regex.test(email)) {
            hint.textContent = '❌ Enter a valid email address';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Valid email address';
        hint.className = 'hint success';
        return true;
    }
    
    function validatePhone() {
        const phone = document.getElementById('phone').value.trim();
        const hint = document.getElementById('phoneHint');
        const regex = /^[0-9]{10,11}$/;
        if (!regex.test(phone)) {
            hint.textContent = '❌ Enter a valid phone number (10-11 digits)';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Valid phone number';
        hint.className = 'hint success';
        return true;
    }
    
    function validatePassword() {
        const password = document.getElementById('password').value;
        const hint = document.getElementById('passwordHint');
        if (password.length < 8) {
            hint.textContent = '❌ Password must be at least 8 characters';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Strong password';
        hint.className = 'hint success';
        return true;
    }
    
    function validateConfirm() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const hint = document.getElementById('confirmHint');
        if (password !== confirm) {
            hint.textContent = '❌ Passwords do not match';
            hint.className = 'hint error';
            return false;
        }
        hint.textContent = '✓ Passwords match';
        hint.className = 'hint success';
        return true;
    }
    
    document.getElementById('fullName').addEventListener('input', validateName);
    document.getElementById('username').addEventListener('input', validateUsername);
    document.getElementById('email').addEventListener('input', validateEmail);
    document.getElementById('phone').addEventListener('input', validatePhone);
    document.getElementById('password').addEventListener('input', validatePassword);
    document.getElementById('confirmPassword').addEventListener('input', validateConfirm);
    
    async function registerUser() {
        if (!validateName() || !validateUsername() || !validateEmail() || 
            !validatePhone() || !validatePassword() || !validateConfirm()) {
            Swal.fire({
                icon: 'error',
                title: 'Validation Error',
                text: 'Please check all fields and try again.',
                confirmButtonColor: '#0052CC'
            });
            return;
        }
        
        if (!document.getElementById('termsCheck').checked) {
            Swal.fire({
                icon: 'warning',
                title: 'Terms Required',
                text: 'Please accept the Terms of Service to continue.',
                confirmButtonColor: '#0052CC'
            });
            return;
        }
        
        const fullName = document.getElementById('fullName').value.trim();
        const username = document.getElementById('username').value.trim().toLowerCase();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const refCode = document.getElementById('refCode').value.trim().toLowerCase();
        
        const btn = document.getElementById('signupBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
        
        try {
            const usernameCheck = await db.collection('users').where('username', '==', username).get();
            if (!usernameCheck.empty) {
                throw new Error('username_taken');
            }
            
            let referrerUid = null;
            let referrerUsername = null;
            
            if (refCode && refCode !== username) {
                const referrerQuery = await db.collection('users').where('username', '==', refCode).get();
                if (!referrerQuery.empty) {
                    const refDoc = referrerQuery.docs[0];
                    referrerUid = refDoc.data().uid || refDoc.id;
                    referrerUsername = refCode;
                }
            }
            
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;
            
            const userData = {
                uid: uid,
                fullName: fullName,
                username: username,
                referralCode: username,
                email: email,
                phone: phone,
                referrerUid: referrerUid,
                referredBy: referrerUsername || '',
                depositBalance: WELCOME_BONUS,
                withdrawalBalance: 0,
                balance: WELCOME_BONUS,
                totalEarnings: WELCOME_BONUS,
                welcomeBonusPaid: true,
                totalInvested: 0,
                totalRefEarnings: 0,
                referralCount: 0,
                level1Count: 0,
                level2Count: 0,
                level3Count: 0,
                purchasedPlans: [],
                isAdmin: false,
                accountStatus: 'active',
                createdAt: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                lastUpdated: new Date().toISOString()
            };
            
            await db.collection('users').doc(uid).set(userData);
            
            await db.collection('transactions').add({
                userId: uid,
                userName: fullName,
                type: 'welcome_bonus',
                amount: WELCOME_BONUS,
                status: 'completed',
                description: '₦1,000 Welcome Bonus',
                wallet: 'deposit',
                createdAt: new Date().toISOString()
            });
            
            if (referrerUid) {
                await db.collection('users').doc(referrerUid).update({
                    referralCount: firebase.firestore.FieldValue.increment(1),
                    level1Count: firebase.firestore.FieldValue.increment(1),
                    lastUpdated: new Date().toISOString()
                });
                
                const referrerDoc = await db.collection('users').doc(referrerUid).get();
                if (referrerDoc.exists) {
                    const level2Uid = referrerDoc.data().referrerUid;
                    if (level2Uid) {
                        await db.collection('users').doc(level2Uid).update({
                            referralCount: firebase.firestore.FieldValue.increment(1),
                            level2Count: firebase.firestore.FieldValue.increment(1),
                            lastUpdated: new Date().toISOString()
                        });
                        
                        const level2Doc = await db.collection('users').doc(level2Uid).get();
                        if (level2Doc.exists) {
                            const level3Uid = level2Doc.data().referrerUid;
                            if (level3Uid) {
                                await db.collection('users').doc(level3Uid).update({
                                    referralCount: firebase.firestore.FieldValue.increment(1),
                                    level3Count: firebase.firestore.FieldValue.increment(1),
                                    lastUpdated: new Date().toISOString()
                                });
                            }
                        }
                    }
                }
            }
            
            await Swal.fire({
                icon: 'success',
                title: '🎉 Welcome to Kinetic Wealth!',
                html: `
                    <strong>₦1,000 Welcome Bonus Added!</strong><br><br>
                    Your referral code: <strong style="color:#0052CC">@${username}</strong><br>
                    Share it to earn commissions!
                `,
                confirmButtonColor: '#0052CC',
                confirmButtonText: 'Go to Dashboard'
            });
            
            window.location.href = 'home.html';
            
        } catch (error) {
            console.error('Registration Error:', error);
            let errorMessage = 'Registration failed. Please try again.';
            
            switch(error.code || error.message) {
                case 'username_taken':
                    errorMessage = 'Username is already taken. Please choose another.';
                    break;
                case 'auth/email-already-in-use':
                    errorMessage = 'Email is already registered. Please login instead.';
                    break;
                case 'auth/weak-password':
                    errorMessage = 'Password is too weak. Use at least 8 characters.';
                    break;
                case 'auth/invalid-email':
                    errorMessage = 'Invalid email address.';
                    break;
                default:
                    errorMessage = error.message;
            }
            
            Swal.fire({
                icon: 'error',
                title: 'Signup Failed',
                text: errorMessage,
                confirmButtonColor: '#0052CC'
            });
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-gift"></i> Create Account & Claim ₦1,000';
        }
    }
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'home.html';
        }
    });
</script>
</body>
</html>
