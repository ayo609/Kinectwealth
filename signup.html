<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>Kinetic Wealth · Create Account</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════════
   BLUE & WHITE THEME CONFIGURATION
═══════════════════════════════════════════════════════════════════ */
:root {
  --primary:       #0052CC; /* Strong Kinetic Blue */
  --primary-dark:  #003D99;
  --primary-light: #E5EFFF;
  --bg-light:      #F4F7FB; /* Very soft blue-tinted white */
  --card-bg:       #FFFFFF;
  --text-primary:  #0F172A;
  --text-muted:    #64748B;
  --border-light:  #E2E8F0;
  --success:       #059669;
  --danger:        #DC2626;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
html { scroll-behavior:smooth; }

body {
  background-color: var(--bg-light);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ═══════════════════════════════════════════════════════════════════
   HEADER & BRANDING
═══════════════════════════════════════════════════════════════════ */
.header-wrapper {
  width: 100%;
  background: var(--primary);
  padding: 40px 20px 80px 20px;
  text-align: center;
  position: relative;
}

.logo-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

.logo-icon {
  background: var(--card-bg);
  color: var(--primary);
  width: 45px; height: 45px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.logo-text {
  font-size: 28px;
  font-weight: 800;
  color: var(--card-bg);
  letter-spacing: -0.5px;
}

/* ═══════════════════════════════════════════════════════════════════
   WELCOME BONUS BADGE
═══════════════════════════════════════════════════════════════════ */
.bonus-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--card-bg);
  color: var(--primary);
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 15px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  animation: floatBadge 3s ease-in-out infinite;
}

@keyframes floatBadge {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* ═══════════════════════════════════════════════════════════════════
   FORM CONTAINER
═══════════════════════════════════════════════════════════════════ */
.form-container {
  width: 100%;
  max-width: 500px;
  padding: 0 20px;
  margin-top: -40px;
  z-index: 10;
  margin-bottom: 40px;
}

.form-card {
  background: var(--card-bg);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0, 82, 204, 0.08);
  border: 1px solid var(--border-light);
  overflow: hidden;
}

.form-header {
  padding: 24px;
  text-align: center;
  border-bottom: 1px solid var(--border-light);
}

.form-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.form-body {
  padding: 30px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ═══════════════════════════════════════════════════════════════════
   INPUT STYLING
═══════════════════════════════════════════════════════════════════ */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.input-wrapper {
  display: flex;
  align-items: center;
  background: var(--card-bg);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  transition: all 0.2s ease;
  overflow: hidden;
}

.input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.input-wrapper.error { border-color: var(--danger); background: #FEF2F2; }
.input-wrapper.success { border-color: var(--success); }

.input-prefix {
  padding: 14px 0 14px 16px;
  color: var(--text-muted);
  font-size: 15px;
}

.input-wrapper:focus-within .input-prefix { color: var(--primary); }

.input-field {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-primary);
}

.input-suffix {
  padding: 0 16px;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
}

.hint-text {
  font-size: 12px;
  font-weight: 500;
  padding-left: 4px;
}
.hint-text.error { color: var(--danger); }
.hint-text.success { color: var(--success); }
.hint-text.muted { color: var(--text-muted); }

/* ═══════════════════════════════════════════════════════════════════
   BUTTONS & FOOTER
═══════════════════════════════════════════════════════════════════ */
.btn-primary {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: var(--card-bg);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

.terms-wrapper {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: var(--text-muted);
}

.terms-wrapper input {
  margin-top: 3px;
  accent-color: var(--primary);
  width: 16px; height: 16px;
}

.login-footer {
  padding: 24px;
  text-align: center;
  background: var(--bg-light);
  font-size: 14px;
  color: var(--text-muted);
  border-top: 1px solid var(--border-light);
}

.login-footer a {
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
}

.login-footer a:hover { text-decoration: underline; }

</style>
</head>
<body>

<div class="header-wrapper">
  <div class="logo-container">
    <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
    <div class="logo-text">Kinetic Wealth</div>
  </div>
  <!-- 1K BONUS EMPHASIS -->
  <div class="bonus-badge">
    <i class="fas fa-gift"></i> ₦1,000 Welcome Bonus Active
  </div>
</div>

<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>Create Your Account</h2>
    </div>

    <div class="form-body">
      <!-- Full Name -->
      <div class="input-group">
        <label class="input-label">Full Name</label>
        <div class="input-wrapper" id="rowFullName">
          <span class="input-prefix"><i class="fas fa-user"></i></span>
          <input class="input-field" id="fullName" type="text" placeholder="John Doe" oninput="validateName()"/>
        </div>
        <span class="hint-text muted" id="hintName"></span>
      </div>

      <!-- Username -->
      <div class="input-group">
        <label class="input-label">Username</label>
        <div class="input-wrapper" id="rowUsername">
          <span class="input-prefix">@</span>
          <input class="input-field" id="username" type="text" placeholder="johndoe" oninput="validateUsername()"/>
        </div>
        <span class="hint-text muted" id="hintUsername">Letters and numbers only</span>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label class="input-label">Email Address</label>
        <div class="input-wrapper" id="rowEmail">
          <span class="input-prefix"><i class="fas fa-envelope"></i></span>
          <input class="input-field" id="email" type="email" placeholder="name@example.com" oninput="validateEmail()"/>
        </div>
        <span class="hint-text muted" id="hintEmail"></span>
      </div>

      <!-- Phone -->
      <div class="input-group">
        <label class="input-label">Phone Number</label>
        <div class="input-wrapper" id="rowPhone">
          <span class="input-prefix"><i class="fas fa-phone"></i></span>
          <input class="input-field" id="phone" type="tel" placeholder="08012345678" oninput="validatePhone()"/>
        </div>
        <span class="hint-text muted" id="hintPhone"></span>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrapper" id="rowPassword">
          <span class="input-prefix"><i class="fas fa-lock"></i></span>
          <input class="input-field" id="password" type="password" placeholder="Min 8 characters" oninput="validatePassword()"/>
          <button class="input-suffix" onclick="togglePassword('password',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
        <span class="hint-text muted" id="hintPassword"></span>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <label class="input-label">Confirm Password</label>
        <div class="input-wrapper" id="rowConfirm">
          <span class="input-prefix"><i class="fas fa-check-circle"></i></span>
          <input class="input-field" id="confirmPassword" type="password" placeholder="Repeat password" oninput="validateConfirm()"/>
          <button class="input-suffix" onclick="togglePassword('confirmPassword',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
        <span class="hint-text muted" id="hintConfirm"></span>
      </div>

      <!-- Referral Code -->
      <div class="input-group">
        <label class="input-label">Referral Code (Optional)</label>
        <div class="input-wrapper" id="rowRefCode">
          <span class="input-prefix"><i class="fas fa-ticket-alt"></i></span>
          <input class="input-field" id="refCode" type="text" placeholder="Enter code if invited"/>
        </div>
      </div>

      <!-- Terms -->
      <div class="terms-wrapper">
        <input type="checkbox" id="termsCheck"/>
        <span>I agree to Kinetic Wealth's Terms of Service and Privacy Policy.</span>
      </div>

      <!-- Submit Button -->
      <button class="btn-primary" id="signupBtn" onclick="doSignup()">
        Create Account & Claim ₦1,000
      </button>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIGURATION
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL VARIABLES - STRICTLY ENFORCING 1K BONUS
═══════════════════════════════════════════════════════════════════ */
const WELCOME_BONUS = 1000;

/* ═══════════════════════════════════════════════════════════════════
   UTILITY & VALIDATION FUNCTIONS
═══════════════════════════════════════════════════════════════════ */
function setHint(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `hint-text ${type}`;
}

function fieldSuccess(id) {
  document.getElementById(id).classList.remove('error');
  document.getElementById(id).classList.add('success');
}

function fieldError(id) {
  document.getElementById(id).classList.remove('success');
  document.getElementById(id).classList.add('error');
}

function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = `<i class="fas fa-eye${isText ? '' : '-slash'}"></i>`;
}

function validateName() {
  const val = document.getElementById('fullName').value.trim();
  if (val.length < 3) { fieldError('rowFullName'); setHint('hintName', 'Name too short', 'error'); return false; }
  fieldSuccess('rowFullName'); setHint('hintName', '', 'success'); return true;
}

function validateUsername() {
  const val = document.getElementById('username').value.trim();
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(val)) { fieldError('rowUsername'); setHint('hintUsername', 'Invalid format', 'error'); return false; }
  fieldSuccess('rowUsername'); setHint('hintUsername', '', 'success'); return true;
}

function validateEmail() {
  const val = document.getElementById('email').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { fieldError('rowEmail'); setHint('hintEmail', 'Invalid email', 'error'); return false; }
  fieldSuccess('rowEmail'); setHint('hintEmail', '', 'success'); return true;
}

function validatePhone() {
  const val = document.getElementById('phone').value.trim();
  if (!/^[0-9+\s\-]{8,15}$/.test(val)) { fieldError('rowPhone'); setHint('hintPhone', 'Invalid phone', 'error'); return false; }
  fieldSuccess('rowPhone'); setHint('hintPhone', '', 'success'); return true;
}

function validatePassword() {
  const val = document.getElementById('password').value;
  if (val.length < 8) { fieldError('rowPassword'); setHint('hintPassword', 'Min 8 characters', 'error'); return false; }
  fieldSuccess('rowPassword'); setHint('hintPassword', '', 'success'); return true;
}

function validateConfirm() {
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('confirmPassword').value;
  if (p1 !== p2 || p2 === '') { fieldError('rowConfirm'); setHint('hintConfirm', 'Passwords do not match', 'error'); return false; }
  fieldSuccess('rowConfirm'); setHint('hintConfirm', '', 'success'); return true;
}

function genRefCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'KW';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

/* ═══════════════════════════════════════════════════════════════════
   CORE SIGNUP LOGIC
═══════════════════════════════════════════════════════════════════ */
async function doSignup() {
  const v1 = validateName(), v2 = validateUsername(), v3 = validateEmail();
  const v4 = validatePhone(), v5 = validatePassword(), v6 = validateConfirm();

  if (!(v1 && v2 && v3 && v4 && v5 && v6)) {
    Swal.fire({ icon: 'warning', title: 'Check Fields', text: 'Please fill out all fields correctly.', confirmButtonColor: '#0052CC' });
    return;
  }

  if (!document.getElementById('termsCheck').checked) {
    Swal.fire({ icon: 'warning', title: 'Terms Required', text: 'You must agree to the terms.', confirmButtonColor: '#0052CC' });
    return;
  }

  const fullName = document.getElementById('fullName').value.trim();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const enteredRefCode = document.getElementById('refCode').value.trim().toUpperCase();

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

  Swal.fire({ title: 'Setting up your account...', html: 'Securing your ₦1,000 bonus', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  let uid = null;

  try {
    // 1. Check if username exists first to prevent auth account creation if username is taken
    const usernameCheck = await db.collection('users').where('username', '==', username).limit(1).get();
    if (!usernameCheck.empty) {
      Swal.fire({ icon: 'error', title: 'Username taken', text: 'Please choose another username.', confirmButtonColor: '#0052CC' });
      btn.disabled = false; btn.innerHTML = 'Create Account & Claim ₦1,000';
      return;
    }

    // 2. Create Auth Account
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    uid = userCredential.user.uid;

    // 3. Generate Unique Referral Code
    let myRefCode = genRefCode();

    // 4. Resolve Referrer
    let finalReferrer = 'direct';
    if (enteredRefCode) {
      const refSnapshot = await db.collection('users').where('referralCode', '==', enteredRefCode).limit(1).get();
      if (!refSnapshot.empty) finalReferrer = refSnapshot.docs[0].id;
    }

    const now = new Date().toISOString();
    
    // 5. Save Data to Firestore (INCLUDES THE 1K BONUS)
    const userData = {
      uid, fullName, username, email, phone,
      referralCode: myRefCode,
      referrerUid: finalReferrer,
      referredBy: enteredRefCode,
      
      // 💰 WELCOME BONUS BALANCES
      depositBalance: WELCOME_BONUS,
      withdrawalBalance: 0,
      balance: WELCOME_BONUS,
      totalEarnings: WELCOME_BONUS,
      welcomeBonusPaid: true,
      
      totalInvested: 0,
      totalRefEarnings: 0,
      referralCount: 0, level1Count: 0, level2Count: 0, level3Count: 0,
      purchasedPlans: [],
      isAdmin: false, status: 'active',
      createdAt: now, lastLogin: now, lastUpdated: now,
      
      subordinateRewards: {
        daily: { lastClaimDate: null, lastClaimAmount: 0, downlineCountAtClaim: 0 },
        weekly: { lastClaimWeek: null, lastClaimAmount: 0, downlineCountAtClaim: 0 }
      }
    };

    await db.collection('users').doc(uid).set(userData);

    // 6. Log the 1K Transaction
    await db.collection('transactions').add({
      userId: uid, userName: fullName, type: 'welcome_bonus', 
      amount: WELCOME_BONUS, status: 'completed', balanceAfter: WELCOME_BONUS,
      description: '₦1,000 Welcome Bonus', wallet: 'deposit', createdAt: new Date()
    });

    // 7. Success Message
    Swal.close();
    await Swal.fire({
      icon: 'success',
      title: 'Welcome to Kinetic Wealth!',
      html: `
        <div style="text-align:center;">
          <h3 style="color:#0052CC; font-weight:800; margin-bottom:10px;">₦1,000 Bonus Credited!</h3>
          <p style="color:#64748B; font-size:14px;">Your account is ready. Your funds are waiting in your deposit wallet.</p>
        </div>
      `,
      confirmButtonText: 'Enter Dashboard',
      confirmButtonColor: '#0052CC'
    });

    window.location.href = 'home.html';

  } catch (err) {
    console.error(err);
    if (uid) { try { await auth.currentUser.delete(); } catch(e){} }
    
    let msg = 'Registration failed. Try again.';
    if (err.code === 'auth/email-already-in-use') msg = 'Email already registered.';
    if (err.code === 'auth/weak-password') msg = 'Password is too weak.';

    Swal.fire({ icon: 'error', title: 'Error', text: msg, confirmButtonColor: '#0052CC' });
    btn.disabled = false; btn.innerHTML = 'Create Account & Claim ₦1,000';
  }
}

// Redirect if already logged in
auth.onAuthStateChanged(user => { if (user) window.location.href = 'home.html'; });
</script>

</body>
</html>
