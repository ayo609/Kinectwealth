<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kinetic Wealth - Create Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .bg-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
        }
        .blur-1 { background: #0052CC; top: -100px; right: -100px; }
        .blur-2 { background: #00E5A0; bottom: -100px; left: -100px; }

        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { text-align: center; margin-bottom: 24px; }

        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #0052CC, #00E5A0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0,82,204,0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }

        .bonus-banner {
            background: linear-gradient(135deg, rgba(0,82,204,0.12), rgba(0,229,160,0.08));
            border: 1px solid rgba(0,82,204,0.3);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .bonus-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #0052CC, #00E5A0);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .bonus-content { flex: 1; }

        .bonus-title {
            font-weight: 700;
            color: #0052CC;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .bonus-text {
            font-size: 12px;
            color: #94a3b8;
        }
        .bonus-text strong { color: #00E5A0; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .label-hint {
            color: #64748b;
            font-weight: 400;
            font-size: 11px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #0052CC;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0052CC;
            background: rgba(255,255,255,0.05);
        }

        input.error { border-color: #ef4444; }
        input.success { border-color: #00E5A0; }

        .input-feedback {
            font-size: 11px;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .input-feedback.show { display: flex; }
        .input-feedback.error { color: #ef4444; }
        .input-feedback.success { color: #00E5A0; }
        .input-feedback.checking { color: #f59e0b; }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(148,163,184,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 10px;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #00E5A0; width: 100%; }

        .terms-wrapper {
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 12px;
            margin: 20px 0;
        }

        .terms-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin: 0;
        }

        .terms-label input {
            width: 18px;
            height: 18px;
            accent-color: #0052CC;
        }

        .terms-label span {
            color: #cbd5e1;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0052CC, #003D99);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,82,204,0.5);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
            font-size: 13px;
        }

        .login-link a {
            color: #0052CC;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 550px) {
            .glass-card { padding: 24px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <div class="glass-card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Start your investment journey today</p>
        </div>

        <div class="bonus-banner">
            <div class="bonus-icon">
                <i class="fas fa-gift"></i>
            </div>
            <div class="bonus-content">
                <div class="bonus-title">🎁 ₦1,000 Welcome Bonus!</div>
                <div class="bonus-text">Create your account and get <strong>₦1,000</strong> credited instantly!</div>
            </div>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Username <span class="label-hint">(this is your referral code)</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-at input-icon"></i>
                    <input type="text" id="username" placeholder="e.g., johnwealth" autocomplete="off">
                </div>
                <div class="input-feedback" id="usernameFeedback"></div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" id="phone" placeholder="08012345678" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Referral Code <span class="label-hint">(optional - enter referrer's username)</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-link input-icon"></i>
                    <input type="text" id="referralCode" placeholder="Enter referrer's username" autocomplete="off">
                </div>
                <div class="input-feedback" id="referralFeedback"></div>
            </div>

            <div class="terms-wrapper">
                <label class="terms-label">
                    <input type="checkbox" id="termsCheckbox">
                    <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span>
                </label>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-gift"></i> Create Account & Claim ₦1,000
            </button>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
            authDomain: "kinetic-dc8e6.firebaseapp.com",
            projectId: "kinetic-dc8e6",
            storageBucket: "kinetic-dc8e6.firebasestorage.app",
            messagingSenderId: "980527555815",
            appId: "1:980527555815:web:131ccee594e0c8f122ee42"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const WELCOME_BONUS = 1000;
        let checkTimeout;

        // ==================== UTILITY FUNCTIONS ====================

        // Find user by username
        async function findUserByUsername(username) {
            if (!username || username.length < 3) return null;
            try {
                const q = await db.collection('users')
                    .where('username', '==', username.toLowerCase())
                    .limit(1)
                    .get();
                return q.empty ? null : { id: q.docs[0].id, ...q.docs[0].data() };
            } catch(e) {
                console.error('Error finding user:', e);
                return null;
            }
        }

        // Build complete referral chain (Level 1, 2, 3)
        async function buildReferralChain(referralCode) {
            const chain = {
                level1: null,      // Direct referrer
                level2: null,      // Referrer's referrer
                level3: null,      // Referrer's referrer's referrer
                level1Username: null,
                level2Username: null,
                level3Username: null,
                referralPath: []   // Array of all ancestor UIDs [level3, level2, level1]
            };

            if (!referralCode) return chain;

            // Find Level 1 (Direct referrer)
            const level1 = await findUserByUsername(referralCode);
            if (!level1) return chain;

            chain.level1 = level1.id;
            chain.level1Username = level1.username;
            chain.referralPath.push(level1.id);

            // Find Level 2 (Who referred the referrer?)
            if (level1.referralPath && level1.referralPath.length > 0) {
                // The last element in referrer's path is their direct referrer
                // The second-to-last is their level 2, etc.
                const referrerPath = level1.referralPath;

                // Level 2 = referrer's direct referrer (last in their path)
                if (referrerPath.length >= 1) {
                    chain.level2 = referrerPath[referrerPath.length - 1];
                    chain.referralPath.unshift(chain.level2); // Add to front

                    // Try to get level2 username
                    try {
                        const l2Doc = await db.collection('users').doc(chain.level2).get();
                        if (l2Doc.exists) {
                            chain.level2Username = l2Doc.data().username;
                        }
                    } catch(e) {}
                }

                // Level 3 = referrer's level 2 (second-to-last in their path)
                if (referrerPath.length >= 2) {
                    chain.level3 = referrerPath[referrerPath.length - 2];
                    chain.referralPath.unshift(chain.level3); // Add to front

                    // Try to get level3 username
                    try {
                        const l3Doc = await db.collection('users').doc(chain.level3).get();
                        if (l3Doc.exists) {
                            chain.level3Username = l3Doc.data().username;
                        }
                    } catch(e) {}
                }
            }

            return chain;
        }

        // ==================== REFERRAL CODE FROM URL ====================
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');
        if (refFromUrl) {
            document.getElementById('referralCode').value = refFromUrl;
            setTimeout(() => validateReferralCode(refFromUrl), 300);
        }

        // ==================== VALIDATION FUNCTIONS ====================

        async function validateReferralCode(code) {
            const feedback = document.getElementById('referralFeedback');
            const input = document.getElementById('referralCode');
            const currentUsername = document.getElementById('username').value.trim().toLowerCase();

            if (!code) {
                feedback.className = 'input-feedback';
                input.classList.remove('success', 'error');
                return;
            }

            if (code === currentUsername && currentUsername.length > 0) {
                feedback.innerHTML = '<i class="fas fa-times-circle"></i> Cannot use your own username';
                feedback.className = 'input-feedback show error';
                input.classList.add('error');
                input.classList.remove('success');
                return;
            }

            const referrer = await findUserByUsername(code);
            if (referrer) {
                feedback.innerHTML = `<i class="fas fa-check-circle"></i> Referrer found: @${referrer.username}`;
                feedback.className = 'input-feedback show success';
                input.classList.add('success');
                input.classList.remove('error');
            } else {
                feedback.innerHTML = '<i class="fas fa-times-circle"></i> Username not found';
                feedback.className = 'input-feedback show error';
                input.classList.add('error');
                input.classList.remove('success');
            }
        }

        // Username validation
        document.getElementById('username').addEventListener('input', async (e) => {
            const username = e.target.value.toLowerCase().trim();
            const feedback = document.getElementById('usernameFeedback');
            clearTimeout(checkTimeout);

            if (username.length < 3) {
                feedback.className = 'input-feedback';
                e.target.classList.remove('success', 'error');
                return;
            }

            if (!/^[a-z0-9_]+$/.test(username)) {
                feedback.innerHTML = '<i class="fas fa-times-circle"></i> Only letters, numbers, and underscore allowed';
                feedback.className = 'input-feedback show error';
                e.target.classList.add('error');
                e.target.classList.remove('success');
                return;
            }

            feedback.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            feedback.className = 'input-feedback show checking';

            checkTimeout = setTimeout(async () => {
                const existing = await findUserByUsername(username);
                if (existing) {
                    feedback.innerHTML = '<i class="fas fa-times-circle"></i> Username already taken';
                    feedback.className = 'input-feedback show error';
                    e.target.classList.add('error');
                    e.target.classList.remove('success');
                } else {
                    feedback.innerHTML = '<i class="fas fa-check-circle"></i> Available! This is your referral code.';
                    feedback.className = 'input-feedback show success';
                    e.target.classList.add('success');
                    e.target.classList.remove('error');
                }
            }, 500);
        });

        // Referral code validation on input
        document.getElementById('referralCode').addEventListener('input', async (e) => {
            const code = e.target.value.trim().toLowerCase();
            clearTimeout(checkTimeout);
            checkTimeout = setTimeout(() => {
                validateReferralCode(code);
            }, 500);
        });

        // Password strength
        document.getElementById('password').addEventListener('input', (e) => {
            const pw = e.target.value;
            const bar = document.getElementById('strengthBar');
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (pw.match(/[a-z]/) && pw.match(/[A-Z]/)) strength++;
            if (pw.match(/[0-9]/)) strength++;
            if (pw.match(/[^a-zA-Z0-9]/)) strength++;

            bar.className = 'strength-bar';
            if (strength <= 1) bar.classList.add('strength-weak');
            else if (strength <= 2) bar.classList.add('strength-medium');
            else bar.classList.add('strength-strong');
        });

        // Confirm password
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            const confirm = e.target.value;
            if (confirm.length > 0) {
                if (password === confirm) {
                    e.target.classList.add('success');
                    e.target.classList.remove('error');
                } else {
                    e.target.classList.add('error');
                    e.target.classList.remove('success');
                }
            }
        });

        // ==================== MAIN REGISTRATION ====================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referralCode').value.trim().toLowerCase();
            const termsChecked = document.getElementById('termsCheckbox').checked;

            // Validation
            if (!fullName || fullName.length < 3) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Please enter your full name', confirmButtonColor: '#0052CC' });
                return;
            }
            if (!username || username.length < 3 || !/^[a-z0-9_]+$/.test(username)) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Username must be 3+ characters (letters, numbers, underscore only)', confirmButtonColor: '#0052CC' });
                return;
            }
            if (!email || !email.includes('@')) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Enter a valid email address', confirmButtonColor: '#0052CC' });
                return;
            }
            if (!phone || phone.length < 10) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Enter a valid phone number', confirmButtonColor: '#0052CC' });
                return;
            }
            if (password.length < 8) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Password must be at least 8 characters', confirmButtonColor: '#0052CC' });
                return;
            }
            if (password !== confirmPassword) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Passwords do not match', confirmButtonColor: '#0052CC' });
                return;
            }
            if (!termsChecked) {
                Swal.fire({ icon: 'warning', title: 'Terms Required', text: 'Please accept the Terms of Service', confirmButtonColor: '#0052CC' });
                return;
            }

            // Check username availability
            const existingUser = await findUserByUsername(username);
            if (existingUser) {
                Swal.fire({ icon: 'error', title: 'Username Taken', text: 'Please choose a different username', confirmButtonColor: '#0052CC' });
                return;
            }

            // Disable button
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

            try {
                // ===== BUILD REFERRAL CHAIN =====
                console.log('🔗 Building referral chain...');
                const chain = await buildReferralChain(referralCode);

                console.log('📊 REFERRAL CHAIN:', {
                    'Level 1 (Direct)': chain.level1 ? `@${chain.level1Username} (${chain.level1})` : 'None',
                    'Level 2': chain.level2 ? `@${chain.level2Username} (${chain.level2})` : 'None',
                    'Level 3': chain.level3 ? `@${chain.level3Username} (${chain.level3})` : 'None',
                    'Full Path': chain.referralPath
                });

                // ===== CREATE AUTH USER =====
                console.log('🔐 Creating auth user...');
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                console.log('✅ Auth user created:', uid);

                // Wait for auth to propagate
                await new Promise(resolve => setTimeout(resolve, 1500));
                await userCredential.user.getIdToken(true);
                await userCredential.user.updateProfile({ displayName: fullName });

                // ===== CREATE FIRESTORE USER DOCUMENT =====
                console.log('📝 Creating Firestore document...');

                // ALL REFERRAL DATA STORED IN SAME USER DOCUMENT
                const userDoc = {
                    uid: uid,
                    fullName: fullName,
                    username: username,
                    email: email,
                    phone: phone,

                    // === REFERRAL FIELDS (ALL IN SAME DOCUMENT) ===
                    // Direct referrer
                    referrerUid: chain.level1,
                    referredBy: chain.level1Username,

                    // Level 2 referrer (who referred my referrer)
                    level2ReferrerUid: chain.level2,
                    level2ReferredBy: chain.level2Username,

                    // Level 3 referrer (who referred my level 2)
                    level3ReferrerUid: chain.level3,
                    level3ReferredBy: chain.level3Username,

                    // Full referral path - array of all ancestor UIDs
                    // This makes querying downlines super easy with array-contains
                    referralPath: chain.referralPath,

                    // === BALANCES ===
                    depositBalance: WELCOME_BONUS,
                    withdrawalBalance: 0,
                    balance: WELCOME_BONUS,
                    totalEarnings: WELCOME_BONUS,
                    welcomeBonusPaid: true,
                    totalInvested: 0,
                    totalRefEarnings: 0,

                    // === REFERRAL COUNTERS ===
                    // How many people this user has referred directly
                    referralCount: 0,
                    // How many people in each level under this user
                    level1Count: 0,  // Direct downlines
                    level2Count: 0,  // Downlines of my downlines
                    level3Count: 0,  // 3rd level downlines

                    // === ACCOUNT INFO ===
                    purchasedPlans: [],
                    isAdmin: false,
                    accountStatus: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('users').doc(uid).set(userDoc);
                console.log('✅ Firestore document created');

                // ===== CREATE WELCOME BONUS TRANSACTION =====
                await db.collection('transactions').add({
                    userId: uid,
                    userName: fullName,
                    type: 'welcome_bonus',
                    amount: WELCOME_BONUS,
                    status: 'completed',
                    description: 'Welcome Bonus - ₦1,000 Credited!',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // ===== UPDATE ALL REFERRER COUNTERS =====
                if (chain.level1) {
                    console.log('🔄 Updating referral counters...');

                    const batch = db.batch();

                    // Level 1: Direct referrer gets +1 to their referralCount and level1Count
                    const l1Ref = db.collection('users').doc(chain.level1);
                    batch.update(l1Ref, {
                        referralCount: firebase.firestore.FieldValue.increment(1),
                        level1Count: firebase.firestore.FieldValue.increment(1),
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('✅ Level 1 queued:', chain.level1);

                    // Level 2
                    if (chain.level2) {
                        const l2Ref = db.collection('users').doc(chain.level2);
                        batch.update(l2Ref, {
                            referralCount: firebase.firestore.FieldValue.increment(1),
                            level2Count: firebase.firestore.FieldValue.increment(1),
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        console.log('✅ Level 2 queued:', chain.level2);
                    }

                    // Level 3
                    if (chain.level3) {
                        const l3Ref = db.collection('users').doc(chain.level3);
                        batch.update(l3Ref, {
                            referralCount: firebase.firestore.FieldValue.increment(1),
                            level3Count: firebase.firestore.FieldValue.increment(1),
                            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        console.log('✅ Level 3 queued:', chain.level3);
                    }

                    // Commit all counter updates atomically
                    await batch.commit();
                    console.log('✅ All counter updates committed');
                }

                // ===== SUCCESS =====
                await Swal.fire({
                    icon: 'success',
                    title: '🎉 Welcome to Kinetic Wealth!',
                    html: `
                        <div style="text-align: center;">
                            <div style="font-size: 32px; margin-bottom: 10px;">✅</div>
                            <div style="font-size: 18px; font-weight: bold; color: #0052CC;">Account Created!</div>
                            <div style="margin: 15px 0;">
                                <span style="font-size: 24px; font-weight: bold; color: #00E5A0;">₦${WELCOME_BONUS.toLocaleString()}</span>
                                <div style="font-size: 12px; color: #94a3b8;">Welcome Bonus Credited</div>
                            </div>
                            <div style="background: #1e293b; padding: 10px; border-radius: 10px; margin-top: 10px;">
                                <div style="font-size: 11px; color: #94a3b8;">Your Referral Code</div>
                                <div style="font-size: 16px; font-weight: bold; color: #00E5A0;">@${username}</div>
                            </div>
                            ${chain.level1 ? '<div style="font-size: 11px; color: #64748b; margin-top: 10px;">Referred by: @' + chain.level1Username + '</div>' : ''}
                        </div>
                    `,
                    confirmButtonText: 'Go to Dashboard',
                    confirmButtonColor: '#0052CC',
                    allowOutsideClick: false
                });

                window.location.href = 'home.html';

            } catch (error) {
                console.error('❌ Registration error:', error);

                let errorMessage = 'Registration failed. Please try again.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'This email is already registered. Please sign in instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address format.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password is too weak. Use at least 8 characters.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your internet connection.';
                } else if (error.message && error.message.includes('permission-denied')) {
                    errorMessage = 'Firebase security rules need to be updated. Please contact support.';
                }

                Swal.fire({
                    icon: 'error',
                    title: 'Signup Failed',
                    text: errorMessage,
                    confirmButtonColor: '#0052CC'
                });

                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-gift"></i> Create Account & Claim ₦1,000';
            }
        });

        // Redirect if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
