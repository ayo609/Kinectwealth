<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Wealth – Create Account</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --blue: #0052CC;
            --blue-dark: #003D99;
            --green: #00E5A0;
            --purple: #8B5CF6;
            --bg: #060c1a;
            --surface: rgba(15,23,42,0.9);
            --border: rgba(0,82,204,0.25);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        .orb1 { width:400px; height:400px; background:rgba(0,82,204,0.18); top:-150px; right:-100px; animation-delay:0s; }
        .orb2 { width:350px; height:350px; background:rgba(0,229,160,0.12); bottom:-100px; left:-80px; animation-delay:-4s; }
        .orb3 { width:200px; height:200px; background:rgba(139,92,246,0.1); top:50%; left:20%; animation-delay:-2s; }

        @keyframes float {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 36px 32px;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--blue), var(--green));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 26px; color: white;
            box-shadow: 0 12px 30px rgba(0,82,204,0.35);
        }
        .logo-wrap h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .logo-wrap p { color: var(--muted); font-size: 13px; }

        /* Bonus banner */
        .bonus {
            background: linear-gradient(135deg, rgba(0,82,204,0.14), rgba(0,229,160,0.08));
            border: 1px solid rgba(0,229,160,0.25);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 28px;
        }
        .bonus-icon {
            width: 44px; height: 44px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--blue), var(--green));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .bonus strong { color: var(--green); }
        .bonus-text { font-size: 12px; color: #94a3b8; margin-top: 3px; }
        .bonus-title { font-weight: 700; color: var(--blue); font-size: 14px; }

        /* Form */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 12px; font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .field label .hint { font-weight: 400; color: var(--muted); text-transform: none; letter-spacing: 0; }

        .inp-wrap { position: relative; }
        .inp-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--blue); font-size: 14px; pointer-events: none;
        }

        input[type=text], input[type=email], input[type=tel], input[type=password] {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, background 0.2s;
        }
        input:focus { outline: none; border-color: var(--blue); background: rgba(255,255,255,0.06); }
        input.valid { border-color: var(--green); }
        input.invalid { border-color: #ef4444; }

        .field-hint {
            font-size: 11px; margin-top: 6px;
            display: none; align-items: center; gap: 5px;
        }
        .field-hint.show { display: flex; }
        .field-hint.ok { color: var(--green); }
        .field-hint.err { color: #ef4444; }
        .field-hint.info { color: #f59e0b; }

        /* Password strength */
        .strength-track {
            height: 3px;
            background: rgba(148,163,184,0.12);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%; border-radius: 10px;
            transition: width 0.3s, background 0.3s;
        }

        /* Terms */
        .terms {
            display: flex; align-items: flex-start; gap: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 12px; margin: 20px 0;
        }
        .terms input[type=checkbox] {
            width: 16px; height: 16px; flex-shrink: 0; padding: 0;
            margin-top: 1px; accent-color: var(--blue);
        }
        .terms span { font-size: 12px; color: #94a3b8; line-height: 1.6; }
        .terms a { color: var(--blue); text-decoration: none; }

        /* Submit */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            border: none; border-radius: 14px;
            color: white; font-size: 15px; font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,82,204,0.3);
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0,82,204,0.45);
        }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .login-link a { color: var(--blue); font-weight: 600; text-decoration: none; }

        @media (max-width: 500px) {
            .card { padding: 24px 20px; }
            .row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h1>Create Account</h1>
            <p>Start your investment journey today</p>
        </div>

        <div class="bonus">
            <div class="bonus-icon"><i class="fas fa-gift"></i></div>
            <div>
                <div class="bonus-title">🎁 ₦1,000 Welcome Bonus!</div>
                <div class="bonus-text">Create your account and get <strong>₦1,000</strong> credited instantly!</div>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Full Name</label>
                <div class="inp-wrap">
                    <i class="fas fa-user inp-icon"></i>
                    <input type="text" id="fullName" placeholder="e.g. John Doe">
                </div>
            </div>
            <div class="field">
                <label>Username <span class="hint">(= your referral code)</span></label>
                <div class="inp-wrap">
                    <i class="fas fa-at inp-icon"></i>
                    <input type="text" id="username" placeholder="e.g. johnwealth" autocomplete="off">
                </div>
                <div class="field-hint" id="usernameFeedback"></div>
            </div>
        </div>

        <div class="field">
            <label>Email Address</label>
            <div class="inp-wrap">
                <i class="fas fa-envelope inp-icon"></i>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
        </div>

        <div class="field">
            <label>Phone Number</label>
            <div class="inp-wrap">
                <i class="fas fa-phone inp-icon"></i>
                <input type="tel" id="phone" placeholder="08012345678">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Password</label>
                <div class="inp-wrap">
                    <i class="fas fa-lock inp-icon"></i>
                    <input type="password" id="password" placeholder="Min. 8 characters">
                </div>
                <div class="strength-track"><div class="strength-fill" id="strengthBar"></div></div>
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <div class="inp-wrap">
                    <i class="fas fa-check-circle inp-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Repeat password">
                </div>
            </div>
        </div>

        <div class="field">
            <label>Referral Code <span class="hint">(optional)</span></label>
            <div class="inp-wrap">
                <i class="fas fa-link inp-icon"></i>
                <input type="text" id="referralCode" placeholder="Referrer's username" autocomplete="off">
            </div>
            <div class="field-hint" id="refFeedback"></div>
        </div>

        <div class="terms">
            <input type="checkbox" id="terms">
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="doRegister()">
            <i class="fas fa-gift"></i> Create Account &amp; Claim ₦1,000
        </button>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
    // ─── Firebase Config ──────────────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
        authDomain: "kinetic-dc8e6.firebaseapp.com",
        projectId: "kinetic-dc8e6",
        storageBucket: "kinetic-dc8e6.firebasestorage.app",
        messagingSenderId: "980527555815",
        appId: "1:980527555815:web:131ccee594e0c8f122ee42"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    const WELCOME_BONUS = 1000;
    let usernameTimer;

    // ─── Pre-fill referral from URL ───────────────────────────────────────────
    const urlRef = new URLSearchParams(window.location.search).get('ref');
    if (urlRef) {
        document.getElementById('referralCode').value = urlRef;
        validateReferral(urlRef);
    }

    // ─── Username availability check ─────────────────────────────────────────
    document.getElementById('username').addEventListener('input', e => {
        const val = e.target.value.toLowerCase().trim();
        clearTimeout(usernameTimer);
        const fb = document.getElementById('usernameFeedback');
        e.target.classList.remove('valid','invalid');
        fb.className = 'field-hint';

        if (val.length < 3) return;

        if (!/^[a-z0-9_]+$/.test(val)) {
            fb.innerHTML = '<i class="fas fa-times-circle"></i> Letters, numbers, underscore only';
            fb.className = 'field-hint show err';
            e.target.classList.add('invalid');
            return;
        }

        fb.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking…';
        fb.className = 'field-hint show info';

        usernameTimer = setTimeout(async () => {
            const exists = await getUserByUsername(val);
            if (exists) {
                fb.innerHTML = '<i class="fas fa-times-circle"></i> Username taken';
                fb.className = 'field-hint show err';
                e.target.classList.add('invalid');
            } else {
                fb.innerHTML = '<i class="fas fa-check-circle"></i> Available — this will be your referral code';
                fb.className = 'field-hint show ok';
                e.target.classList.add('valid');
            }
        }, 600);
    });

    // ─── Password strength ────────────────────────────────────────────────────
    document.getElementById('password').addEventListener('input', e => {
        const pw = e.target.value;
        const bar = document.getElementById('strengthBar');
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;
        const pct = [0, 33, 55, 75, 100][score];
        const col = ['#ef4444','#ef4444','#f59e0b','#3b82f6','#00E5A0'][score];
        bar.style.width = pct + '%';
        bar.style.background = col;
    });

    // ─── Confirm password ─────────────────────────────────────────────────────
    document.getElementById('confirmPassword').addEventListener('input', e => {
        const match = e.target.value === document.getElementById('password').value;
        e.target.classList.toggle('valid', match && e.target.value.length > 0);
        e.target.classList.toggle('invalid', !match && e.target.value.length > 0);
    });

    // ─── Referral code validation ─────────────────────────────────────────────
    let refTimer;
    document.getElementById('referralCode').addEventListener('input', e => {
        clearTimeout(refTimer);
        const val = e.target.value.toLowerCase().trim();
        const fb = document.getElementById('refFeedback');
        fb.className = 'field-hint';
        e.target.classList.remove('valid','invalid');
        if (!val) return;
        refTimer = setTimeout(() => validateReferral(val), 600);
    });

    async function validateReferral(code) {
        const fb = document.getElementById('refFeedback');
        const inp = document.getElementById('referralCode');
        fb.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking…';
        fb.className = 'field-hint show info';
        const user = await getUserByUsername(code.toLowerCase().trim());
        if (user) {
            fb.innerHTML = `<i class="fas fa-check-circle"></i> Valid — referred by @${code}`;
            fb.className = 'field-hint show ok';
            inp.classList.add('valid');
        } else {
            fb.innerHTML = '<i class="fas fa-times-circle"></i> Referral code not found';
            fb.className = 'field-hint show err';
            inp.classList.add('invalid');
        }
    }

    // ─── Helper: find user by username ───────────────────────────────────────
    async function getUserByUsername(username) {
        if (!username || username.length < 3) return null;
        try {
            const snap = await db.collection('users')
                .where('username', '==', username.toLowerCase().trim())
                .limit(1)
                .get();
            return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
        } catch(e) {
            console.warn('getUserByUsername error:', e);
            return null;
        }
    }

    // ─── Main registration ────────────────────────────────────────────────────
    async function doRegister() {
        const fullName        = document.getElementById('fullName').value.trim();
        const username        = document.getElementById('username').value.trim().toLowerCase();
        const email           = document.getElementById('email').value.trim();
        const phone           = document.getElementById('phone').value.trim();
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referralInput   = document.getElementById('referralCode').value.trim().toLowerCase();
        const termsChecked    = document.getElementById('terms').checked;

        // ── Validation ──────────────────────────────────────────────────────
        if (!fullName || fullName.length < 2)
            return alert2('error','Enter your full name (at least 2 characters)');
        if (!username || username.length < 3 || !/^[a-z0-9_]+$/.test(username))
            return alert2('error','Username must be at least 3 characters (letters, numbers, underscore)');
        if (!email || !email.includes('@'))
            return alert2('error','Enter a valid email address');
        if (!phone || phone.replace(/\D/g,'').length < 10)
            return alert2('error','Enter a valid phone number');
        if (password.length < 8)
            return alert2('error','Password must be at least 8 characters');
        if (password !== confirmPassword)
            return alert2('error','Passwords do not match');
        if (!termsChecked)
            return alert2('warning','Please accept the Terms of Service to continue');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account…';

        try {
            // 1. Check username uniqueness
            const existingUser = await getUserByUsername(username);
            if (existingUser) {
                return reset(btn, 'Username already taken. Please choose another.');
            }

            // 2. Resolve referrer chain
            // ── IMPORTANT: we store only ONE field per user: referrerUid
            //    (the direct referrer's UID). The referral chain is derived
            //    at read time by walking: L1 → L2 → L3.
            let referrerUid  = null;   // direct referrer UID  (L1 parent)

            if (referralInput && referralInput !== username) {
                const referrer = await getUserByUsername(referralInput);
                if (referrer) {
                    referrerUid = referrer.id;
                }
            }

            // 3. Create Firebase Auth user
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            const uid  = cred.user.uid;
            await cred.user.updateProfile({ displayName: fullName });

            // 4. Build user document
            // ── KEY DESIGN: only store referrerUid (one field).
            //    The referral page will derive levels by chain-walking.
            const userDoc = {
                uid,
                fullName,
                username,                          // also acts as referral code
                email,
                phone,
                referrerUid:  referrerUid || null, // ← THE ONE REFERRAL FIELD
                referredBy:   referralInput || null,
                balance:       WELCOME_BONUS,
                depositBalance:WELCOME_BONUS,
                withdrawalBalance: 0,
                totalEarnings: WELCOME_BONUS,
                totalInvested: 0,
                totalRefEarnings: 0,
                welcomeBonusPaid: true,
                accountStatus: 'active',
                isAdmin: false,
                createdAt: new Date().toISOString(),
                lastLogin:  new Date().toISOString()
            };

            await db.collection('users').doc(uid).set(userDoc);

            // 5. Welcome bonus transaction
            await db.collection('transactions').add({
                userId:      uid,
                userName:    fullName,
                type:        'welcome_bonus',
                amount:      WELCOME_BONUS,
                status:      'completed',
                description: 'Welcome Bonus – ₦1,000 Credited!',
                createdAt:   new Date().toISOString()
            });

            // 6. SUCCESS
            await Swal.fire({
                icon: 'success',
                title: '🎉 Welcome to Kinetic Wealth!',
                html: `
                    <div style="text-align:center; font-family:'DM Sans',sans-serif;">
                        <div style="font-size:18px; font-weight:700; color:#0052CC; margin-bottom:10px;">Account Created Successfully!</div>
                        <div style="margin: 12px 0;">
                            <div style="font-size:32px; font-weight:800; color:#00E5A0;">₦${WELCOME_BONUS.toLocaleString()}</div>
                            <div style="font-size:12px; color:#94a3b8; margin-top:4px;">Welcome Bonus Credited</div>
                        </div>
                        <div style="background:#1e293b; padding:12px; border-radius:12px; margin-top:12px;">
                            <div style="font-size:11px; color:#94a3b8;">Your Referral Code</div>
                            <div style="font-size:18px; font-weight:800; color:#00E5A0; margin-top:4px;">@${username}</div>
                        </div>
                    </div>`,
                confirmButtonText: 'Go to Dashboard',
                confirmButtonColor: '#0052CC',
                allowOutsideClick: false
            });

            window.location.href = 'home.html';

        } catch (err) {
            console.error('Registration error:', err);
            let msg = 'Registration failed. Please try again.';
            if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered. Please sign in.';
            else if (err.code === 'auth/invalid-email')    msg = 'Invalid email address.';
            else if (err.code === 'auth/weak-password')    msg = 'Password is too weak.';
            else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
            else if (err.message?.includes('permission-denied')) msg = 'Firestore permission denied. Check security rules.';
            reset(btn, msg);
        }
    }

    function alert2(icon, text) {
        return Swal.fire({ icon, text, confirmButtonColor:'#0052CC' });
    }

    function reset(btn, errorMsg) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-gift"></i> Create Account & Claim ₦1,000';
        if (errorMsg) alert2('error', errorMsg);
    }

    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
        if (user) window.location.href = 'home.html';
    });
    </script>
</body>
</html>
