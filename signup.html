<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kinetic Wealth - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0f1e 0%,#020617 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
        .bg-blur{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(80px);opacity:.2;pointer-events:none}
        .blur-1{background:#0052CC;top:-100px;right:-100px}
        .blur-2{background:#00E5A0;bottom:-100px;left:-100px}
        .glass-card{position:relative;z-index:10;max-width:550px;width:100%;background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-radius:32px;border:1px solid rgba(255,255,255,.08);padding:32px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
        .logo{text-align:center;margin-bottom:24px}
        .logo-icon{width:65px;height:65px;background:linear-gradient(135deg,#0052CC,#00E5A0);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;color:#fff;box-shadow:0 10px 25px -5px rgba(0,82,204,.4)}
        h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px}
        .subtitle{text-align:center;color:#94a3b8;font-size:13px}
        .bonus-banner{background:linear-gradient(135deg,rgba(0,82,204,.12),rgba(0,229,160,.08));border:1px solid rgba(0,82,204,.3);border-radius:20px;padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:28px}
        .bonus-icon{width:50px;height:50px;background:linear-gradient(135deg,#0052CC,#00E5A0);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
        .bonus-content{flex:1}
        .bonus-title{font-weight:700;color:#0052CC;font-size:14px;margin-bottom:4px}
        .bonus-text{font-size:12px;color:#94a3b8}
        .bonus-text strong{color:#00E5A0}
        .form-group{margin-bottom:20px}
        label{display:block;color:#e2e8f0;font-size:13px;font-weight:500;margin-bottom:8px}
        .label-hint{color:#64748b;font-weight:400;font-size:11px}
        .input-wrapper{position:relative}
        .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#0052CC;font-size:14px}
        input{width:100%;padding:14px 14px 14px 42px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;transition:all .3s}
        input:focus{outline:none;border-color:#0052CC;background:rgba(255,255,255,.05)}
        input.error{border-color:#ef4444}
        input.success{border-color:#00E5A0}
        .input-feedback{font-size:11px;margin-top:6px;display:none;align-items:center;gap:4px}
        .input-feedback.show{display:flex}
        .input-feedback.error{color:#ef4444}
        .input-feedback.success{color:#00E5A0}
        .input-feedback.checking{color:#f59e0b}
        .password-strength{margin-top:8px;height:4px;background:rgba(148,163,184,.1);border-radius:10px;overflow:hidden}
        .strength-bar{height:100%;width:0%;transition:all .3s;border-radius:10px}
        .strength-weak{background:#ef4444;width:33%}
        .strength-medium{background:#f59e0b;width:66%}
        .strength-strong{background:#00E5A0;width:100%}
        .terms-wrapper{background:rgba(255,255,255,.02);border-radius:14px;padding:12px;margin:20px 0}
        .terms-label{display:flex;align-items:center;gap:10px;cursor:pointer;margin:0}
        .terms-label input{width:18px;height:18px;accent-color:#0052CC}
        .terms-label span{color:#cbd5e1;font-size:12px}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#0052CC,#003D99);border:none;border-radius:16px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Inter',sans-serif}
        .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 25px -5px rgba(0,82,204,.5)}
        .btn:disabled{opacity:.6;cursor:not-allowed}
        .login-link{text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.05);color:#94a3b8;font-size:13px}
        .login-link a{color:#0052CC;text-decoration:none;font-weight:600}
        .ref-banner{background:linear-gradient(135deg,rgba(0,82,204,.2),rgba(0,229,160,.1));border:1px solid rgba(0,82,204,.4);border-radius:16px;padding:14px 18px;margin-bottom:24px;display:none;align-items:center;gap:12px}
        .ref-banner.show{display:flex}
        .ref-banner-icon{width:40px;height:40px;background:linear-gradient(135deg,#0052CC,#00E5A0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
        .ref-banner-text{flex:1}
        .ref-banner-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
        .ref-banner-sub{font-size:12px;color:#94a3b8}
        @media(max-width:550px){.glass-card{padding:24px}h1{font-size:24px}}
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>
    <div class="glass-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h1>Create Account</h1>
            <p class="subtitle">Start your investment journey today</p>
        </div>

        <div class="ref-banner" id="refBanner">
            <div class="ref-banner-icon">🎁</div>
            <div class="ref-banner-text">
                <div class="ref-banner-title">You've been invited!</div>
                <div class="ref-banner-sub" id="refBannerSub">Referral bonus unlocked</div>
            </div>
        </div>

        <div class="bonus-banner">
            <div class="bonus-icon"><i class="fas fa-gift"></i></div>
            <div class="bonus-content">
                <div class="bonus-title">🎁 N1,000 Welcome Bonus!</div>
                <div class="bonus-text">Create your account and get <strong>N1,000</strong> credited instantly to your deposit wallet!</div>
            </div>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper"><i class="fas fa-user input-icon"></i><input type="text" id="fullName" placeholder="Enter your full name" required></div>
            </div>
            <div class="form-group">
                <label>Username <span class="label-hint">(3-20 characters)</span></label>
                <div class="input-wrapper"><i class="fas fa-at input-icon"></i><input type="text" id="username" placeholder="e.g., johnwealth" autocomplete="off"></div>
                <div class="input-feedback" id="usernameFeedback"></div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="email" placeholder="you@example.com" required></div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-wrapper"><i class="fas fa-phone input-icon"></i><input type="tel" id="phone" placeholder="08012345678" required></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="password" placeholder="Create a strong password" required></div>
                <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper"><i class="fas fa-check-circle input-icon"></i><input type="password" id="confirmPassword" placeholder="Confirm your password" required></div>
            </div>
            <div class="form-group">
                <label>Referral Code <span class="label-hint">(optional - enter referrer's username or code)</span></label>
                <div class="input-wrapper"><i class="fas fa-ticket-alt input-icon"></i><input type="text" id="refCode" placeholder="Enter username or referral code" autocomplete="off"></div>
                <div class="input-feedback" id="refFeedback"></div>
            </div>
            <div class="terms-wrapper">
                <label class="terms-label"><input type="checkbox" id="termsCheckbox"><span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span></label>
            </div>
            <button type="submit" class="btn" id="submitBtn"><i class="fas fa-gift"></i> Create Account & Claim N1,000</button>
            <div class="login-link">Already have an account? <a href="login.html">Sign In</a></div>
        </form>
    </div>

    <script>
        // KINETIC WEALTH FIREBASE CONFIG
        const firebaseConfig={apiKey:"AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",authDomain:"kinetic-dc8e6.firebaseapp.com",projectId:"kinetic-dc8e6",storageBucket:"kinetic-dc8e6.firebasestorage.app",messagingSenderId:"980527555815",appId:"1:980527555815:web:131ccee594e0c8f122ee42"};
        if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
        const auth=firebase.auth(),db=firebase.firestore(),FV=firebase.firestore.FieldValue;
        const WELCOME_BONUS=1000;
        let checkTimeout,verifiedReferrerUid=null,pendingRefCode='';

        /* ── URL REF PARAM ── */
        window.addEventListener('DOMContentLoaded',()=>{
            const p=new URLSearchParams(window.location.search);
            const r=p.get('ref')||p.get('code')||'';
            if(r){document.getElementById('refCode').value=r.trim().toUpperCase();document.getElementById('refCode').classList.add('success');verifyRefCode(r.trim().toUpperCase())}
        });

        /* ════════════════════════════════════════════════════
           KEY FIX: Search by BOTH referralCode AND username
           This ensures compatibility with:
           - OLD users who only have 'username' field
           - NEW users who have 'referralCode' field
        ════════════════════════════════════════════════════ */
        let refTimer=null;
        function onRefCodeInput(){
            clearTimeout(refTimer);
            const c=document.getElementById('refCode').value.trim().toUpperCase();
            document.getElementById('refFeedback').className='input-feedback';
            document.getElementById('refCode').classList.remove('success','error');
            verifiedReferrerUid=null;
            if(!c)return;
            document.getElementById('refFeedback').innerHTML='<i class="fas fa-spinner fa-spin"></i> Checking...';
            document.getElementById('refFeedback').className='input-feedback show checking';
            refTimer=setTimeout(()=>verifyRefCode(c),600);
        }

        async function verifyRefCode(code){
            if(!code)return;
            pendingRefCode=code;
            try{
                let foundUser=null,foundBy='';

                // TRY 1: Search by referralCode (new users)
                const s1=await db.collection('users').where('referralCode','==',code).limit(1).get();
                if(!s1.empty){foundUser=s1.docs[0];foundBy='referralCode'}

                // TRY 2: Search by username (old users) - CASE INSENSITIVE
                if(!foundUser){
                    const s2=await db.collection('users').where('username','==',code.toLowerCase()).limit(1).get();
                    if(!s2.empty){foundUser=s2.docs[0];foundBy='username'}
                }

                // TRY 3: Search by username (exact match, case sensitive fallback)
                if(!foundUser){
                    const s3=await db.collection('users').where('username','==',code).limit(1).get();
                    if(!s3.empty){foundUser=s3.docs[0];foundBy='username'}
                }

                if(!foundUser){
                    document.getElementById('refFeedback').innerHTML='<i class="fas fa-times-circle"></i> Invalid referral code or username';
                    document.getElementById('refFeedback').className='input-feedback show error';
                    document.getElementById('refCode').classList.add('error');
                    verifiedReferrerUid=null;pendingRefCode='';
                }else{
                    const r=foundUser.data(),n=r.fullName||r.username||'a friend';
                    verifiedReferrerUid=foundUser.id;
                    document.getElementById('refFeedback').innerHTML='<i class="fas fa-check-circle"></i> Invited by '+n+' (found by '+foundBy+')';
                    document.getElementById('refFeedback').className='input-feedback show success';
                    document.getElementById('refCode').classList.add('success');
                    document.getElementById('refBanner').classList.add('show');
                    document.getElementById('refBannerSub').textContent='Connected with '+n;
                }
            }catch(e){
                document.getElementById('refFeedback').innerHTML='<i class="fas fa-check-circle"></i> Code saved - verified on signup';
                document.getElementById('refFeedback').className='input-feedback show success';
                document.getElementById('refCode').classList.add('success');
            }
        }
        document.getElementById('refCode').addEventListener('input',onRefCodeInput);

        /* ── USERNAME CHECK ── */
        document.getElementById('username').addEventListener('input',async(e)=>{
            const username=e.target.value.toLowerCase().trim(),feedback=document.getElementById('usernameFeedback');
            clearTimeout(checkTimeout);
            if(username.length<3){feedback.className='input-feedback';e.target.classList.remove('success','error');return}
            if(!/^[a-z0-9_]+$/.test(username)){feedback.innerHTML='<i class="fas fa-times-circle"></i> Only letters, numbers, and underscore allowed';feedback.className='input-feedback show error';e.target.classList.add('error');e.target.classList.remove('success');return}
            feedback.innerHTML='<i class="fas fa-spinner fa-spin"></i> Checking...';feedback.className='input-feedback show checking';
            checkTimeout=setTimeout(async()=>{
                try{const s=await db.collection('users').where('username','==',username).limit(1).get();if(!s.empty){feedback.innerHTML='<i class="fas fa-times-circle"></i> Username already taken';feedback.className='input-feedback show error';e.target.classList.add('error');e.target.classList.remove('success')}else{feedback.innerHTML='<i class="fas fa-check-circle"></i> Available!';feedback.className='input-feedback show success';e.target.classList.add('success');e.target.classList.remove('error')}}
                catch(e){feedback.innerHTML='<i class="fas fa-check-circle"></i> Available!';feedback.className='input-feedback show success';e.target.classList.add('success');e.target.classList.remove('error')}
            },500)
        });

        /* ── PASSWORD STRENGTH ── */
        document.getElementById('password').addEventListener('input',(e)=>{
            const pw=e.target.value,bar=document.getElementById('strengthBar');let strength=0;
            if(pw.length>=8)strength++;if(pw.match(/[a-z]/)&&pw.match(/[A-Z]/))strength++;if(pw.match(/[0-9]/))strength++;if(pw.match(/[^a-zA-Z0-9]/))strength++;
            bar.className='strength-bar';if(strength<=1)bar.classList.add('strength-weak');else if(strength<=2)bar.classList.add('strength-medium');else bar.classList.add('strength-strong')
        });

        /* ── CONFIRM PASSWORD ── */
        document.getElementById('confirmPassword').addEventListener('input',(e)=>{
            const password=document.getElementById('password').value,confirm=e.target.value;
            if(confirm.length>0){if(password===confirm){e.target.classList.add('success');e.target.classList.remove('error')}else{e.target.classList.add('error');e.target.classList.remove('success')}}
        });

        /* ── REFERRAL CODE GENERATOR ── */
        function genRefCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='KW';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}

        /* ════════════════════════════════════════════════════
           MAIN SIGNUP
        ════════════════════════════════════════════════════ */
        document.getElementById('registerForm').addEventListener('submit',async(e)=>{
            e.preventDefault();
            const fullName=document.getElementById('fullName').value.trim(),username=document.getElementById('username').value.trim().toLowerCase(),email=document.getElementById('email').value.trim().toLowerCase(),phone=document.getElementById('phone').value.trim(),password=document.getElementById('password').value,confirmPassword=document.getElementById('confirmPassword').value,enteredRC=document.getElementById('refCode').value.trim().toUpperCase(),termsChecked=document.getElementById('termsCheckbox').checked;

            if(!fullName||fullName.length<3){Swal.fire({icon:'error',title:'Error',text:'Please enter your full name',confirmButtonColor:'#0052CC'});return}
            if(!username||username.length<3||!/^[a-z0-9_]+$/.test(username)){Swal.fire({icon:'error',title:'Error',text:'Username must be 3+ characters (letters, numbers, underscore only)',confirmButtonColor:'#0052CC'});return}
            if(!email||!email.includes('@')){Swal.fire({icon:'error',title:'Error',text:'Enter a valid email address',confirmButtonColor:'#0052CC'});return}
            if(!phone||phone.length<10){Swal.fire({icon:'error',title:'Error',text:'Enter a valid phone number',confirmButtonColor:'#0052CC'});return}
            if(password.length<8){Swal.fire({icon:'error',title:'Error',text:'Password must be at least 8 characters',confirmButtonColor:'#0052CC'});return}
            if(password!==confirmPassword){Swal.fire({icon:'error',title:'Error',text:'Passwords do not match',confirmButtonColor:'#0052CC'});return}
            if(!termsChecked){Swal.fire({icon:'warning',title:'Terms Required',text:'Please accept the Terms of Service',confirmButtonColor:'#0052CC'});return}

            const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            let uid=null;

            try{
                /* STEP 1: Create Firebase Auth account */
                const cred=await auth.createUserWithEmailAndPassword(email,password);
                uid=cred.user.uid;

                /* STEP 2: Username uniqueness check */
                const us=await db.collection('users').where('username','==',username).limit(1).get();
                if(!us.empty){await cred.user.delete();Swal.fire({icon:'error',title:'Username already taken',text:'Please choose a different username',confirmButtonColor:'#0052CC'});btn.disabled=false;btn.innerHTML='<i class="fas fa-gift"></i> Create Account & Claim N1,000';return}

                /* STEP 3: Generate unique referral code */
                let myRC=genRefCode(),att=0;
                while(att<5){const s=await db.collection('users').where('referralCode','==',myRC).limit(1).get();if(s.empty)break;myRC=genRefCode();att++;}

                /* STEP 4: Resolve referrer - search by BOTH referralCode AND username */
                let finalRef=verifiedReferrerUid;
                const ctc=enteredRC||pendingRefCode;
                if(!finalRef&&ctc){
                    // Try referralCode first
                    try{const s=await db.collection('users').where('referralCode','==',ctc).limit(1).get();if(!s.empty)finalRef=s.docs[0].id}catch{}
                    // Fallback to username
                    if(!finalRef){try{const s=await db.collection('users').where('username','==',ctc.toLowerCase()).limit(1).get();if(!s.empty)finalRef=s.docs[0].id}catch{}}
                    if(!finalRef){try{const s=await db.collection('users').where('username','==',ctc).limit(1).get();if(!s.empty)finalRef=s.docs[0].id}catch{}}
                }

                /* STEP 5: Write user document */
                await db.collection('users').doc(uid).set({
                    uid:uid,fullName:fullName,username:username,email:email,phone:phone,
                    referralCode:myRC,
                    referrerUid:finalRef||'direct',
                    referredBy:enteredRC||'',
                    depositBalance:WELCOME_BONUS,
                    withdrawalBalance:0,
                    balance:WELCOME_BONUS,
                    totalInvested:0,
                    totalEarnings:WELCOME_BONUS,
                    totalRefEarnings:0,
                    referralCount:0,
                    level1Count:0,
                    level2Count:0,
                    level3Count:0,
                    purchasedPlans:[],
                    welcomeBonusPaid:true,
                    isAdmin:false,
                    accountStatus:'active',
                    createdAt:FV.serverTimestamp(),
                    lastLogin:FV.serverTimestamp()
                });

                /* STEP 6: Transaction log */
                try{await db.collection('transactions').add({userId:uid,userName:fullName||username,type:'welcome_bonus',amount:WELCOME_BONUS,status:'completed',note:'N'+WELCOME_BONUS+' Welcome Bonus - Credited to Deposit Wallet',createdAt:FV.serverTimestamp()})}catch{}

                /* STEP 7: Referral chain - update up to 3 levels */
                if(finalRef&&finalRef!=='direct'){
                    try{
                        let wu=finalRef;const now=FV.serverTimestamp();
                        for(let l=1;l<=3;l++){
                            if(!wu||wu==='direct'||wu==='')break;
                            /* Create doc in referrer's referrals subcollection */
                            await db.collection('users').doc(wu).collection('referrals').doc(uid).set({
                                uid:uid,level:l,commission:l===1?100:l===2?50:25,referredAt:now,fullName:fullName||'',username:username||'',email:email||''
                            });
                            /* Update counter */
                            const cf='level'+l+'Count';
                            await db.collection('users').doc(wu).update({referralCount:FV.increment(l===1?1:0),[cf]:FV.increment(1)});
                            /* Move up chain */
                            try{const us=await db.collection('users').doc(wu).get();if(!us.exists)break;wu=us.data().referrerUid}catch{break}
                        }
                    }catch(e){console.warn('Referral chain error:',e.message)}
                }

                Swal.fire({
                    icon:'success',title:'🎉 Welcome to Kinetic Wealth!',
                    html:'<div style="text-align:center"><div style="font-size:32px;margin-bottom:10px">✅</div><div style="font-size:18px;font-weight:bold;color:#0052CC">Account Created!</div><div style="margin:15px 0"><span style="font-size:24px;font-weight:bold;color:#00E5A0">N'+WELCOME_BONUS.toLocaleString()+'</span><div style="font-size:12px;color:#94a3b8">Welcome Bonus Credited</div></div><div style="background:#1e293b;padding:10px;border-radius:10px;margin-top:10px"><div style="font-size:11px;color:#94a3b8">Your Referral Code</div><div style="font-size:16px;font-weight:bold;color:#00E5A0">'+myRC+'</div></div>'+(finalRef&&finalRef!=='direct'?'<div style="font-size:11px;color:#64748b;margin-top:10px">Referred by: '+enteredRC+'</div>':'')+'</div>',
                    confirmButtonText:'Go to Dashboard',confirmButtonColor:'#0052CC',allowOutsideClick:false
                });
                window.location.href='home.html';

            }catch(err){
                console.error('Signup error:',err.code,err.message);
                if(uid&&err.code!=='permission-denied'){try{const u=auth.currentUser;if(u)await u.delete()}catch{}}
                let msg='Registration failed. Please try again.';
                if(err.code==='auth/email-already-in-use')msg='Email already registered. Try logging in.';
                else if(err.code==='auth/invalid-email')msg='Please enter a valid email address.';
                else if(err.code==='auth/weak-password')msg='Password too weak. Use at least 8 characters.';
                else if(err.code==='auth/network-request-failed')msg='Network error. Check your connection.';
                Swal.fire({icon:'error',title:'Signup Failed',text:msg,confirmButtonColor:'#0052CC'});
                btn.disabled=false;btn.innerHTML='<i class="fas fa-gift"></i> Create Account & Claim N1,000';
            }
        });

        auth.onAuthStateChanged((user)=>{if(user)window.location.href='home.html'});
    </script>
</body>
</html>
