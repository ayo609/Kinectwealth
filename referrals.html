/* ═══════════════════════════════════════════════════════════════════
   BLUE & WHITE THEME — MATCHES SIGNUP PAGE
═══════════════════════════════════════════════════════════════════ */

  --primary:       #0052CC;
  --primary-dark:  #003D99;
  --primary-light: #E5EFFF;
  --bg-main:       #F4F7FB;
  --card-bg:       #FFFFFF;
  --card-bg-inner: #F8FAFC;
  --text-primary:  #0F172A;
  --text-muted:    #64748B;
  --border-light:  #E2E8F0;
  --success:       #059669;
  --success-light: #D1FAE5;
  --danger:        #DC2626;
  --danger-light:  #FEE2E2;
  --warning:       #D97706;
  --warning-light: #FEF3C7;
  --accent:        #3B82F6;
  --level-1-color: #0052CC;
  --level-2-color: #06B6D4;
  --level-3-color: #7C3AED;
}

[data-theme="dark"] {
  --primary:       #3B82F6;
  --primary-dark:  #60A5FA;
  --primary-light: #1E3A8A;
  --bg-main:       #0F172A;
  --card-bg:       #1E293B;
  --card-bg-inner: #151D2A;
  --text-primary:  #F8FAFC;
  --text-muted:    #94A3B8;
  --border-light:  #334155;
  --success:       #10B981;
  --success-light: #064E3B;
  --danger:        #EF4444;
  --danger-light:  #7F1D1D;
  --warning:       #F59E0B;
  --warning-light: #78350F;
  --level-1-color: #3B82F6;
  --level-2-color: #06B6D4;
  --level-3-color: #A78BFA;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: var(--bg-main);
  color: var(--text-primary);

/* ========== HEADER ========== */

.header-row {

.icon-btn {

/* Stats Pills */

}

.stat-pill {

</style>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ═══════════════════════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════════════════════ */
const LEVEL_RATES = { A: 10, B: 3, C: 1 };
let currentUser = null;
let authReady = false;
let myReferralCode = '';
let myReferralLink = '';
let allMembers = [];
let currentLevel = 'A';

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
const fmtNum = (n) => (Number(n) || 0).toLocaleString('en-NG');
const fmtCur = (n) => '₦' + fmtNum;

function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }

/* ═══════════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('kw-theme', newTheme);
  const icon = document.querySelector('#themeToggleBtn i');
  if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

(function() {
  const saved = localStorage.getItem('kw-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => {
    const icon = document.querySelector('#themeToggleBtn i');
    if (icon) icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });
})();

/* ═══════════════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.replace('login.html');
    return;
  }
  currentUser = user;
  authReady = true;
  
  try {
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (!userDoc.exists) {
      window.location.replace('login.html');
      return;
    }
    
    const userData = userDoc.data();
    myReferralCode = userData.referralCode || ('KW' + currentUser.uid.slice(0, 8).toUpperCase());
    myReferralLink = `${window.location.origin}/signup.html?ref=${myReferralCode}`;
    setText('refLinkDisplay', myReferralLink);
    
    // Ensure referral code exists in Firestore
    if (!userData.referralCode) {
      await db.collection('users').doc(currentUser.uid).update({ 
        referralCode: myReferralCode 
      }).catch(() => {});
    }
    
    await loadTeamData();
  } catch (e) {
    console.error('Init error:', e);
  }
});

/* ═══════════════════════════════════════════════════════════════════
   LOAD TEAM DATA — OPTIMIZED
═══════════════════════════════════════════════════════════════════ */
async function loadTeamData() {
  try {
    // 🔥 Query only users who have currentUser as referrer (Level 1)
    const l1Snap = await db.collection('users')
      .where('referrerUid', '==', currentUser.uid)
      .get();
    
    const l1Users = l1Snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    const l1Uids = new Set(l1Users.map(u => u.uid));
    
    // 🔥 Query Level 2 — users whose referrer is in L1
    let l2Users = [];
    if (l1Uids.size > 0) {
      // Batch query for each L1 uid (Firestore supports up to 10 'in' clauses)
      const l1Array = Array.from(l1Uids);
      for (let i = 0; i < l1Array.length; i += 10) {
        const batch = l1Array.slice(i, i + 10);
        const l2Snap = await db.collection('users')
          .where('referrerUid', 'in', batch)
          .get();
        l2Snap.docs.forEach(d => {
          if (!l1Uids.has(d.id)) l2Users.push({ uid: d.id, ...d.data() });
        });
      }
    }
    const l2Uids = new Set(l2Users.map(u => u.uid));
    
    // 🔥 Query Level 3 — users whose referrer is in L2
    let l3Users = [];
    if (l2Uids.size > 0) {
      const l2Array = Array.from(l2Uids);
      for (let i = 0; i < l2Array.length; i += 10) {
        const batch = l2Array.slice(i, i + 10);
        const l3Snap = await db.collection('users')
          .where('referrerUid', 'in', batch)
          .get();
        l3Snap.docs.forEach(d => {
          if (!l1Uids.has(d.id) && !l2Uids.has(d.id)) l3Users.push({ uid: d.id, ...d.data() });
        });
      }
    }
    
    // Enrich all members
    allMembers = [];
    
    for (const u of l1Users) {
      allMembers.push(await enrichMember(u, 'A'));
    }
    for (const u of l2Users) {
      allMembers.push(await enrichMember(u, 'B'));
    }
    for (const u of l3Users) {
      allMembers.push(await enrichMember(u, 'C'));
    }
    
    // Calculate totals
    const l1Count = allMembers.filter(m => m.level === 'A').length;
    const l2Count = allMembers.filter(m => m.level === 'B').length;
    const l3Count = allMembers.filter(m => m.level === 'C').length;
    const totalEarnings = allMembers.reduce((s, m) => s + m.bonus, 0);
    const activeCount = allMembers.filter(m => m.isActive).length;
    const totalInvested = allMembers.reduce((s, m) => s + m.invested, 0);
    
    // Update UI
    setText('levelACount', l1Count);
    setText('levelBCount', l2Count);
    setText('levelCCount', l3Count);
    setText('headerTeamCount', allMembers.length);
    setText('headerEarnings', fmtCur(totalEarnings));
    setText('totalEarningsDisplay', fmtCur(totalEarnings));
    setText('teamMembersCount', allMembers.length);
    setText('activeInvestorsCount', activeCount);
    setText('teamInvestedAmount', fmtCur(totalInvested));
    
    selectLevel('A');
    renderTeamList();
    
  } catch (err) {
    console.error('Team data error:', err);
    document.getElementById('memberList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load</div>
        <div class="empty-text">Please check your connection and refresh</div>
      </div>`;
  }
}

async function enrichMember(user, level) {
  const rate = LEVEL_RATES[level];
  const invested = Number(user.totalInvested) || 0;
  let planName = 'No Plan';
  
  // Only check investments if they have invested
  if (invested >= 10000) {
    try {
      const invSnap = await db.collection('investments')
        .where('userId', '==', user.uid)
        .where('status', '==', 'active')
        .limit(1)
        .get();
      if (!invSnap.empty) {
        planName = invSnap.docs[0].data().planName || 'Active Plan';
      }
    } catch (e) { /* skip */ }
  }
  
  return {
    level,
    uid: user.uid,
    name: user.fullName || user.username || 'User',
    email: user.email || '—',
    plan: planName,
    invested,
    bonus: Math.floor(invested * rate / 100),
    isActive: invested >= 10000,
    joinedAt: user.createdAt ? new Date(user.createdAt.toDate?.() || user.createdAt) : new Date()
  };
}

/* ═══════════════════════════════════════════════════════════════════
   LEVEL SELECTION
═══════════════════════════════════════════════════════════════════ */
function selectLevel(level) {
  currentLevel = level;
  
  ['A','B','C'].forEach(l => {
    document.getElementById(`level${l}Tab`).classList.remove('active');
  });
  document.getElementById(`level${level}Tab`).classList.add('active');
  
  renderTeamList();
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER TEAM LIST
═══════════════════════════════════════════════════════════════════ */
function renderTeamList() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  
  const filtered = allMembers
    .filter(m => m.level === currentLevel)
    .filter(m => !query || m.name.toLowerCase().includes(query) || m.email.toLowerCase().includes(query));
  
  setText('teamListCount', `${filtered.length}`);
  
  const container = document.getElementById('memberList');
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-user-friends"></i></div>
        <div class="empty-title">${query ? 'No matches found' : `No Level ${currentLevel} referrals yet`}</div>
        <div class="empty-text">${query ? 'Try a different search term' : 'Share your link to start building your team!'}</div>
      </div>`;
    return;
  }
  
  container.innerHTML = filtered.map((m, i) => {
    const avatarClass = m.level === 'A' ? 'avatar-l1' : (m.level === 'B' ? 'avatar-l2' : 'avatar-l3');
    const joined = m.joinedAt.toLocaleDateString('en-NG', { day: '2-digit', month: 'short', year: '2-digit' });
    
    return `
      <div class="member-card" style="animation: fadeSlideIn 0.25s ease ${i * 0.03}s both;">
        <div class="member-avatar ${avatarClass}">${m.name.charAt(0).toUpperCase()}</div>
        <div class="member-info">
          <div class="member-name">
            ${m.name}
            <span class="plan-tag ${!m.isActive ? 'inactive' : ''}">${m.plan}</span>
          </div>
          <div class="member-email">${m.email}</div>
          <div class="member-meta">
            <span><i class="far fa-calendar"></i> ${joined}</span>
            <span style="color:${m.isActive ? 'var(--success)' : 'var(--text-muted)'};">
              ${m.isActive ? '● Active' : '○ Inactive'}
            </span>
          </div>
        </div>
        <div class="member-stats">
          <div class="member-invest">${fmtCur(m.invested)}</div>
          <div class="member-bonus">+${fmtCur(m.bonus)}</div>
        </div>
      </div>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   SHARE / COPY
═══════════════════════════════════════════════════════════════════ */
function copyLink() {
  if (!myReferralLink) return;
  navigator.clipboard.writeText(myReferralLink).then(() => {
    Swal.fire({ 
      icon: 'success', 
      title: 'Copied!', 
      text: 'Referral link copied to clipboard', 
      toast: true, 
      position: 'top-end', 
      showConfirmButton: false, 
      timer: 2000 
    });
  });
}

function shareTo(platform) {
  if (!myReferralLink) return;
  const text = '🚀 Join me on Kinetic Wealth! Earn daily returns on your investments!';
  const encodedText = encodeURIComponent(text);
  const encodedLink = encodeURIComponent(myReferralLink);
  
  if (platform === 'whatsapp') {
    window.open(`https://wa.me/?text=${encodedText}%20${encodedLink}`, '_blank');
  } else if (platform === 'telegram') {
    window.open(`https://t.me/share/url?url=${encodedLink}&text=${encodedText}`, '_blank');
  } else if (platform === 'more') {
    if (navigator.share) {
      navigator.share({ title: 'Kinetic Wealth', text: text, url: myReferralLink }).catch(() => {});
    } else {
      copyLink();
    }
  }
}

async function refreshData() {
  const icon = document.querySelector('.fa-sync-alt');
  if (icon) icon.classList.add('fa-spin');
  
  await loadTeamData();
  
  setTimeout(() => { if (icon) icon.classList.remove('fa-spin'); }, 500);
}

   ANIMATION
═══════════════════════════════════════════════════════════════════ */
const animStyle = document.createElement('style');
animStyle.textContent = `
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
`;
document.head.appendChild(animStyle);

// Expose
window.toggleTheme = toggleTheme;
window.selectLevel = selectLevel;
window.renderTeamList = renderTeamList;
window.copyLink = copyLink;
window.shareTo = shareTo;
window.refreshData = refreshData;
</script>
