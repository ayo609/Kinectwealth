<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kinetic Wealth - My Referrals & Downlines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0f1e 0%,#020617 100%);min-height:100vh;color:#e2e8f0;padding-bottom:40px}
        .container{max-width:900px;margin:0 auto;padding:20px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;margin-bottom:24px}
        .back-btn{color:#94a3b8;text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px;transition:color .3s}
        .back-btn:hover{color:#fff}
        .page-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
        .stat-card{background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-radius:20px;border:1px solid rgba(255,255,255,.08);padding:18px;text-align:center;transition:transform .3s}
        .stat-card:hover{transform:translateY(-4px)}
        .stat-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:18px}
        .stat-icon.blue{background:rgba(0,82,204,.15);color:#0052CC}
        .stat-icon.green{background:rgba(0,229,160,.15);color:#00E5A0}
        .stat-icon.purple{background:rgba(139,92,246,.15);color:#8b5cf6}
        .stat-icon.orange{background:rgba(249,115,22,.15);color:#f97316}
        .stat-icon.red{background:rgba(239,68,68,.15);color:#ef4444}
        .stat-icon.teal{background:rgba(20,184,166,.15);color:#14b8a6}
        .stat-value{font-size:22px;font-weight:800;color:#fff;margin-bottom:3px}
        .stat-label{font-size:11px;color:#94a3b8;font-weight:500}
        .referral-section{background:linear-gradient(135deg,rgba(0,82,204,.15),rgba(0,229,160,.08));border:1px solid rgba(0,82,204,.3);border-radius:20px;padding:22px;margin-bottom:24px}
        .referral-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:8px}
        .referral-box{display:flex;gap:10px;align-items:center}
        .referral-input{flex:1;padding:12px 14px;background:rgba(0,0,0,.3);border:1.5px solid rgba(0,82,204,.3);border-radius:14px;color:#00E5A0;font-size:13px;font-family:'Inter',sans-serif;font-weight:600}
        .copy-btn{padding:12px 18px;background:linear-gradient(135deg,#0052CC,#003D99);border:none;border-radius:14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px;white-space:nowrap}
        .copy-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -5px rgba(0,82,204,.4)}
        .copy-btn.copied{background:#00E5A0}
        .level-tabs{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
        .level-tab{padding:10px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;display:flex;align-items:center;gap:6px}
        .level-tab.active{background:linear-gradient(135deg,#0052CC,#003D99);color:#fff;border-color:transparent}
        .level-tab:hover:not(.active){background:rgba(255,255,255,.06)}
        .tab-count{background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;font-size:11px}
        .downlines-container{background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-radius:20px;border:1px solid rgba(255,255,255,.08);padding:22px;min-height:300px}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .section-title{font-size:17px;font-weight:700;color:#fff}
        .section-count{font-size:11px;color:#94a3b8;background:rgba(255,255,255,.05);padding:5px 10px;border-radius:10px}
        .downline-card{display:flex;align-items:center;gap:14px;padding:16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:16px;margin-bottom:12px;transition:all .3s}
        .downline-card:hover{background:rgba(255,255,255,.04);border-color:rgba(0,82,204,.2);transform:translateX(4px)}
        .downline-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0052CC,#00E5A0);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;flex-shrink:0}
        .downline-info{flex:1;min-width:0}
        .downline-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .downline-meta{font-size:11px;color:#64748b;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .downline-badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
        .badge-l1{background:rgba(0,82,204,.15);color:#0052CC}
        .badge-l2{background:rgba(139,92,246,.15);color:#8b5cf6}
        .badge-l3{background:rgba(249,115,22,.15);color:#f97316}
        .downline-stats{display:flex;gap:16px;flex-shrink:0;text-align:center}
        .stat-item{min-width:70px}
        .stat-item-value{font-size:14px;font-weight:700;color:#00E5A0}
        .stat-item-label{font-size:10px;color:#64748b;margin-top:2px}
        .stat-item-value.deposit{color:#f59e0b}
        .empty-state{text-align:center;padding:50px 20px}
        .empty-icon{font-size:44px;color:rgba(148,163,184,.2);margin-bottom:14px}
        .empty-title{font-size:15px;font-weight:600;color:#94a3b8;margin-bottom:6px}
        .empty-text{font-size:12px;color:#64748b;max-width:300px;margin:0 auto}
        .loading-state{text-align:center;padding:50px 20px}
        .loading-spinner{width:36px;height:36px;border:3px solid rgba(0,82,204,.2);border-top-color:#0052CC;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .upline-section{background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-radius:20px;border:1px solid rgba(255,255,255,.08);padding:22px;margin-bottom:24px}
        .upline-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .upline-chain{display:flex;flex-direction:column;gap:10px}
        .upline-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:14px;border:1px solid rgba(255,255,255,.05)}
        .upline-avatar{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#0052CC,#00E5A0);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;flex-shrink:0}
        .upline-info{flex:1}
        .upline-name{font-size:13px;font-weight:600;color:#fff}
        .upline-role{font-size:10px;color:#64748b}
        .upline-arrow{color:#64748b;font-size:12px;align-self:center;text-align:center;padding:4px}
        .team-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
        .team-card{background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:16px;text-align:center}
        .team-count{font-size:26px;font-weight:800;margin-bottom:4px}
        .team-count.l1{color:#0052CC}
        .team-count.l2{color:#8b5cf6}
        .team-count.l3{color:#f97316}
        .team-label{font-size:11px;color:#94a3b8;font-weight:500}
        .team-deposit{font-size:13px;font-weight:600;margin-top:6px}
        .team-deposit.l1{color:#f59e0b}
        .team-deposit.l2{color:#f59e0b}
        .team-deposit.l3{color:#f59e0b}
        @media(max-width:600px){
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .referral-box{flex-direction:column}
            .referral-input{width:100%}
            .copy-btn{width:100%;justify-content:center}
            .downline-card{flex-wrap:wrap}
            .downline-stats{width:100%;justify-content:flex-start;margin-top:8px;padding-left:62px}
            .team-summary{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <h1 class="page-title">My Referrals</h1>
            <div style="width:60px"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                <div class="stat-value" id="totalRefCount">0</div>
                <div class="stat-label">Total Referrals</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-layer-group"></i></div>
                <div class="stat-value" id="activeLevels">0</div>
                <div class="stat-label">Active Levels</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-coins"></i></div>
                <div class="stat-value" id="totalEarnings">N0</div>
                <div class="stat-label">Ref. Earnings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-chart-line"></i></div>
                <div class="stat-value" id="totalDownlines">0</div>
                <div class="stat-label">Total Downlines</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-wallet"></i></div>
                <div class="stat-value" id="totalTeamDeposits">N0</div>
                <div class="stat-label">Team Deposits</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon teal"><i class="fas fa-user-group"></i></div>
                <div class="stat-value" id="totalTeamMembers">0</div>
                <div class="stat-label">Team Size</div>
            </div>
        </div>

        <div class="team-summary" id="teamSummary"></div>

        <div class="referral-section">
            <div class="referral-title"><i class="fas fa-share-nodes"></i> Your Referral Link</div>
            <div class="referral-box">
                <input type="text" class="referral-input" id="referralLink" readonly>
                <button class="copy-btn" id="copyBtn" onclick="copyReferralLink()"><i class="fas fa-copy"></i> Copy Link</button>
            </div>
        </div>

        <div class="upline-section" id="uplineSection" style="display:none">
            <div class="upline-title"><i class="fas fa-arrow-up"></i> My Upline</div>
            <div class="upline-chain" id="uplineChain"></div>
        </div>

        <div class="level-tabs">
            <div class="level-tab active" onclick="switchTab('all',this)"><i class="fas fa-globe"></i> All <span class="tab-count" id="tabAll">0</span></div>
            <div class="level-tab" onclick="switchTab('level1',this)"><i class="fas fa-user"></i> Level 1 <span class="tab-count" id="tabL1">0</span></div>
            <div class="level-tab" onclick="switchTab('level2',this)"><i class="fas fa-users"></i> Level 2 <span class="tab-count" id="tabL2">0</span></div>
            <div class="level-tab" onclick="switchTab('level3',this)"><i class="fas fa-users-viewfinder"></i> Level 3 <span class="tab-count" id="tabL3">0</span></div>
        </div>

        <div class="downlines-container">
            <div class="section-header">
                <div class="section-title" id="listTitle">All Downlines</div>
                <div class="section-count" id="listCount">0 members</div>
            </div>
            <div id="downlinesList">
                <div class="loading-state"><div class="loading-spinner"></div><div style="color:#94a3b8;font-size:13px">Loading your network...</div></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig={apiKey:"AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",authDomain:"kinetic-dc8e6.firebaseapp.com",projectId:"kinetic-dc8e6",storageBucket:"kinetic-dc8e6.firebasestorage.app",messagingSenderId:"980527555815",appId:"1:980527555815:web:131ccee594e0c8f122ee42"};
        firebase.initializeApp(firebaseConfig);
        const auth=firebase.auth(),db=firebase.firestore();
        let currentUser=null,currentUserData=null,allDownlines=[],currentTab='all';
        let level1Deposits=0,level2Deposits=0,level3Deposits=0;

        auth.onAuthStateChanged(async(user)=>{if(!user){window.location.href='login.html';return}currentUser=user;await loadUserData()});

        async function loadUserData(){
            try{
                const doc=await db.collection('users').doc(currentUser.uid).get();
                if(!doc.exists){Swal.fire({icon:'error',title:'Error',text:'User data not found',confirmButtonColor:'#0052CC'});return}
                currentUserData=doc.data();
                const baseUrl=window.location.origin+window.location.pathname.replace('referral.html','signup.html');
                document.getElementById('referralLink').value=baseUrl+'?ref='+currentUserData.username;
                updateStats();
                await loadUpline();
                await loadAllDownlines();
            }catch(error){console.error('Error:',error);Swal.fire({icon:'error',title:'Error',text:'Failed to load data',confirmButtonColor:'#0052CC'})}
        }

        function updateStats(){
            if(!currentUserData)return;
            const l1=currentUserData.level1Count||0,l2=currentUserData.level2Count||0,l3=currentUserData.level3Count||0,total=l1+l2+l3;
            document.getElementById('totalRefCount').textContent=currentUserData.referralCount||0;
            document.getElementById('activeLevels').textContent=(l1>0?1:0)+(l2>0?1:0)+(l3>0?1:0);
            document.getElementById('totalEarnings').textContent='N'+(currentUserData.totalRefEarnings||0).toLocaleString();
            document.getElementById('totalDownlines').textContent=total;
            document.getElementById('totalTeamMembers').textContent=total;
            document.getElementById('tabAll').textContent=total;
            document.getElementById('tabL1').textContent=l1;
            document.getElementById('tabL2').textContent=l2;
            document.getElementById('tabL3').textContent=l3;
        }

        async function loadUpline(){
            if(!currentUserData)return;
            const chain=document.getElementById('uplineChain'),section=document.getElementById('uplineSection');
            chain.innerHTML='';
            const uplineData=[];
            if(currentUserData.level3ReferrerUid){try{const d=(await db.collection('users').doc(currentUserData.level3ReferrerUid).get()).data();if(d)uplineData.push({...d,levelName:'Level 3 (Grandparent)'})}catch(e){}}
            if(currentUserData.level2ReferrerUid){try{const d=(await db.collection('users').doc(currentUserData.level2ReferrerUid).get()).data();if(d)uplineData.push({...d,levelName:'Level 2 (Parent)'})}catch(e){}}
            if(currentUserData.referrerUid){try{const d=(await db.collection('users').doc(currentUserData.referrerUid).get()).data();if(d)uplineData.push({...d,levelName:'Level 1 (Direct Referrer)'})}catch(e){}}
            if(uplineData.length===0){section.style.display='none';return}
            section.style.display='block';
            uplineData.forEach((person,index)=>{
                const initials=person.fullName?person.fullName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2):'?';
                const item=document.createElement('div');item.className='upline-item';
                item.innerHTML='<div class="upline-avatar">'+initials+'</div><div class="upline-info"><div class="upline-name">'+(person.fullName||'Unknown')+'</div><div class="upline-role">@'+(person.username||'unknown')+' &bull; '+person.levelName+'</div></div>';
                chain.appendChild(item);
                if(index<uplineData.length-1){const arrow=document.createElement('div');arrow.className='upline-arrow';arrow.innerHTML='<i class="fas fa-arrow-up"></i>';chain.appendChild(arrow)}
            });
        }

        async function loadAllDownlines(){
            allDownlines=[];level1Deposits=0;level2Deposits=0;level3Deposits=0;
            try{
                console.log('Loading downlines...');
                const l1Q=await db.collection('users').where('referrerUid','==',currentUser.uid).get();
                l1Q.forEach(doc=>{const d=doc.data();allDownlines.push({id:doc.id,...d,displayLevel:1,displayLevelName:'Level 1 (Direct)'});level1Deposits+=d.totalInvested||0});
                const l2Q=await db.collection('users').where('level2ReferrerUid','==',currentUser.uid).get();
                l2Q.forEach(doc=>{const d=doc.data();allDownlines.push({id:doc.id,...d,displayLevel:2,displayLevelName:'Level 2'});level2Deposits+=d.totalInvested||0});
                const l3Q=await db.collection('users').where('level3ReferrerUid','==',currentUser.uid).get();
                l3Q.forEach(doc=>{const d=doc.data();allDownlines.push({id:doc.id,...d,displayLevel:3,displayLevelName:'Level 3'});level3Deposits+=d.totalInvested||0});
                const pathQ=await db.collection('users').where('referralPath','array-contains',currentUser.uid).get();
                pathQ.forEach(doc=>{if(!allDownlines.find(x=>x.id===doc.id)){const d=doc.data();const idx=d.referralPath?d.referralPath.indexOf(currentUser.uid):-1;const lvl=idx!==-1?d.referralPath.length-idx:1;allDownlines.push({id:doc.id,...d,displayLevel:lvl,displayLevelName:'Level '+lvl});if(lvl===1)level1Deposits+=d.totalInvested||0;else if(lvl===2)level2Deposits+=d.totalInvested||0;else level3Deposits+=d.totalInvested||0}});
                console.log('Total: '+allDownlines.length+' | L1: '+l1Q.size+' | L2: '+l2Q.size+' | L3: '+l3Q.size);
                updateTeamSummary();
                renderDownlines();
            }catch(error){console.error('Error:',error);document.getElementById('downlinesList').innerHTML='<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="empty-title">Error Loading Data</div><div class="empty-text">'+error.message+'</div></div>'}
        }

        function updateTeamSummary(){
            const totalDeposits=level1Deposits+level2Deposits+level3Deposits;
            document.getElementById('totalTeamDeposits').textContent='N'+totalDeposits.toLocaleString();
            const container=document.getElementById('teamSummary');
            const l1=currentUserData.level1Count||0,l2=currentUserData.level2Count||0,l3=currentUserData.level3Count||0;
            container.innerHTML='<div class="team-card"><div class="team-count l1">'+l1+'</div><div class="team-label">Level 1 Members</div><div class="team-deposit l1">N'+level1Deposits.toLocaleString()+' deposits</div></div><div class="team-card"><div class="team-count l2">'+l2+'</div><div class="team-label">Level 2 Members</div><div class="team-deposit l2">N'+level2Deposits.toLocaleString()+' deposits</div></div><div class="team-card"><div class="team-count l3">'+l3+'</div><div class="team-label">Level 3 Members</div><div class="team-deposit l3">N'+level3Deposits.toLocaleString()+' deposits</div></div>';
        }

        function renderDownlines(){
            const container=document.getElementById('downlinesList'),listTitle=document.getElementById('listTitle'),listCount=document.getElementById('listCount');
            let filtered=allDownlines;
            if(currentTab==='level1'){filtered=allDownlines.filter(d=>d.displayLevel===1);listTitle.textContent='Level 1 Downlines (Direct)'}
            else if(currentTab==='level2'){filtered=allDownlines.filter(d=>d.displayLevel===2);listTitle.textContent='Level 2 Downlines'}
            else if(currentTab==='level3'){filtered=allDownlines.filter(d=>d.displayLevel===3);listTitle.textContent='Level 3 Downlines'}
            else{listTitle.textContent='All Downlines'}
            listCount.textContent=filtered.length+' member'+(filtered.length!==1?'s':'');
            if(filtered.length===0){container.innerHTML='<div class="empty-state"><div class="empty-icon"><i class="fas fa-users-slash"></i></div><div class="empty-title">No Downlines Yet</div><div class="empty-text">Share your referral link to start building your network and earning from 3 levels!</div></div>';return}
            filtered.sort((a,b)=>{const aT=a.createdAt?(a.createdAt.toDate?a.createdAt.toDate():new Date(a.createdAt)):new Date(0);const bT=b.createdAt?(b.createdAt.toDate?b.createdAt.toDate():new Date(b.createdAt)):new Date(0);return bT-aT});
            container.innerHTML='';
            filtered.forEach(d=>{
                const initials=d.fullName?d.fullName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2):(d.username?d.username.slice(0,2).toUpperCase():'??');
                const joined=d.createdAt?formatDate(d.createdAt):'Recently';
                const badgeClass=d.displayLevel===1?'badge-l1':d.displayLevel===2?'badge-l2':'badge-l3';
                const deposits=d.totalInvested||0;
                const earnings=d.totalEarnings||0;
                const card=document.createElement('div');card.className='downline-card';
                card.innerHTML='<div class="downline-avatar">'+initials+'</div><div class="downline-info"><div class="downline-name">'+(d.fullName||'Unknown User')+'</div><div class="downline-meta"><span>@'+(d.username||'unknown')+'</span><span class="downline-badge '+badgeClass+'">'+d.displayLevelName+'</span><span><i class="fas fa-calendar" style="font-size:9px"></i> '+joined+'</span></div></div><div class="downline-stats"><div class="stat-item"><div class="stat-item-value deposit">N'+deposits.toLocaleString()+'</div><div class="stat-item-label">Deposits</div></div><div class="stat-item"><div class="stat-item-value">N'+earnings.toLocaleString()+'</div><div class="stat-item-label">Earnings</div></div></div>';
                container.appendChild(card);
            });
        }

        function switchTab(tab,el){
            currentTab=tab;
            document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
            if(el)el.classList.add('active');
            else{
                const tabs=document.querySelectorAll('.level-tab');
                if(tab==='all')tabs[0].classList.add('active');
                else if(tab==='level1')tabs[1].classList.add('active');
                else if(tab==='level2')tabs[2].classList.add('active');
                else if(tab==='level3')tabs[3].classList.add('active');
            }
            renderDownlines();
        }

        function copyReferralLink(){
            const input=document.getElementById('referralLink');
            input.select();input.setSelectionRange(0,99999);
            navigator.clipboard.writeText(input.value).then(()=>{
                const btn=document.getElementById('copyBtn');
                const orig=btn.innerHTML;
                btn.innerHTML='<i class="fas fa-check"></i> Copied!';btn.classList.add('copied');
                setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied')},2000);
            });
        }

        function formatDate(ts){
            let date;if(ts&&ts.toDate)date=ts.toDate();else if(ts)date=new Date(ts);else return'Recently';
            const now=new Date(),diff=now-date,days=Math.floor(diff/(1000*60*60*24));
            if(days===0)return'Today';if(days===1)return'Yesterday';if(days<<7)return days+' days ago';if(days<<30)return Math.floor(days/7)+' weeks ago';
            return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        }
    </script>
</body>
