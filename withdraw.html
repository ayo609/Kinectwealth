<html lang="en">
<head>
<meta charset="UTF-8"/>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #FFF9F0;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  min-height: 100vh;
}

/* ========== HEADER - SIMPLE GREEN BAR ========== */
.simple-header {
  background: #2E7D32;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: white;
}

.back-icon {
  font-size: 22px;
  cursor: pointer;
  text-decoration: none;
  color: white;
}

.header-title {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.header-right {
  width: 28px;
}

/* ========== MAIN CONTAINER ========== */
.container {
  max-width: 450px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ========== BIG BALANCE CARD - CIRCULAR STYLE ========== */
.balance-circle {
  background: white;
  border-radius: 60px;
  padding: 28px 24px;
  margin-bottom: 24px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  border: 1px solid #E8DCC8;
}

.balance-label-sm {
  font-size: 13px;
  color: #8D7B5C;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.big-number {
  font-size: 44px;
  font-weight: 800;
  color: #2E7D32;
  line-height: 1;
}

.big-number span {
  font-size: 24px;
}

/* ========== INFO ROW - DOTTED STYLE ========== */
.info-row {
  background: #F5F0E6;
  border-radius: 20px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.info-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #5D4E37;
}

.info-badge i {
  font-size: 14px;
  color: #2E7D32;
}

/* ========== STATUS ALERTS ========== */
.status-alert {
  background: #FFF4E5;
  border-left: 4px solid #F5A623;
  padding: 14px 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-alert i {
  font-size: 20px;
  color: #F5A623;
}

.status-alert-text {
  flex: 1;
  font-size: 13px;
  color: #7A6B52;
}

.status-alert-success {
  background: #E8F5E9;
  border-left-color: #2E7D32;
}

.status-alert-success i {
  color: #2E7D32;
}

/* ========== BANK BOX - BORDERED STYLE ========== */
.bank-box-simple {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #E8DCC8;
}

.bank-row-simple {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px dashed #F0E8DC;
}

.bank-row-simple:last-child {
  border-bottom: none;
}

.bank-label-simple {
  font-size: 12px;
  color: #A08D72;
}

.bank-value-simple {
  font-size: 15px;
  font-weight: 600;
  color: #3E2E1F;
}

.edit-link {
  color: #2E7D32;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
}

/* ========== AMOUNT SELECTOR - BUTTON GROUP ========== */
.section-label {
  font-size: 14px;
  font-weight: 600;
  color: #5D4E37;
  margin-bottom: 12px;
}

.amount-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}

.chip {
  background: #F5F0E6;
  border: none;
  padding: 10px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  color: #5D4E37;
  cursor: pointer;
  transition: all 0.2s;
}

.chip.active {
  background: #2E7D32;
  color: white;
}

/* ========== CUSTOM AMOUNT INPUT ========== */
.custom-input-wrapper {
  background: #F5F0E6;
  border-radius: 16px;
  display: flex;
  align-items: center;
  padding: 4px 4px 4px 20px;
  margin-bottom: 12px;
}

.custom-input-wrapper span {
  font-size: 18px;
  font-weight: 600;
  color: #A08D72;
}

.custom-input-wrapper input {
  flex: 1;
  padding: 14px 12px;
  border: none;
  background: transparent;
  font-size: 16px;
  font-weight: 500;
  outline: none;
  color: #3E2E1F;
}

/* ========== PREVIEW BOX ========== */
.preview-box {
  background: #F8F4ED;
  border-radius: 20px;
  padding: 16px;
  margin: 16px 0;
}

.preview-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
}

.preview-label {
  font-size: 13px;
  color: #A08D72;
}

.preview-value {
  font-weight: 600;
  color: #3E2E1F;
}

.preview-value-green {
  color: #2E7D32;
  font-weight: 700;
}

.preview-value-red {
  color: #D32F2F;
}

.divider-dashed {
  height: 1px;
  background: linear-gradient(90deg, transparent, #E8DCC8, transparent);
  margin: 8px 0;
}

/* ========== PIN INPUT ========== */
.pin-input-wrapper {
  margin: 16px 0;
}

.pin-label {
  font-size: 13px;
  color: #5D4E37;
  margin-bottom: 8px;
  display: block;
}

.pin-field {
  background: #F5F0E6;
  border-radius: 16px;
  padding: 14px 20px;
  width: 100%;
  border: none;
  font-size: 20px;
  letter-spacing: 8px;
  text-align: center;
  outline: none;
  font-weight: 600;
  color: #3E2E1F;
}

/* ========== SUBMIT BUTTON ========== */
.submit-button {
  width: 100%;
  background: #2E7D32;
  color: white;
  border: none;
  padding: 16px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 16px 0;
}

.submit-button:disabled {
  background: #C8D5B9;
  cursor: not-allowed;
}

/* ========== HISTORY SECTION ========== */
.history-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 20px 0 12px;
}

.history-title {
  font-size: 16px;
  font-weight: 600;
  color: #5D4E37;
}

.history-count {
  font-size: 12px;
  color: #A08D72;
}

.timeline-item {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid #F0E8DC;
  display: flex;
  align-items: center;
  gap: 14px;
}

.timeline-dot {
  width: 40px;
  height: 40px;
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.timeline-dot.pending {
  background: #FFF4E5;
  color: #F5A623;
}

.timeline-dot.approved {
  background: #E8F5E9;
  color: #2E7D32;
}

.timeline-dot.rejected {
  background: #FFEBEE;
  color: #D32F2F;
}

.timeline-content {
  flex: 1;
}

.timeline-amount {
  font-weight: 700;
  font-size: 15px;
  color: #3E2E1F;
}

.timeline-date {
  font-size: 11px;
  color: #A08D72;
  margin-top: 2px;
}

.timeline-status {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

.timeline-status.pending {
  background: #FFF4E5;
  color: #F5A623;
}

.timeline-status.approved {
  background: #E8F5E9;
  color: #2E7D32;
}

.empty-history {
  text-align: center;
  padding: 40px 20px;
  background: white;
  border-radius: 20px;
  border: 1px solid #F0E8DC;
}

/* ========== BOTTOM BAR ========== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 1px solid #F0E8DC;
  display: flex;
  justify-content: space-around;
  padding: 12px 20px 20px;
  max-width: 500px;
  margin: 0 auto;
}

.bar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  font-size: 11px;
  color: #A08D72;
}

.bar-item i {
  font-size: 22px;
}

.bar-item.active {
  color: #2E7D32;
}

/* ========== EMPTY STATE ========== */
.empty-block {
  text-align: center;
  padding: 40px 20px;
  background: white;
  border-radius: 20px;
  border: 1px solid #F0E8DC;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<header class="simple-header">
  <a href="home.html" class="back-icon">
    <i class="fas fa-arrow-left"></i>
  </a>
  <div class="header-title">Cash Out</div>
  <div class="header-right"></div>
</header>

<div class="container">
  
  <!-- Big Circular Balance -->
  <div class="balance-circle">
    <div class="balance-label-sm">Available to withdraw</div>
    <div class="big-number">
      ₦<span id="withdrawBalance">0</span>
    </div>
  </div>

  <!-- Info Row -->
  <div class="info-row">

    <div class="info-badge"><i class="fas fa-clock"></i> 10AM-5PM</div>
  </div>

  <!-- Status Alerts Container -->
  <div id="statusAlert"></div>

  <!-- Bank Account Box -->
  <div class="bank-box-simple">

      <div style="font-weight: 600; color: #3E2E1F;">Receiving account</div>

    </div>
    <div id="bankDisplay">
      <div class="bank-row-simple">
        <div class="bank-label-simple">Bank</div>
        <div class="bank-value-simple">—</div>
      </div>
      <div class="bank-row-simple">
        <div class="bank-label-simple">Account Name</div>
        <div class="bank-value-simple">—</div>
      </div>
      <div class="bank-row-simple">
        <div class="bank-label-simple">Account Number</div>

  <!-- Main Form Area -->
  <div id="mainContent"></div>

  <!-- History Header -->

  <div id="historyList"></div>

</div>

<div class="bottom-bar">
  <a href="home.html" class="bar-item"><i class="fas fa-chart-line"></i><span>Home</span></a>
  <a href="plans.html" class="bar-item"><i class="fas fa-layer-group"></i><span>Plans</span></a>
  <a href="deposit.html" class="bar-item"><i class="fas fa-plus-circle"></i><span>Deposit</span></a>
  <a href="withdraw.html" class="bar-item active"><i class="fas fa-minus-circle"></i><span>Withdraw</span></a>
  <a href="profile.html" class="bar-item"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIG - YOUR CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;

/* ═══════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════ */
const MIN_WITHDRAW = 1500;
const FEE_PERCENT = 15;
const OPEN_HOUR = 10;
const CLOSE_HOUR = 17;
const WEEKENDS = ['Saturday', 'Sunday'];

const QUICK_AMOUNTS = [2000, 5000, 10000, 20000, 50000, 100000];

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
function formatNum(n) {
  return (Number(n) || 0).toLocaleString('en-NG');
}

function formatCurr(n) {
  return '₦' + formatNum(n);
}

function hashPin(pin) {
  let hash = 0;
  for (let i = 0; i < pin.length; i++) {
    hash = ((hash << 5) - hash) + pin.charCodeAt(i);
    hash |= 0;
  }
  return 'KW-' + Math.abs(hash).toString(16).toUpperCase();
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isWeekday() {
  const day = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  return !WEEKENDS.includes(day);
}

function isOpenNow() {
  if (!isWeekday()) return false;
  const hour = new Date().getHours();
  return hour >= OPEN_HOUR && hour < CLOSE_HOUR;
}

function getNextOpenText() {
  const now = new Date();
  const day = now.toLocaleDateString('en-US', { weekday: 'long' });
  if (WEEKENDS.includes(day)) {
    return `Opens Monday at ${OPEN_HOUR}:00 AM`;
  }
  if (now.getHours() < OPEN_HOUR) {
    return `Opens today at ${OPEN_HOUR}:00 AM`;
  }
  return `Opens tomorrow at ${OPEN_HOUR}:00 AM`;
}

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════════════════════════════════ */
let currentUser = null;
let userData = null;
let withdrawBalance = 0;
let hasActivePlan = false;
let selectedAmount = 0;

/* ═══════════════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = user;
  await loadAllData();
});

async function loadAllData() {
  const doc = await db.collection('users').doc(currentUser.uid).get();
  if (!doc.exists) {
    window.location.href = 'login.html';
    return;
  }
  userData = doc.data();
  withdrawBalance = userData.withdrawalBalance || 0;
  document.getElementById('withdrawBalance').innerText = formatNum(withdrawBalance);
  
  // Check active plan
  const investSnap = await db.collection('investments')
    .where('userId', '==', currentUser.uid)
    .where('status', '==', 'active')
    .limit(1)
    .get();
  hasActivePlan = !investSnap.empty;
  
  renderBankDisplay();
  renderStatusAlert();
  await renderMainContent();
  await loadHistory();
}

function renderBankDisplay() {
  const bank = userData.bankDetails || {};
  const container = document.getElementById('bankDisplay');
  if (bank.isBound && bank.bankName) {
    container.innerHTML = `
      <div class="bank-row-simple">
        <div class="bank-label-simple">Bank</div>
        <div class="bank-value-simple">${bank.bankName || '—'}</div>
      </div>
      <div class="bank-row-simple">
        <div class="bank-label-simple">Account Name</div>
        <div class="bank-value-simple">${bank.accountName || '—'}</div>
      </div>
      <div class="bank-row-simple">
        <div class="bank-label-simple">Account Number</div>
        <div class="bank-value-simple">${bank.accountNumber || '—'}</div>
      </div>
    `;
  } else {
    container.innerHTML = `
      <div class="bank-row-simple">
        <div class="bank-label-simple">Status</div>
        <div class="bank-value-simple">No account bound</div>
      </div>
      <div style="margin-top: 12px;">
        <a href="bind-wallet.html" style="background: #2E7D32; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-size: 13px; display: inline-block;">
          <i class="fas fa-plus"></i> Bind Account
        </a>
      </div>
    `;
  }
}

function renderStatusAlert() {
  const container = document.getElementById('statusAlert');
  if (!hasActivePlan) {
    container.innerHTML = `
      <div class="status-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <div class="status-alert-text">No active investment plan. You need an active plan to withdraw.</div>
      </div>`;
    return;
  }
  if (!isOpenNow()) {
    container.innerHTML = `
      <div class="status-alert">
        <i class="fas fa-clock"></i>
        <div class="status-alert-text">${getNextOpenText()}</div>
      </div>`;
    return;
  }
  container.innerHTML = `
    <div class="status-alert status-alert-success">
      <i class="fas fa-check-circle"></i>
      <div class="status-alert-text">Withdrawal window is open! (${OPEN_HOUR}:00 - ${CLOSE_HOUR}:00)</div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════════════════════ */
async function renderMainContent() {
  const container = document.getElementById('mainContent');
  
  // Check all conditions
  if (!hasActivePlan) {
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">🔒</div>
        <div class="empty-icon" style="font-size: 16px; margin-top: 8px;">Active plan required</div>
        <a href="plans.html" style="display: inline-block; margin-top: 16px; background: #2E7D32; color: white; padding: 12px 24px; border-radius: 40px; text-decoration: none;">View plans →</a>
      </div>`;
    return;
  }
  
  if (!isOpenNow()) {
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">⏰</div>
        <div class="empty-icon" style="font-size: 16px; margin-top: 8px;">${getNextOpenText()}</div>
      </div>`;
    return;
  }
  
  const alreadyWithdrawn = await hasWithdrawnToday();
  if (alreadyWithdrawn) {
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">✅</div>
        <div class="empty-icon" style="font-size: 16px; margin-top: 8px;">You've withdrawn today</div>
        <div style="font-size: 13px; color: #8D7B5C; margin-top: 8px;">Next available tomorrow</div>
      </div>`;
    return;
  }
  
  const bank = userData.bankDetails || {};
  if (!bank.isBound) {
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">🏦</div>
        <div class="empty-icon" style="font-size: 16px; margin-top: 8px;">No withdrawal account</div>
        <a href="bind-wallet.html" style="display: inline-block; margin-top: 16px; background: #2E7D32; color: white; padding: 12px 24px; border-radius: 40px; text-decoration: none;">Bind account →</a>
      </div>`;
    return;
  }
  
  if (withdrawBalance < MIN_WITHDRAW) {
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">💰</div>
        <div class="empty-icon" style="font-size: 16px; margin-top: 8px;">Balance too low</div>
        <div style="font-size: 13px; color: #8D7B5C; margin-top: 8px;">Need at least ₦${formatNum(MIN_WITHDRAW)}</div>
      </div>`;
    return;
  }
  
  if (!userData.withdrawalPin) {
    renderSetPinForm(container);
  } else {
    renderWithdrawForm(container);
  }
}

function renderSetPinForm(container) {
  container.innerHTML = `
    <div class="bank-box-simple">
      <div style="font-weight: 600; margin-bottom: 16px;">🔐 Set withdrawal PIN</div>
      <input type="password" id="newPin" class="pin-field" placeholder="••••" maxlength="4" style="letter-spacing: 8px;">
      <button onclick="setPin()" class="submit-button" style="margin-top: 16px;">
        <i class="fas fa-lock"></i> Create PIN
      </button>
    </div>
  `;
}

function renderWithdrawForm(container) {
  const chips = QUICK_AMOUNTS.filter(a => a <= withdrawBalance).map(amt => `
    <button class="chip" onclick="selectAmount(${amt}, this)">₦${formatNum(amt)}</button>
  `).join('');
  
  const fee = Math.floor(selectedAmount * FEE_PERCENT / 100);
  const receive = selectedAmount - fee;
  
  container.innerHTML = `
    <div class="bank-box-simple">
      <div class="section-label">💰 How much?</div>
      <div class="amount-chips" id="chipContainer">
        ${chips || '<span style="color:#A08D72;">No quick amounts available</span>'}
      </div>
      
      <div class="custom-input-wrapper">
        <span>₦</span>
        <input type="number" id="amountInput" placeholder="Custom amount" min="${MIN_WITHDRAW}" max="${withdrawBalance}" oninput="onAmountChange(this.value)">
      </div>
      
      <div id="previewArea" style="${selectedAmount >= MIN_WITHDRAW ? 'display: block;' : 'display: none;'}">
        <div class="preview-box">
          <div class="preview-row">
            <span class="preview-label">You request</span>
            <span class="preview-value">₦${formatNum(selectedAmount)}</span>
          </div>
          <div class="preview-row">
            <span class="preview-label">Fee (${FEE_PERCENT}%)</span>
            <span class="preview-value preview-value-red">-₦${formatNum(fee)}</span>
          </div>
          <div class="divider-dashed"></div>
          <div class="preview-row">
            <span class="preview-label">You receive</span>
            <span class="preview-value preview-value-green">₦${formatNum(receive)}</span>
          </div>
        </div>
      </div>
      
      <div class="pin-input-wrapper">
        <label class="pin-label">Withdrawal PIN</label>
        <input type="password" id="pinInput" class="pin-field" placeholder="••••" maxlength="4" style="letter-spacing: 8px;">
      </div>
      
      <button onclick="submitWithdraw()" class="submit-button" id="submitBtn">
        <i class="fas fa-arrow-right"></i> Confirm withdrawal
      </button>
    </div>
  `;
  
  if (selectedAmount >= MIN_WITHDRAW) {
    updatePreview(selectedAmount);
  }
}

function selectAmount(amount, btn) {
  selectedAmount = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const amountInput = document.getElementById('amountInput');
  if (amountInput) amountInput.value = amount;
  
  const preview = document.getElementById('previewArea');
  if (preview) preview.style.display = 'block';
  updatePreview(amount);
}

function onAmountChange(value) {
  const amount = parseInt(value) || 0;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  
  if (amount >= MIN_WITHDRAW && amount <= withdrawBalance) {
    selectedAmount = amount;
    const preview = document.getElementById('previewArea');
    if (preview) preview.style.display = 'block';
    updatePreview(amount);
  } else {
    selectedAmount = 0;
    const preview = document.getElementById('previewArea');
    if (preview) preview.style.display = 'none';
  }
}

function updatePreview(amount) {
  const fee = Math.floor(amount * FEE_PERCENT / 100);
  const receive = amount - fee;
  const previewDiv = document.querySelector('.preview-box');
  if (previewDiv) {
    previewDiv.innerHTML = `
      <div class="preview-row">
        <span class="preview-label">You request</span>
        <span class="preview-value">₦${formatNum(amount)}</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">Fee (${FEE_PERCENT}%)</span>
        <span class="preview-value preview-value-red">-₦${formatNum(fee)}</span>
      </div>
      <div class="divider-dashed"></div>
      <div class="preview-row">
        <span class="preview-label">You receive</span>
        <span class="preview-value preview-value-green">₦${formatNum(receive)}</span>
      </div>
    `;
  }
}

/* ═══════════════════════════════════════════════════════════════════
   SET PIN
═══════════════════════════════════════════════════════════════════ */
async function setPin() {
  const pin = document.getElementById('newPin')?.value;
  if (!pin || pin.length !== 4 || !/^\d+$/.test(pin)) {
    Swal.fire({ icon: 'warning', title: 'Invalid PIN', text: 'Enter 4 digits only', confirmButtonColor: '#2E7D32' });
    return;
  }
  await db.collection('users').doc(currentUser.uid).update({ withdrawalPin: hashPin(pin) });
  Swal.fire({ icon: 'success', title: 'PIN set!', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
  await loadAllData();
}

/* ═══════════════════════════════════════════════════════════════════
   SUBMIT WITHDRAWAL
═══════════════════════════════════════════════════════════════════ */
async function hasWithdrawnToday() {
  const snap = await db.collection('withdrawals')
    .where('userId', '==', currentUser.uid)
    .where('withdrawalDate', '==', getTodayStr())
    .limit(1)
    .get();
  return !snap.empty;
}

async function submitWithdraw() {
  if (!hasActivePlan) {
    Swal.fire({ icon: 'error', title: 'No active plan', text: 'You need an active investment plan', confirmButtonColor: '#2E7D32' });
    return;
  }
  if (!isOpenNow()) {
    Swal.fire({ icon: 'error', title: 'Window closed', text: getNextOpenText(), confirmButtonColor: '#2E7D32' });
    return;
  }
  if (await hasWithdrawnToday()) {
    Swal.fire({ icon: 'error', title: 'Daily limit', text: 'You already withdrew today', confirmButtonColor: '#2E7D32' });
    return;
  }
  
  if (selectedAmount < MIN_WITHDRAW) {
    Swal.fire({ icon: 'warning', title: 'Too low', text: `Minimum ₦${formatNum(MIN_WITHDRAW)}`, confirmButtonColor: '#2E7D32' });
    return;
  }
  if (selectedAmount > withdrawBalance) {
    Swal.fire({ icon: 'warning', title: 'Insufficient', text: 'Amount exceeds your balance', confirmButtonColor: '#2E7D32' });
    return;
  }
  
  const pin = document.getElementById('pinInput')?.value;
  if (!pin || pin.length !== 4) {
    Swal.fire({ icon: 'warning', title: 'PIN required', text: 'Enter your 4-digit PIN', confirmButtonColor: '#2E7D32' });
    return;
  }
  if (hashPin(pin) !== userData.withdrawalPin) {
    Swal.fire({ icon: 'error', title: 'Wrong PIN', text: 'The PIN you entered is incorrect', confirmButtonColor: '#2E7D32' });
    return;
  }
  
  const fee = Math.floor(selectedAmount * FEE_PERCENT / 100);
  const receive = selectedAmount - fee;
  const bank = userData.bankDetails || {};
  
  const confirm = await Swal.fire({
    title: 'Confirm withdrawal',
    html: `
      <div style="text-align: left;">
        <div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>Amount</span><span><strong>₦${formatNum(selectedAmount)}</strong></span></div>
        <div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>Fee (${FEE_PERCENT}%)</span><span style="color:#D32F2F;">-₦${formatNum(fee)}</span></div>
        <div style="display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid #E8DCC8; margin-top: 4px; padding-top: 8px;"><span>You receive</span><span style="color:#2E7D32;"><strong>₦${formatNum(receive)}</strong></span></div>
        <div style="margin-top: 12px; padding-top: 8px; border-top: 1px solid #E8DCC8;"><span>To: ${bank.bankName || '—'} · ${bank.accountNumber || '—'}</span></div>
      </div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Confirm',
    cancelButtonText: 'Cancel',
    confirmButtonColor: '#2E7D32'
  });
  
  if (!confirm.isConfirmed) return;
  
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const refCode = 'WD-' + Date.now().toString(36).toUpperCase().slice(-8);
    const today = getTodayStr();
    
    const batch = db.batch();
    batch.update(db.collection('users').doc(currentUser.uid), {
      withdrawalBalance: FV.increment(-selectedAmount),
      lastWithdrawalDate: today
    });
    
    batch.set(db.collection('withdrawals').doc(), {
      userId: currentUser.uid,
      userName: userData.fullName || userData.username || 'User',
      amount: selectedAmount,
      feeAmount: fee,
      feePercent: FEE_PERCENT,
      receiveAmount: receive,
      refCode: refCode,
      status: 'pending',
      bankName: bank.bankName,
      accountName: bank.accountName,
      accountNumber: bank.accountNumber,
      withdrawalDate: today,
      requestedAt: FV.serverTimestamp()
    });
    
    await batch.commit();
    
    Swal.fire({
      icon: 'success',
      title: 'Submitted!',
      html: `<div><strong>₦${formatNum(receive)}</strong> will be sent to your account</div><div style="font-size: 12px; margin-top: 8px;">Ref: ${refCode}</div>`,
      confirmButtonColor: '#2E7D32'
    });
    
    await loadAllData();
    
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'Failed', text: err.message, confirmButtonColor: '#D32F2F' });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   LOAD HISTORY
═══════════════════════════════════════════════════════════════════ */
async function loadHistory() {
  const container = document.getElementById('historyList');
  try {
    const snap = await db.collection('withdrawals')
      .where('userId', '==', currentUser.uid)
      .orderBy('requestedAt', 'desc')
      .limit(15)
      .get();
    
    document.getElementById('historyCount').innerHTML = `${snap.size} requests`;
    
    if (snap.empty) {
      container.innerHTML = `<div class="empty-history"><div class="empty-icon">📭</div><div style="color:#A08D72;">No withdrawal requests yet</div></div>`;
      return;
    }
    
    container.innerHTML = '';
    snap.docs.forEach(doc => {
      const data = doc.data();
      const status = data.status || 'pending';
      const date = data.requestedAt?.toDate() || new Date();
      const dotClass = status === 'pending' ? 'pending' : (status === 'approved' ? 'approved' : 'rejected');
      const dotIcon = status === 'pending' ? '⏳' : (status === 'approved' ? '✅' : '❌');
      const statusText = status === 'pending' ? 'Pending' : (status === 'approved' ? 'Approved' : 'Rejected');
      
      container.innerHTML += `
        <div class="timeline-item">
          <div class="timeline-dot ${dotClass}">${dotIcon}</div>
          <div class="timeline-content">
            <div class="timeline-amount">₦${formatNum(data.amount)}</div>
            <div class="timeline-date">${date.toLocaleDateString()} · ${data.refCode || ''}</div>
          </div>
          <div class="timeline-status ${status}">${statusText}</div>
        </div>
      `;
    });
  } catch (err) {
    container.innerHTML = `<div class="empty-history">Error loading history</div>`;
  }
}

window.selectAmount = selectAmount;
window.onAmountChange = onAmountChange;
window.setPin = setPin;
window.submitWithdraw = submitWithdraw;
</script>
