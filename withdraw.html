<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════════
   BLUE & WHITE THEME — MATCHES SIGNUP PAGE
═══════════════════════════════════════════════════════════════════ */
:root {
  --primary:       #0052CC;
  --primary-dark:  #003D99;
  --primary-light: #E5EFFF;
  --bg-main:       #F4F7FB;
  --card-bg:       #FFFFFF;
  --card-bg-inner: #F8FAFC;
  --text-primary:  #0F172A;
  --text-muted:    #64748B;
  --border-light:  #E2E8F0;
  --success:       #059669;
  --success-light: #D1FAE5;
  --danger:        #DC2626;
  --danger-light:  #FEE2E2;
  --warning:       #D97706;
  --warning-light: #FEF3C7;
}

[data-theme="dark"] {
  --primary:       #3B82F6;
  --primary-dark:  #60A5FA;
  --primary-light: #1E3A8A;
  --bg-main:       #0F172A;
  --card-bg:       #1E293B;
  --card-bg-inner: #151D2A;
  --text-primary:  #F8FAFC;
  --text-muted:    #94A3B8;
  --border-light:  #334155;
  --success:       #10B981;
  --success-light: #064E3B;
  --danger:        #EF4444;
  --danger-light:  #7F1D1D;
  --warning:       #F59E0B;
  --warning-light: #78350F;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 100px;
  transition: background-color 0.3s, color 0.3s;
}

/* ========== HEADER ========== */
.app-header {
  background: var(--primary);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(0, 82, 204, 0.15);
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 500px;
  margin: 0 auto;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #fff;
  font-size: 15px;
  text-decoration: none;
  border: none;
  transition: background 0.2s;
}

.back-btn:active { background: rgba(255,255,255,0.35); }

.header-title {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #fff;
  font-size: 15px;
  border: none;
  transition: background 0.2s;
}

.icon-btn:active { background: rgba(255,255,255,0.35); }

/* ========== MAIN ========== */
.main-container {
  max-width: 500px;
  margin: 0 auto;
  padding: 16px 16px 100px;
}

/* Balance Card */
.balance-card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: 24px;
  margin-bottom: 16px;
  text-align: center;
  border: 1px solid var(--border-light);
  box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}

.balance-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.balance-amount {
  font-size: 42px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -1px;
}

/* Info Row */
.info-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.info-pill {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-pill i {
  color: var(--primary);
  font-size: 12px;
}

/* Alert */
.alert-box {
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  font-weight: 500;
}

.alert-box.warning {
  background: var(--warning-light);
  color: var(--warning);
  border-left: 4px solid var(--warning);
}

.alert-box.success {
  background: var(--success-light);
  color: var(--success);
  border-left: 4px solid var(--success);
}

.alert-box.error {
  background: var(--danger-light);
  color: var(--danger);
  border-left: 4px solid var(--danger);
}

.alert-box i { font-size: 18px; flex-shrink: 0; }
.alert-text { flex: 1; line-height: 1.4; }

/* Bank Card */
.bank-card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  border: 1px solid var(--border-light);
}

.bank-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.bank-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.bank-edit {
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
}

.bank-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}

.bank-row:last-child { border-bottom: none; }

.bank-row-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

.bank-row-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

/* Section */
.section-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Amount Chips */
.amount-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.chip {
  background: var(--card-bg);
  border: 1.5px solid var(--border-light);
  padding: 10px 18px;
  border-radius: 25px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.chip:active { transform: scale(0.96); }

.chip.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* Custom Input */
.custom-input-wrap {
  background: var(--card-bg-inner);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  display: flex;
  align-items: center;
  padding: 2px 2px 2px 16px;
  margin-bottom: 12px;
}

.custom-input-wrap .prefix {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-muted);
}

.custom-input-wrap input {
  flex: 1;
  padding: 14px 12px;
  border: none;
  background: transparent;
  font-size: 15px;
  font-weight: 500;
  outline: none;
  color: var(--text-primary);
  font-family: inherit;
}

/* Preview */
.preview-box {
  background: var(--card-bg-inner);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--border-light);
}

.preview-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  font-size: 13px;
}

.preview-label { color: var(--text-muted); }
.preview-value { font-weight: 600; color: var(--text-primary); }
.preview-value.green { color: var(--success); font-weight: 700; }
.preview-value.red { color: var(--danger); }

.preview-divider {
  height: 1px;
  background: var(--border-light);
  margin: 8px 0;
}

/* PIN Input */
.pin-wrap { margin-bottom: 16px; }

.pin-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}

.pin-input {
  background: var(--card-bg-inner);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 14px 20px;
  width: 100%;
  border: 1px solid var(--border-light);
  font-size: 20px;
  letter-spacing: 8px;
  text-align: center;
  outline: none;
  font-weight: 600;
  color: var(--text-primary);
  font-family: inherit;
  transition: border-color 0.2s;
}

.pin-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

/* Submit Button */
.submit-btn {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
  transition: all 0.2s;
}

.submit-btn:active { background: var(--primary-dark); transform: scale(0.98); }

.submit-btn:disabled {
  background: #94A3B8;
  cursor: not-allowed;
}

/* Empty State */
.empty-block {
  text-align: center;
  padding: 36px 20px;
  background: var(--card-bg);
  border-radius: 18px;
  border: 2px dashed var(--border-light);
}

.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.empty-text { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }

.action-link {
  display: inline-block;
  padding: 12px 24px;
  background: var(--primary);
  color: #fff;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

/* History */
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0 12px;
}

.history-title {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--card-bg-inner);
  padding: 4px 10px;
  border-radius: 20px;
}

.history-item {
  background: var(--card-bg);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 12px;
}

.history-dot {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.history-dot.pending { background: var(--warning-light); color: var(--warning); }
.history-dot.approved { background: var(--success-light); color: var(--success); }
.history-dot.rejected { background: var(--danger-light); color: var(--danger); }

.history-info { flex: 1; }
.history-amount { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.history-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.history-status {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

.history-status.pending { background: var(--warning-light); color: var(--warning); }
.history-status.approved { background: var(--success-light); color: var(--success); }
.history-status.rejected { background: var(--danger-light); color: var(--danger); }

/* Bottom Tab Bar */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card-bg); border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-around; padding: 10px 16px 22px;
  max-width: 500px; margin: 0 auto; z-index: 100;
}

.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; font-size: 10px; font-weight: 600; color: var(--text-muted);
  transition: color 0.2s;
}

.tab-item i { font-size: 20px; }
.tab-item.active { color: var(--primary); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">

</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">

</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;

/* ═══════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════ */
const MIN_WITHDRAW = 1500;
const FEE_PERCENT = 15;
const OPEN_HOUR = 10;
const CLOSE_HOUR = 17;
const WEEKEND_DAYS = ['Saturday', 'Sunday'];
const QUICK_AMOUNTS = [2000, 5000, 10000, 20000, 50000, 100000];

/* ═══════════════════════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════════════════════ */
let currentUser = null;
let authReady = false;
let userData = null;
let withdrawBalance = 0;
let hasActivePlan = false;
let selectedAmount = 0;

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
const fmtNum = (n) => (Number(n) || 0).toLocaleString('en-NG');
const fmtCur = (n) => '₦' + fmtNum(n);

function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }

function hashPin(pin) {
  let hash = 0;
  for (let i = 0; i < pin.length; i++) {
    hash = ((hash << 5) - hash) + pin.charCodeAt(i);
    hash |= 0;
  }
  return 'KW-' + Math.abs(hash).toString(16).toUpperCase();
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isWeekday() {
  return !WEEKEND_DAYS.includes(new Date().toLocaleDateString('en-US', { weekday: 'long' }));
}

function isOpenNow() {
  if (!isWeekday()) return false;
  const h = new Date().getHours();
  return h >= OPEN_HOUR && h < CLOSE_HOUR;
}

function getNextOpenText() {
  const now = new Date();
  const day = now.toLocaleDateString('en-US', { weekday: 'long' });
  if (WEEKEND_DAYS.includes(day)) return `Opens Monday at ${OPEN_HOUR}:00 AM`;
  if (now.getHours() < OPEN_HOUR) return `Opens today at ${OPEN_HOUR}:00 AM`;
  return `Opens tomorrow at ${OPEN_HOUR}:00 AM`;
}

/* ═══════════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('kw-theme', newTheme);
  const icon = document.querySelector('#themeToggleBtn i');
  if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

(function() {
  const saved = localStorage.getItem('kw-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => {
    const icon = document.querySelector('#themeToggleBtn i');
    if (icon) icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  });
})();

/* ═══════════════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.replace('login.html');
    return;
  }
  currentUser = user;
  authReady = true;
  await loadAllData();
});

/* ═══════════════════════════════════════════════════════════════════
   LOAD ALL
═══════════════════════════════════════════════════════════════════ */
async function loadAllData() {
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (!doc.exists) {
      window.location.replace('login.html');
      return;
    }
    userData = doc.data();
    withdrawBalance = Number(userData.withdrawalBalance) || 0;
    setText('withdrawBalance', fmtCur(withdrawBalance));
    
    // Check active plan
    const invSnap = await db.collection('investments')
      .where('userId', '==', currentUser.uid)
      .where('status', '==', 'active')
      .limit(1).get();
    hasActivePlan = !invSnap.empty;
    
    renderBankDisplay();
    renderStatusAlert();
    await renderFormArea();
    await loadHistory();
  } catch (e) {
    console.error('Load error:', e);
  }
}

function renderBankDisplay() {
  const bank = userData.bankDetails || {};
  const container = document.getElementById('bankDisplay');
  
  if (bank.isBound && bank.bankName) {
    container.innerHTML = `
      <div class="bank-row">
        <span class="bank-row-label">Bank</span>
        <span class="bank-row-value">${bank.bankName || '—'}</span>
      </div>
      <div class="bank-row">
        <span class="bank-row-label">Account Name</span>
        <span class="bank-row-value">${bank.accountName || '—'}</span>
      </div>
      <div class="bank-row">
        <span class="bank-row-label">Account Number</span>
        <span class="bank-row-value">${bank.accountNumber || '—'}</span>
      </div>
    `;
  } else {
    container.innerHTML = `
      <div class="bank-row">
        <span class="bank-row-label">Status</span>
        <span class="bank-row-value" style="color:var(--danger);">Not bound</span>
      </div>
      <div style="margin-top:12px;">
        <a href="bind-wallet.html" class="action-link" style="font-size:13px;padding:10px 18px;">
          <i class="fas fa-plus"></i> Bind Account
        </a>
      </div>
    `;
  }
}

function renderStatusAlert() {
  const container = document.getElementById('statusAlert');
  
  if (!hasActivePlan) {
    container.innerHTML = `
      <div class="alert-box warning">
        <i class="fas fa-exclamation-triangle"></i>
        <div class="alert-text">You need an active investment plan to withdraw.</div>
      </div>`;
    return;
  }
  
  if (!isOpenNow()) {
    container.innerHTML = `
      <div class="alert-box warning">
        <i class="fas fa-clock"></i>
        <div class="alert-text">${getNextOpenText()}</div>
      </div>`;
    return;
  }
  
  container.innerHTML = `
    <div class="alert-box success">
      <i class="fas fa-check-circle"></i>
      <div class="alert-text">Withdrawal window is open (${OPEN_HOUR}:00 – ${CLOSE_HOUR}:00)</div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   FORM AREA
═══════════════════════════════════════════════════════════════════ */
async function renderFormArea() {
  const area = document.getElementById('formArea');
  
  if (!hasActivePlan) {
    area.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">🔒</div>
        <div class="empty-title">Active Plan Required</div>
        <div class="empty-text">Invest in a plan to unlock withdrawals</div>
        <a href="plans.html" class="action-link">View Plans →</a>
      </div>`;
    return;
  }
  
  if (!isOpenNow()) {
    area.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">⏰</div>
        <div class="empty-title">Window Closed</div>
        <div class="empty-text">${getNextOpenText()}</div>
      </div>`;
    return;
  }
  
  // Check daily limit
  const alreadyWithdrawn = await hasWithdrawnToday();
  if (alreadyWithdrawn) {
    area.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">✅</div>
        <div class="empty-title">Daily Limit Reached</div>
        <div class="empty-text">You've already withdrawn today. Come back tomorrow.</div>
      </div>`;
    return;
  }
  
  const bank = userData.bankDetails || {};
  if (!bank.isBound) {
    area.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">🏦</div>
        <div class="empty-title">No Bank Account</div>
        <div class="empty-text">Bind your bank account to withdraw</div>
        <a href="bind-wallet.html" class="action-link">Bind Account →</a>
      </div>`;
    return;
  }
  
  if (withdrawBalance < MIN_WITHDRAW) {
    area.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">💰</div>
        <div class="empty-title">Balance Too Low</div>
        <div class="empty-text">Minimum withdrawal is ${fmtCur(MIN_WITHDRAW)}</div>
      </div>`;
    return;
  }
  
  // All checks passed — show form
  if (!userData.withdrawalPin) {
    renderSetPinForm(area);
  } else {
    renderWithdrawForm(area);
  }
}

function renderSetPinForm(area) {
  area.innerHTML = `
    <div class="bank-card">
      <div class="section-label">🔐 Set Withdrawal PIN</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Create a 4-digit PIN to secure your withdrawals</p>
      <input type="password" id="newPinInput" class="pin-input" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*">
      <button onclick="setPin()" class="submit-btn" style="margin-top:14px;">
        <i class="fas fa-lock"></i> Create PIN
      </button>
    </div>
  `;
}

function renderWithdrawForm(area) {
  const chips = QUICK_AMOUNTS
    .filter(a => a <= withdrawBalance)
    .map(a => `<button class="chip" onclick="selectAmount(${a}, this)">${fmtCur(a)}</button>`)
    .join('');
  
  area.innerHTML = `
    <div class="bank-card">
      <div class="section-label">💰 Withdrawal Amount</div>
      
      <div class="amount-chips" id="chipContainer">
        ${chips || '<span style="color:var(--text-muted);font-size:12px;">No quick amounts available</span>'}
      </div>
      
      <div class="custom-input-wrap">
        <span class="prefix">₦</span>
        <input type="number" id="amountInput" placeholder="Enter custom amount" min="${MIN_WITHDRAW}" max="${withdrawBalance}" oninput="onAmountChange(this.value)" inputmode="numeric">
      </div>
      
      <div id="previewArea" style="display:none;"></div>
      
      <div class="pin-wrap">
        <label class="pin-label">Withdrawal PIN</label>
        <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*">
      </div>
      
      <button onclick="submitWithdraw()" class="submit-btn" id="submitBtn">
        <i class="fas fa-paper-plane"></i> Confirm Withdrawal
      </button>
    </div>
  `;
  
  if (selectedAmount >= MIN_WITHDRAW) {
    updatePreview(selectedAmount);
  }
}

function selectAmount(amount, btn) {
  selectedAmount = amount;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const input = document.getElementById('amountInput');
  if (input) input.value = amount;
  
  const preview = document.getElementById('previewArea');
  if (preview) preview.style.display = 'block';
  updatePreview(amount);
}

function onAmountChange(value) {
  const amount = parseInt(value) || 0;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  
  if (amount >= MIN_WITHDRAW && amount <= withdrawBalance) {
    selectedAmount = amount;
    const preview = document.getElementById('previewArea');
    if (preview) preview.style.display = 'block';
    updatePreview(amount);
  } else {
    selectedAmount = 0;
    const preview = document.getElementById('previewArea');
    if (preview) preview.style.display = 'none';
  }
}

function updatePreview(amount) {
  const fee = Math.floor(amount * FEE_PERCENT / 100);
  const receive = amount - fee;
  const preview = document.getElementById('previewArea');
  if (!preview) return;
  
  preview.innerHTML = `
    <div class="preview-box">
      <div class="preview-row">
        <span class="preview-label">Request Amount</span>
        <span class="preview-value">${fmtCur(amount)}</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">Fee (${FEE_PERCENT}%)</span>
        <span class="preview-value red">−${fmtCur(fee)}</span>
      </div>
      <div class="preview-divider"></div>
      <div class="preview-row">
        <span class="preview-label">You Receive</span>
        <span class="preview-value green">${fmtCur(receive)}</span>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════════
   SET PIN
═══════════════════════════════════════════════════════════════════ */
async function setPin() {
  const pin = document.getElementById('newPinInput')?.value;
  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    Swal.fire({ icon: 'warning', title: 'Invalid PIN', text: 'Enter exactly 4 digits', confirmButtonColor: '#0052CC' });
    return;
  }
  
  try {
    await db.collection('users').doc(currentUser.uid).update({ 
      withdrawalPin: hashPin(pin) 
    });
    
    Swal.fire({ 
      icon: 'success', 
      title: 'PIN Set!', 
      text: 'You can now make withdrawals',
      toast: true, 
      position: 'top-end', 
      showConfirmButton: false, 
      timer: 2000 
    });
    
    userData.withdrawalPin = hashPin(pin);
    await renderFormArea();
  } catch (e) {
    Swal.fire({ icon: 'error', title: 'Failed', text: e.message, confirmButtonColor: '#DC2626' });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   CHECK DAILY LIMIT
═══════════════════════════════════════════════════════════════════ */
async function hasWithdrawnToday() {
  try {
    const today = getTodayStr();
    const snap = await db.collection('withdrawals')
      .where('userId', '==', currentUser.uid)
      .where('withdrawalDate', '==', today)
      .limit(1).get();
    return !snap.empty;
  } catch (e) {
    // Also check user doc for lastWithdrawalDate as fallback
    return userData?.lastWithdrawalDate === getTodayStr();
  }
}

/* ═══════════════════════════════════════════════════════════════════
   SUBMIT WITHDRAWAL
═══════════════════════════════════════════════════════════════════ */
async function submitWithdraw() {
  if (!hasActivePlan) {
    Swal.fire({ icon: 'error', title: 'No Active Plan', text: 'You need an active investment to withdraw.', confirmButtonColor: '#0052CC' });
    return;
  }
  if (!isOpenNow()) {
    Swal.fire({ icon: 'error', title: 'Window Closed', text: getNextOpenText(), confirmButtonColor: '#0052CC' });
    return;
  }
  if (await hasWithdrawnToday()) {
    Swal.fire({ icon: 'error', title: 'Daily Limit', text: 'You already withdrew today.', confirmButtonColor: '#0052CC' });
    return;
  }
  if (selectedAmount < MIN_WITHDRAW) {
    Swal.fire({ icon: 'warning', title: 'Amount Too Low', text: `Minimum is ${fmtCur(MIN_WITHDRAW)}`, confirmButtonColor: '#0052CC' });
    return;
  }
  if (selectedAmount > withdrawBalance) {
    Swal.fire({ icon: 'warning', title: 'Insufficient Balance', text: 'Amount exceeds your withdrawable balance.', confirmButtonColor: '#0052CC' });
    return;
  }
  
  const pin = document.getElementById('pinInput')?.value;
  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    Swal.fire({ icon: 'warning', title: 'PIN Required', text: 'Enter your 4-digit withdrawal PIN.', confirmButtonColor: '#0052CC' });
    return;
  }
  if (!userData.withdrawalPin || hashPin(pin) !== userData.withdrawalPin) {
    Swal.fire({ icon: 'error', title: 'Wrong PIN', text: 'The PIN you entered is incorrect.', confirmButtonColor: '#DC2626' });
    return;
  }
  
  const fee = Math.floor(selectedAmount * FEE_PERCENT / 100);
  const receive = selectedAmount - fee;
  const bank = userData.bankDetails || {};
  
  const confirm = await Swal.fire({
    title: 'Confirm Withdrawal',
    html: `
      <div style="text-align:left;background:var(--card-bg-inner);border-radius:12px;padding:14px;font-size:13px;">
        <div style="display:flex;justify-content:space-between;padding:6px 0;"><span>Amount</span><strong>${fmtCur(selectedAmount)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;"><span>Fee (${FEE_PERCENT}%)</span><span style="color:var(--danger);">−${fmtCur(fee)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border-light);margin-top:4px;padding-top:8px;"><span>You Receive</span><strong style="color:var(--success);">${fmtCur(receive)}</strong></div>
        <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted);">
          To: ${bank.bankName || '—'} · ${bank.accountNumber || '—'}<br>
          ${bank.accountName || '—'}
        </div>
      </div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Confirm',
    confirmButtonColor: '#0052CC',
    cancelButtonColor: '#64748B'
  });
  
  if (!confirm.isConfirmed) return;
  
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const refCode = 'WD-' + Date.now().toString(36).toUpperCase().slice(-8);
    const today = getTodayStr();
    const now = new Date();
    
    const batch = db.batch();
    
    // Deduct from withdrawal balance
    batch.update(db.collection('users').doc(currentUser.uid), {
      withdrawalBalance: FV.increment(-selectedAmount),
      lastWithdrawalDate: today
    });
    
    // Create withdrawal record
    batch.set(db.collection('withdrawals').doc(), {
      userId: currentUser.uid,
      userName: userData.fullName || userData.username || 'User',
      amount: selectedAmount,
      feeAmount: fee,
      feePercent: FEE_PERCENT,
      receiveAmount: receive,
      refCode: refCode,
      status: 'pending',
      bankName: bank.bankName || '',
      accountName: bank.accountName || '',
      accountNumber: bank.accountNumber || '',
      withdrawalDate: today,
      requestedAt: now.toISOString(),
      createdAt: now.toISOString()
    });
    
    // Log transaction
    batch.set(db.collection('transactions').doc(), {
      userId: currentUser.uid,
      type: 'withdrawal',
      amount: selectedAmount,
      fee: fee,
      receiveAmount: receive,
      refCode: refCode,
      status: 'pending',
      description: `Withdrawal — ${fmtCur(receive)} to ${bank.bankName || 'Bank'}`,
      wallet: 'withdrawal',
      createdAt: now
    });
    
    await batch.commit();
    
    Swal.fire({
      icon: 'success',
      title: 'Submitted!',
      html: `
        <p><strong>${fmtCur(receive)}</strong> will be sent to your account</p>
        <p style="font-size:12px;color:var(--text-muted);">Ref: ${refCode}</p>
        <p style="font-size:11px;color:var(--text-muted);">Processing may take up to 24 hours</p>
      `,
      confirmButtonColor: '#0052CC'
    });
    
    await loadAllData();
    
  } catch (err) {
    console.error('Withdrawal error:', err);
    Swal.fire({ icon: 'error', title: 'Failed', text: err.message || 'Please try again', confirmButtonColor: '#DC2626' });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   LOAD HISTORY
═══════════════════════════════════════════════════════════════════ */
async function loadHistory() {
  const container = document.getElementById('historyList');
  
  try {
    const snap = await db.collection('withdrawals')
      .where('userId', '==', currentUser.uid)
      .orderBy('requestedAt', 'desc')
      .limit(15).get();
    
    setText('historyCount', `${snap.size} requests`);
    
    if (snap.empty) {
      container.innerHTML = `
        <div class="empty-block">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No withdrawal requests</div>
          <div class="empty-text">Your withdrawal history will appear here</div>
        </div>`;
      return;
    }
    
    container.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const status = d.status || 'pending';
      const date = d.requestedAt?.toDate?.() || new Date(d.requestedAt || d.createdAt);
      const dotClass = status === 'approved' ? 'approved' : (status === 'rejected' ? 'rejected' : 'pending');
      const dotIcon = status === 'approved' ? '✓' : (status === 'rejected' ? '✗' : '⏳');
      const statusText = status.charAt(0).toUpperCase() + status.slice(1);
      
      return `
        <div class="history-item">
          <div class="history-dot ${dotClass}">${dotIcon}</div>
          <div class="history-info">
            <div class="history-amount">${fmtCur(d.amount)} → ${fmtCur(d.receiveAmount || d.amount)}</div>
            <div class="history-meta">${date.toLocaleDateString('en-NG', { day:'2-digit', month:'short', year:'numeric' })} · ${d.refCode || ''}</div>
          </div>
          <div class="history-status ${status}">${statusText}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    console.error('History error:', e);
    container.innerHTML = `
      <div class="empty-block">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Couldn't load history</div>
        <button class="action-link" onclick="refreshAll()" style="border:none;cursor:pointer;">Retry</button>
      </div>`;
  }
}

async function refreshAll() {
  const icon = document.querySelector('.fa-sync-alt');
  if (icon) icon.classList.add('fa-spin');
  await loadAllData();
  setTimeout(() => { if (icon) icon.classList.remove('fa-spin'); }, 500);
}

// Expose
window.toggleTheme = toggleTheme;
window.selectAmount = selectAmount;
window.onAmountChange = onAmountChange;
window.setPin = setPin;
window.submitWithdraw = submitWithdraw;
window.refreshAll = refreshAll;
</script>
