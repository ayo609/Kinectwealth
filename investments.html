<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · My Portfolio</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0D1117;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  color: #E6EDF3;
  min-height: 100vh;
}

/* ========== HEADER - BLUE NEON ========== */
.app-header {
  background: linear-gradient(135deg, #0A1929 0%, #0D2137 100%);
  padding: 20px 20px 16px;
  border-bottom: 1px solid #1E3A5F;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.back-link {
  color: #E6EDF3;
  font-size: 20px;
  text-decoration: none;
  background: rgba(255,255,255,0.05);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-title {
  font-size: 18px;
  font-weight: 600;
}

.refresh-icon {
  color: #58A6FF;
  cursor: pointer;
  font-size: 18px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(88,166,255,0.1);
  border-radius: 12px;
}

/* Stats Cards */
.stats-container {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.stat-item {
  flex: 1;
  background: rgba(88,166,255,0.08);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  border: 1px solid rgba(88,166,255,0.15);
}

.stat-number {
  font-size: 20px;
  font-weight: 700;
  color: #58A6FF;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 10px;
  color: #8B949E;
  letter-spacing: 0.5px;
}

/* ========== MAIN CONTENT ========== */
.main-content {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* Welcome Banner */
.welcome-banner {
  background: linear-gradient(135deg, #1E3A5F, #0D2137);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 24px;
  border: 1px solid #2D4A6F;
}

.welcome-icon {
  font-size: 32px;
  margin-bottom: 12px;
}

.welcome-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.welcome-sub {
  font-size: 12px;
  color: #8B949E;
}

/* Tab Bar */
.tab-bar {
  display: flex;
  gap: 8px;
  background: #161B22;
  border-radius: 40px;
  padding: 4px;
  margin-bottom: 24px;
}

.tab {
  flex: 1;
  padding: 10px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  color: #8B949E;
  transition: all 0.2s;
}

.tab.active {
  background: #58A6FF;
  color: #0D1117;
}

/* Investment List */
.investment-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Investment Card */
.invest-card {
  background: #161B22;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #21262D;
}

.invest-card.completed {
  opacity: 0.6;
}

.card-top {
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #21262D;
}

.plan-tag {
  display: flex;
  align-items: center;
  gap: 8px;
}

.plan-dot {
  width: 10px;
  height: 10px;
  border-radius: 10px;
  background: #58A6FF;
}

.plan-name {
  font-weight: 700;
  font-size: 15px;
}

.status-pill {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(88,166,255,0.15);
  color: #58A6FF;
}

.status-pill.completed {
  background: rgba(139,148,158,0.15);
  color: #8B949E;
}

/* Stats Grid inside card */
.card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 16px;
}

.card-stat {
  text-align: center;
}

.card-stat-label {
  font-size: 10px;
  color: #8B949E;
  margin-bottom: 4px;
}

.card-stat-value {
  font-size: 14px;
  font-weight: 700;
}

.card-stat-value.green {
  color: #3FB950;
}

/* Progress Bar */
.progress-area {
  padding: 0 16px 12px;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #8B949E;
  margin-bottom: 6px;
}

.progress-bg {
  height: 6px;
  background: #21262D;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #58A6FF, #79C0FF);
  border-radius: 3px;
  transition: width 0.3s;
}

/* Claim Section */
.claim-area {
  background: #0D1117;
  margin: 0 16px 16px;
  border-radius: 16px;
  padding: 14px;
  border: 1px solid #21262D;
}

.claim-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.claim-label {
  font-size: 12px;
  color: #8B949E;
}

.claim-amount {
  font-size: 18px;
  font-weight: 700;
  color: #3FB950;
}

.countdown {
  text-align: right;
  font-size: 14px;
  font-weight: 600;
  font-family: monospace;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.countdown.ready {
  color: #3FB950;
  font-size: 12px;
}

.claim-button {
  width: 100%;
  padding: 12px;
  background: #58A6FF;
  border: none;
  border-radius: 12px;
  color: #0D1117;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.claim-button:disabled {
  background: #30363D;
  color: #8B949E;
  cursor: not-allowed;
}

/* Completed State */
.completed-area {
  margin: 0 16px 16px;
  padding: 16px;
  background: #0D1117;
  border-radius: 16px;
  text-align: center;
  border: 1px solid #21262D;
  color: #8B949E;
  font-size: 13px;
}

.total-earned {
  padding: 12px 16px 16px;
  border-top: 1px solid #21262D;
  display: flex;
  justify-content: space-between;
}

.total-label {
  font-size: 12px;
  color: #8B949E;
}

.total-value {
  font-size: 16px;
  font-weight: 700;
  color: #D2A8FF;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: #161B22;
  border-radius: 20px;
  border: 1px solid #21262D;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.empty-text {
  font-size: 13px;
  color: #8B949E;
  margin-bottom: 20px;
}

.invest-btn {
  background: #58A6FF;
  color: #0D1117;
  padding: 12px 28px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

/* Toast */
.roi-toast {
  position: fixed;
  bottom: 80px;
  left: 20px;
  right: 20px;
  max-width: 400px;
  margin: 0 auto;
  background: #161B22;
  border-left: 4px solid #3FB950;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 1000;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.toast-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(63,185,80,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* Bottom Tab Bar */
.tab-bar-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #161B22;
  border-top: 1px solid #21262D;
  display: flex;
  justify-content: space-around;
  padding: 10px 20px 20px;
  max-width: 500px;
  margin: 0 auto;
}

.bottom-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  font-size: 11px;
  color: #8B949E;
}

.bottom-tab i {
  font-size: 22px;
}

.bottom-tab.active {
  color: #58A6FF;
}

.spacer {
  height: 20px;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <a href="home.html" class="back-link">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-title">My Portfolio</div>
    <div class="refresh-icon" onclick="manualRefresh()">
      <i class="fas fa-sync-alt"></i>
    </div>
  </div>
  <div class="stats-container">
    <div class="stat-item">
      <div class="stat-number" id="statDeposit">₦0</div>
      <div class="stat-label">Deposit</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="statWithdraw">₦0</div>
      <div class="stat-label">Withdrawal</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="statEarned">₦0</div>
      <div class="stat-label">Total Earned</div>
    </div>
  </div>
</div>

<div class="main-content">
  
  <div class="welcome-banner">
    <div class="welcome-icon">📈</div>
    <div class="welcome-title" id="welcomeTitle">Your Investment Journey</div>
    <div class="welcome-sub" id="welcomeSub">Track all your active plans here</div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-filter="active" onclick="setFilter('active', this)">Active</div>
    <div class="tab" data-filter="completed" onclick="setFilter('completed', this)">Completed</div>
    <div class="tab" data-filter="all" onclick="setFilter('all', this)">All</div>
  </div>

  <div class="investment-list" id="investmentList">
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Loading investments...</div>
    </div>
  </div>

</div>

<div class="tab-bar-bottom">
  <a href="home.html" class="bottom-tab"><i class="fas fa-chart-line"></i><span>Home</span></a>
  <a href="plans.html" class="bottom-tab"><i class="fas fa-layer-group"></i><span>Plans</span></a>
  <a href="investments.html" class="bottom-tab active"><i class="fas fa-folder-open"></i><span>Portfolio</span></a>
  <a href="referrals.html" class="bottom-tab"><i class="fas fa-user-plus"></i><span>Invite</span></a>
  <a href="profile.html" class="bottom-tab"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIG - YOUR CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;
const MS = 86400000;

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
function formatNum(n) {
  return (Number(n) || 0).toLocaleString('en-NG');
}

function formatCurr(n) {
  return '₦' + formatNum(n);
}

function formatShort(n) {
  const v = Number(n) || 0;
  if (v >= 1e6) return '₦' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '₦' + (v / 1e3).toFixed(1) + 'K';
  return '₦' + v.toFixed(0);
}

/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
let currentUser = null;
let allInvestments = [];
let currentFilter = 'active';
let countdownInterval = null;

/* ═══════════════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = user;
  await loadUserData();
  await loadInvestments();
  
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(updateCountdowns, 1000);
});

/* ═══════════════════════════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════════════════════════ */
async function loadUserData() {
  const doc = await db.collection('users').doc(currentUser.uid).get();
  if (doc.exists) {
    const data = doc.data();
    document.getElementById('statDeposit').textContent = formatShort(data.depositBalance || 0);
    document.getElementById('statWithdraw').textContent = formatShort(data.withdrawalBalance || 0);
    document.getElementById('statEarned').textContent = formatShort(data.totalEarnings || 0);
  }
}

async function loadInvestments() {
  const snap = await db.collection('investments')
    .where('userId', '==', currentUser.uid)
    .get();
  
  allInvestments = snap.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  })).sort((a, b) => {
    const aTime = a.activatedAt?.toMillis?.() || a.createdAt?.toMillis?.() || 0;
    const bTime = b.activatedAt?.toMillis?.() || b.createdAt?.toMillis?.() || 0;
    return bTime - aTime;
  });
  
  const activeCount = allInvestments.filter(i => i.status === 'active').length;
  document.getElementById('welcomeSub').textContent = `${activeCount} active investment${activeCount !== 1 ? 's' : ''}`;
  
  renderInvestments();
}

/* ═══════════════════════════════════════════════════════════════════
   GET NEXT CLAIM TIME
═══════════════════════════════════════════════════════════════════ */
function getNextClaimTime(inv) {
  const now = Date.now();
  
  if (inv.nextClaimAt) {
    const ms = inv.nextClaimAt.toMillis?.() || inv.nextClaimAt.seconds * 1000;
    if (ms && ms > 0) return ms;
  }
  if (inv.lastClaimAt) {
    const ms = inv.lastClaimAt.toMillis?.() || inv.lastClaimAt.seconds * 1000;
    if (ms) return ms + MS;
  }
  if (inv.activatedAt) {
    const ms = inv.activatedAt.toMillis?.() || inv.activatedAt.seconds * 1000;
    if (ms) return ms + MS;
  }
  if (inv.createdAt) {
    const ms = inv.createdAt.toMillis?.() || inv.createdAt.seconds * 1000;
    if (ms) return ms + MS;
  }
  return now + MS;
}

function formatCountdown(ms) {
  if (ms <= 0) return 'Ready!';
  const hours = Math.floor(ms / 3600000);
  const minutes = Math.floor((ms % 3600000) / 60000);
  const seconds = Math.floor((ms % 60000) / 1000);
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════════ */
function renderInvestments() {
  const container = document.getElementById('investmentList');
  const filtered = allInvestments.filter(inv => {
    if (currentFilter === 'active') return inv.status === 'active';
    if (currentFilter === 'completed') return inv.status === 'completed';
    return true;
  });
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No investments found</div>
        <div class="empty-text">${currentFilter === 'active' ? 'Start your first investment today!' : 'No completed investments yet'}</div>
        ${currentFilter === 'active' ? '<a href="plans.html" class="invest-btn"><i class="fas fa-bolt"></i> View Plans</a>' : ''}
      </div>`;
    return;
  }
  
  container.innerHTML = '';
  filtered.forEach(inv => {
    container.appendChild(createCard(inv));
  });
}

function createCard(inv) {
  const now = Date.now();
  const isActive = inv.status === 'active';
  const duration = Number(inv.duration) || 1;
  const claimedDays = Number(inv.claimedDays) || 0;
  const dailyROI = Number(inv.dailyROI) || 0;
  const capital = Number(inv.capital) || 0;
  const progress = Math.min((claimedDays / duration) * 100, 100);
  const totalEarned = Number(inv.totalEarned) || 0;
  const daysLeft = duration - claimedDays;
  const isFinal = daysLeft <= 1;
  
  let nextClaimTime = getNextClaimTime(inv);
  let timeLeft = Math.max(0, nextClaimTime - now);
  let canClaim = isActive && timeLeft <= 0;
  
  const card = document.createElement('div');
  card.className = `invest-card ${!isActive ? 'completed' : ''}`;
  
  card.innerHTML = `
    <div class="card-top">
      <div class="plan-tag">
        <div class="plan-dot"></div>
        <div class="plan-name">${inv.planName || 'Investment'}</div>
      </div>
      <div class="status-pill ${!isActive ? 'completed' : ''}">
        ${isActive ? '● Active' : '✓ Completed'}
      </div>
    </div>
    
    <div class="card-stats">
      <div class="card-stat">
        <div class="card-stat-label">Capital</div>
        <div class="card-stat-value">${formatCurr(capital)}</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-label">Daily</div>
        <div class="card-stat-value green">${formatCurr(dailyROI)}</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-label">${isActive ? 'Left' : 'Status'}</div>
        <div class="card-stat-value">${isActive ? daysLeft + 'd' : 'Done'}</div>
      </div>
    </div>
    
    <div class="progress-area">
      <div class="progress-label">
        <span>Day ${claimedDays} of ${duration}</span>
        <span>${Math.round(progress)}%</span>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
    </div>
    
    ${isActive ? `
      <div class="claim-area">
        <div class="claim-row">
          <span class="claim-label">Next payout</span>
          <span class="claim-amount">${formatCurr(isFinal ? dailyROI + capital : dailyROI)}</span>
        </div>
        <div class="countdown ${canClaim ? 'ready' : ''}" id="cd_${inv.id}" data-next="${nextClaimTime}" data-invid="${inv.id}">
          ${canClaim ? '🎉 Ready to claim!' : formatCountdown(timeLeft)}
        </div>
        <button class="claim-button" id="claimBtn_${inv.id}" onclick="claimDaily('${inv.id}')" ${!canClaim ? 'disabled' : ''}>
          ${isFinal ? '🏁 Claim Final + Capital' : '💰 Claim Daily Income'}
        </button>
      </div>
    ` : `
      <div class="completed-area">
        ✓ Investment completed - All returns claimed
      </div>
    `}
    
    <div class="total-earned">
      <span class="total-label">Total earned</span>
      <span class="total-value">${formatCurr(totalEarned)}</span>
    </div>
  `;
  
  return card;
}

/* ═══════════════════════════════════════════════════════════════════
   UPDATE COUNTDOWNS
═══════════════════════════════════════════════════════════════════ */
function updateCountdowns() {
  const now = Date.now();
  document.querySelectorAll('[id^="cd_"]').forEach(el => {
    const invId = el.dataset.invid;
    const inv = allInvestments.find(i => i.id === invId);
    if (!inv || inv.status !== 'active') return;
    
    const nextTime = getNextClaimTime(inv);
    const timeLeft = Math.max(0, nextTime - now);
    const canClaim = timeLeft <= 0;
    
    el.textContent = canClaim ? '🎉 Ready to claim!' : formatCountdown(timeLeft);
    el.classList.toggle('ready', canClaim);
    
    const btn = document.getElementById(`claimBtn_${invId}`);
    if (btn) btn.disabled = !canClaim;
  });
}

/* ═══════════════════════════════════════════════════════════════════
   CLAIM
═══════════════════════════════════════════════════════════════════ */
async function claimDaily(invId) {
  const inv = allInvestments.find(i => i.id === invId);
  if (!inv || inv.status !== 'active') return;
  
  const now = Date.now();
  const nextTime = getNextClaimTime(inv);
  
  if (now < nextTime) {
    Swal.fire({ icon: 'warning', title: 'Not ready yet', text: 'Please wait for the countdown', confirmButtonColor: '#58A6FF' });
    return;
  }
  
  const duration = Number(inv.duration) || 1;
  const claimedDays = Number(inv.claimedDays) || 0;
  const isFinal = (claimedDays + 1) >= duration;
  const dailyROI = Number(inv.dailyROI) || 0;
  const capital = Number(inv.capital) || 0;
  const claimAmount = isFinal ? dailyROI + capital : dailyROI;
  
  const confirm = await Swal.fire({
    title: isFinal ? '🏁 Final Claim' : '💰 Claim Income',
    html: `
      <div style="font-size: 28px; font-weight: 700; color: #3FB950;">${formatCurr(claimAmount)}</div>
      <div style="margin-top: 8px;">${isFinal ? 'Includes your capital return!' : `Day ${claimedDays + 1} of ${duration}`}</div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Claim Now',
    confirmButtonColor: '#58A6FF'
  });
  
  if (!confirm.isConfirmed) return;
  
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const batch = db.batch();
    const activationTime = inv.activatedAt?.toMillis?.() || inv.createdAt?.toMillis?.() || now;
    const daysSince = Math.floor((now - activationTime) / MS);
    const newNext = firebase.firestore.Timestamp.fromMillis(activationTime + ((daysSince + 1) * MS));
    
    batch.update(db.collection('users').doc(currentUser.uid), {
      withdrawalBalance: FV.increment(claimAmount),
      totalEarnings: FV.increment(claimAmount)
    });
    
    if (isFinal) {
      batch.update(db.collection('investments').doc(invId), {
        status: 'completed',
        completedAt: FV.serverTimestamp(),
        claimedDays: FV.increment(1),
        totalEarned: FV.increment(claimAmount)
      });
    } else {
      batch.update(db.collection('investments').doc(invId), {
        lastClaimAt: FV.serverTimestamp(),
        nextClaimAt: newNext,
        claimedDays: FV.increment(1),
        daysRemaining: FV.increment(-1),
        totalEarned: FV.increment(dailyROI)
      });
    }
    
    await batch.commit();
    
    showToast(claimAmount, isFinal);
    await loadInvestments();
    await loadUserData();
    Swal.close();
    
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'Failed', text: err.message, confirmButtonColor: '#EF4444' });
  }
}

function showToast(amount, isFinal) {
  const existing = document.querySelector('.roi-toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'roi-toast';
  toast.innerHTML = `
    <div class="toast-icon">${isFinal ? '🎉' : '💰'}</div>
    <div><strong>+${formatCurr(amount)}</strong><br><span style="font-size: 11px;">Added to withdrawal wallet</span></div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

/* ═══════════════════════════════════════════════════════════════════
   FILTER & REFRESH
═══════════════════════════════════════════════════════════════════ */
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderInvestments();
}

async function manualRefresh() {
  await loadUserData();
  await loadInvestments();
}

window.setFilter = setFilter;
window.manualRefresh = manualRefresh;
window.claimDaily = claimDaily;
</script>
