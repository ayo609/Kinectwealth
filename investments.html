<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · My Investments</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════
   KINETICWEALTH INVESTMENTS THEME
   ═══════════════════════════════════════ */
[data-theme="light"] {
  --bg: #F0F6FF;
  --card: #FFFFFF;
  --card2: #F8FAFE;
  --border: #DBEAFE;
  --text: #1E293B;
  --sub: #64748B;
  --muted: #94A3B8;
  --topbar-bg: rgba(255, 255, 255, 0.95);
  --shadow: 0 4px 20px rgba(30, 64, 175, 0.08);
}

[data-theme="dark"] {
  --bg: #0F172A;
  --card: #1E293B;
  --card2: #273548;
  --border: rgba(59, 130, 246, 0.15);
  --text: #F1F5F9;
  --sub: #94A3B8;
  --muted: #64748B;
  --topbar-bg: rgba(15, 23, 42, 0.97);
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

:root {
  --primary: #1E40AF;
  --primary-dark: #1E3A8A;
  --secondary: #3B82F6;
  --accent: #06B6D4;
  --success: #10B981;
  --danger: #EF4444;
  --warning: #F59E0B;
  --gradient-1: #1E40AF;
  --gradient-2: #3B82F6;
  --gradient-3: #06B6D4;
  --nav-h: 64px;
  --bot-h: 72px;
  --radius-sm: 12px;
  --radius: 16px;
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: calc(var(--bot-h) + 16px);
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* Top Bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 900;
  height: var(--nav-h);
  background: var(--topbar-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: var(--shadow);
}

.back-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  text-decoration: none;
  font-size: 16px;
  transition: all 0.2s;
}

.back-btn:hover { background: var(--border); }

.brand-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.refresh-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  background: var(--card2);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--sub);
  transition: all 0.3s;
}

.refresh-btn.spinning i {
  animation: spin 0.8s linear;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Main Content */
.main-content {
  padding: 0 16px;
}

/* Hero */
.hero-section {
  background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  margin: 16px 0;
  color: white;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(30, 64, 175, 0.3);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 25px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}

.hero-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 6px;
}

.hero-sub {
  font-size: 14px;
  opacity: 0.9;
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-dot {
  width: 8px; height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin: 16px 0;
}

.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
  border-color: var(--secondary);
}

.stat-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Filter */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.filter-btn.active {
  background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
  color: white;
  border-color: transparent;
}

/* Section Title */
.section-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.investment-count {
  background: var(--secondary);
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}

/* Investment Cards */
.investments-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.investment-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  animation: fadeInUp 0.4s ease both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.investment-card:hover {
  border-color: var(--secondary);
}

.investment-card.completed {
  opacity: 0.7;
}

.card-header {
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.plan-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.plan-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: rgba(59, 130, 246, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--secondary);
}

.plan-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
}

.status-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.status-badge.active {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
}

.status-badge.completed {
  background: var(--card2);
  color: var(--muted);
}

.card-body {
  padding: 16px 18px;
}

.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.detail-item {
  background: var(--card2);
  border-radius: 10px;
  padding: 12px;
}

.detail-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  margin-bottom: 3px;
}

.detail-value {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}

.detail-value.green { color: var(--success); }
.detail-value.blue { color: var(--secondary); }

/* Progress */
.progress-section {
  margin-bottom: 14px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  margin-bottom: 6px;
}

.progress-bar {
  height: 8px;
  background: var(--card2);
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--secondary), var(--accent));
  transition: width 0.5s ease;
}

/* Claim Section */
.claim-section {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}

.claim-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.claim-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
}

.claim-countdown {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--warning);
  letter-spacing: 1px;
  text-align: right;
}

.claim-countdown.ready {
  color: var(--success);
  font-size: 14px;
  letter-spacing: 0;
}

.claim-amount {
  text-align: right;
}

.claim-amount-label {
  font-size: 10px;
  color: var(--sub);
  font-weight: 600;
}

.claim-amount-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--success);
}

.claim-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Inter', sans-serif;
  margin-top: 8px;
}

.claim-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(30, 64, 175, 0.3);
}

.claim-btn:disabled {
  background: var(--muted);
  cursor: not-allowed;
  opacity: 0.6;
}

.claim-note {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
}

/* Total Earned */
.total-earned {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
}

.total-earned-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--sub);
}

.total-earned-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--warning);
}

/* Completed State */
.completed-state {
  text-align: center;
  padding: 20px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  color: var(--sub);
  font-size: 12px;
  font-weight: 600;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.empty-icon {
  font-size: 52px;
  margin-bottom: 14px;
}

.empty-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}

.empty-text {
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 20px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
  transition: all 0.3s;
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(30, 64, 175, 0.4);
}

/* ROI Toast */
.roi-toast {
  position: fixed;
  top: 80px;
  right: 16px;
  z-index: 9999;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slideInRight 0.4s ease;
  max-width: 320px;
  border-left: 4px solid var(--success);
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(60px); }
  to { opacity: 1; transform: translateX(0); }
}

.toast-icon {
  width: 42px; height: 42px;
  background: rgba(16, 185, 129, 0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--success);
  flex-shrink: 0;
}

.toast-content h4 {
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 2px;
}

.toast-content p {
  font-size: 11px;
  color: var(--sub);
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--bot-h);
  background: var(--topbar-bg);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  z-index: 800;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--muted);
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: 12px;
  transition: all 0.3s;
  position: relative;
}

.nav-item i { font-size: 22px; }

.nav-item.active {
  color: var(--secondary);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--secondary);
  border-radius: 0 0 3px 3px;
}

@media (max-width: 360px) {
  .stats-grid { gap: 6px; }
  .stat-card { padding: 10px 8px; }
  .stat-value { font-size: 16px; }
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE INIT
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCFwefJ8rxZUDLbDsRHnHdA-28zPs49rlo",
  authDomain: "cashpoint-ac4f4.firebaseapp.com",
  projectId: "cashpoint-ac4f4",
  storageBucket: "cashpoint-ac4f4.firebasestorage.app",
  messagingSenderId: "16133206416",
  appId: "1:16133206416:web:a093f4e153ad2c9bcc8315"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;
const MS = 86400000; // 24 hours

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════════════════════════════════ */
let currentUser = null;
let currentUserId = null;
let allInvestments = [];
let currentFilter = 'active';
let countdownInterval = null;

const formatCurrency = (n) => Number(n || 0).toLocaleString('en-NG', { minimumFractionDigits: 2 });
const formatShort = (n) => {
  const v = Number(n || 0);
  if (v >= 1e6) return '₦' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '₦' + (v / 1e3).toFixed(1) + 'K';
  return '₦' + v.toFixed(0);
};

/* ═══════════════════════════════════════════════════════════════════
   AUTH STATE
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = user;
  currentUserId = user.uid;
  
  if (countdownInterval) clearInterval(countdownInterval);
  
  await loadAllData();
  
  countdownInterval = setInterval(updateAllCountdowns, 1000);
});

/* ═══════════════════════════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════════════════════════ */
async function loadAllData() {
  await loadUserData();
  await loadInvestments();
}

async function loadUserData() {
  try {
    const doc = await db.collection('users').doc(currentUserId).get();
    if (!doc.exists) {
      window.location.href = 'login.html';
      return;
    }
    const data = doc.data();
    document.getElementById('statDeposit').textContent = formatShort(data.depositBalance || 0);
    document.getElementById('statWithdrawal').textContent = formatShort(data.withdrawalBalance || 0);
    document.getElementById('statEarnings').textContent = formatShort(data.totalEarnings || 0);
  } catch (e) {
    console.error('User data error:', e);
  }
}

async function loadInvestments() {
  try {
    const snap = await db.collection('investments')
      .where('userId', '==', currentUserId)
      .get();
    
    allInvestments = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    
    const activeCount = allInvestments.filter(i => i.status === 'active').length;
    document.getElementById('heroStatus').textContent = `${activeCount} active investment(s)`;
    document.getElementById('invCount').textContent = allInvestments.length;
    
    renderInvestments();
  } catch (e) {
    console.error('Investments error:', e);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   GET NEXT CLAIM TIME
═══════════════════════════════════════════════════════════════════ */
function getNextClaimTime(inv) {
  const now = Date.now();
  
  // Priority 1: nextClaimAt from Firestore
  if (inv.nextClaimAt) {
    const ms = inv.nextClaimAt.toMillis ? inv.nextClaimAt.toMillis() : 
               inv.nextClaimAt.seconds ? inv.nextClaimAt.seconds * 1000 : null;
    if (ms && ms > 0) return ms;
  }
  
  // Priority 2: lastClaimAt + 24h
  if (inv.lastClaimAt) {
    const ms = inv.lastClaimAt.toMillis ? inv.lastClaimAt.toMillis() : 
               inv.lastClaimAt.seconds ? inv.lastClaimAt.seconds * 1000 : null;
    if (ms) return ms + MS;
  }
  
  // Priority 3: activatedAt + 24h
  if (inv.activatedAt) {
    const ms = inv.activatedAt.toMillis ? inv.activatedAt.toMillis() : 
               inv.activatedAt.seconds ? inv.activatedAt.seconds * 1000 : null;
    if (ms) return ms + MS;
  }
  
  // Priority 4: createdAt + 24h
  if (inv.createdAt) {
    const ms = inv.createdAt.toMillis ? inv.createdAt.toMillis() : 
               inv.createdAt.seconds ? inv.createdAt.seconds * 1000 : null;
    if (ms) return ms + MS;
  }
  
  return now + MS;
}

function formatCountdown(ms) {
  if (ms <= 0) return '✅ Ready Now!';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER INVESTMENTS
═══════════════════════════════════════════════════════════════════ */
function createInvestmentCard(inv, index) {
  const now = Date.now();
  const duration = Number(inv.duration) || 1;
  const dailyROI = Number(inv.dailyROI) || 0;
  const capital = Number(inv.capital) || 0;
  const claimedDays = Number(inv.claimedDays) || 0;
  const daysRemaining = Number(inv.daysRemaining) || 0;
  const totalEarned = Number(inv.totalEarned) || 0;
  const progress = Math.min((claimedDays / duration) * 100, 100);
  
  const nextClaimTime = getNextClaimTime(inv);
  const timeToNext = Math.max(0, nextClaimTime - now);
  const canClaim = timeToNext <= 0;
  
  const isFinalDay = daysRemaining <= 1;
  const claimAmount = isFinalDay ? (dailyROI + capital) : dailyROI;
  const isActive = inv.status === 'active';
  
  const card = document.createElement('div');
  card.className = `investment-card${isActive ? '' : ' completed'}`;
  card.style.animationDelay = `${index * 0.05}s`;
  
  card.innerHTML = `
    <div class="card-header">
      <div class="plan-info">
        <div class="plan-icon"><i class="fas fa-chart-line"></i></div>
        <div class="plan-name">${inv.planName || 'Investment Plan'}</div>
      </div>
      <div class="status-badge ${isActive ? 'active' : 'completed'}">
        ${isActive ? '● Active' : '✓ Completed'}
      </div>
    </div>
    
    <div class="card-body">
      <div class="details-grid">
        <div class="detail-item">
          <div class="detail-label">Capital</div>
          <div class="detail-value">₦${formatCurrency(capital)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Daily ROI</div>
          <div class="detail-value green">₦${formatCurrency(dailyROI)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Duration</div>
          <div class="detail-value">${duration} Days</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">${isActive ? 'Remaining' : 'Status'}</div>
          <div class="detail-value blue">${isActive ? daysRemaining + 'd left' : 'Done'}</div>
        </div>
      </div>
      
      <div class="progress-section">
        <div class="progress-header">
          <span>Day ${claimedDays} of ${duration}</span>
          <span>${Math.round(progress)}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>
      
      ${isActive ? `
        <div class="claim-section">
          <div class="claim-header">
            <div class="claim-label">
              <i class="fas fa-clock"></i> ${canClaim ? 'Ready to Claim!' : 'Next Claim In'}
            </div>
            <div class="claim-amount">
              <div class="claim-amount-label">Amount</div>
              <div class="claim-amount-value">₦${formatCurrency(claimAmount)}</div>
            </div>
          </div>
          <div class="claim-countdown ${canClaim ? 'ready' : ''}" 
               id="cd_${inv.id}" 
               data-next="${nextClaimTime}" 
               data-invid="${inv.id}">
            ${canClaim ? '✅ Ready Now!' : formatCountdown(timeToNext)}
          </div>
          <button class="claim-btn" id="claimBtn_${inv.id}" 
                  onclick="claimDailyROI('${inv.id}')" 
                  ${!canClaim ? 'disabled' : ''}>
            <i class="fas fa-hand-holding-dollar"></i> 
            ${isFinalDay ? '🎉 Claim Final (+Capital)' : '💰 Claim Daily Income'}
          </button>
          <div class="claim-note">
            <i class="fas fa-info-circle"></i> 
            ${isFinalDay ? 'Final claim returns your capital too!' : 'Available every 24 hours'}
          </div>
        </div>
      ` : `
        <div class="completed-state">
          ✅ Investment completed — All returns claimed
        </div>
      `}
      
      <div class="total-earned">
        <span class="total-earned-label">Total Earned So Far</span>
        <span class="total-earned-value">₦${formatCurrency(totalEarned)}</span>
      </div>
    </div>
  `;
  
  return card;
}

function renderInvestments() {
  const container = document.getElementById('investmentsList');
  
  const filtered = allInvestments.filter(inv => {
    if (currentFilter === 'active') return inv.status === 'active';
    if (currentFilter === 'completed') return inv.status === 'completed';
    return true;
  });
  
  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">${currentFilter === 'active' ? 'No Active Investments' : 'No Investments Found'}</div>
        <div class="empty-text">${currentFilter === 'active' ? 'Start investing to earn daily returns!' : 'Your completed investments will appear here'}</div>
        ${currentFilter === 'active' ? '<a href="plans.html" class="action-btn"><i class="fas fa-bolt"></i> Browse Plans</a>' : ''}
      </div>`;
    return;
  }
  
  container.innerHTML = '';
  filtered.forEach((inv, i) => {
    container.appendChild(createInvestmentCard(inv, i));
  });
}

/* ═══════════════════════════════════════════════════════════════════
   CLAIM DAILY ROI
═══════════════════════════════════════════════════════════════════ */
async function claimDailyROI(invId) {
  const inv = allInvestments.find(i => i.id === invId);
  if (!inv || inv.status !== 'active') return;
  
  const now = Date.now();
  const nextClaimTime = getNextClaimTime(inv);
  
  if (now < nextClaimTime) {
    const remaining = formatCountdown(nextClaimTime - now);
    Swal.fire({
      icon: 'warning',
      title: 'Not Ready Yet',
      html: `Next claim available in:<br><b style="font-size: 22px;">${remaining}</b>`,
      confirmButtonColor: '#3B82F6'
    });
    return;
  }
  
  const duration = Number(inv.duration) || 1;
  const claimedDays = Number(inv.claimedDays) || 0;
  const isFinalDay = (claimedDays + 1) >= duration;
  const dailyROI = Number(inv.dailyROI) || 0;
  const capital = Number(inv.capital) || 0;
  const claimAmount = isFinalDay ? (dailyROI + capital) : dailyROI;
  
  const result = await Swal.fire({
    title: isFinalDay ? '🎉 Final Claim!' : '💰 Claim Daily Income',
    html: `
      <div style="text-align: center;">
        <div style="font-size: 16px; margin-bottom: 8px;">${inv.planName}</div>
        <div style="font-size: 28px; font-weight: 800; color: ${isFinalDay ? '#F59E0B' : '#10B981'}; margin-bottom: 8px;">
          ₦${claimAmount.toLocaleString()}
        </div>
        ${isFinalDay ? '<div style="background: #FEF3C7; padding: 8px; border-radius: 8px; color: #F59E0B; font-weight: 700;">💰 Includes Your Capital Return!</div>' : ''}
        <div style="margin-top: 8px; font-size: 12px; color: #64748B;">Day ${claimedDays + 1} of ${duration}</div>
      </div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: isFinalDay ? 'Claim All' : 'Claim Now',
    cancelButtonText: 'Cancel',
    confirmButtonColor: '#3B82F6'
  });
  
  if (!result.isConfirmed) return;
  
  Swal.fire({
    title: 'Processing Claim...',
    html: 'Please wait while we process your earnings',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
  
  try {
    const batch = db.batch();
    
    // Calculate next claim time (preserves schedule)
    const activationTime = inv.activatedAt?.toMillis?.() || inv.createdAt?.toMillis?.() || now;
    const daysSince = Math.floor((now - activationTime) / MS);
    const newNextClaimTime = activationTime + ((daysSince + 1) * MS);
    const newNext = firebase.firestore.Timestamp.fromMillis(newNextClaimTime);
    
    // Update user balance
    batch.update(db.collection('users').doc(currentUserId), {
      withdrawalBalance: FV.increment(claimAmount),
      totalEarnings: FV.increment(claimAmount)
    });
    
    // Update investment
    if (isFinalDay) {
      batch.update(db.collection('investments').doc(invId), {
        status: 'completed',
        completedAt: FV.serverTimestamp(),
        lastClaimAt: FV.serverTimestamp(),
        nextClaimAt: newNext,
        claimedDays: FV.increment(1),
        totalEarned: FV.increment(claimAmount),
        daysRemaining: 0
      });
    } else {
      batch.update(db.collection('investments').doc(invId), {
        lastClaimAt: FV.serverTimestamp(),
        nextClaimAt: newNext,
        claimedDays: FV.increment(1),
        daysRemaining: FV.increment(-1),
        totalEarned: FV.increment(dailyROI)
      });
    }
    
    // Create transaction record
    batch.set(db.collection('transactions').doc(), {
      userId: currentUserId,
      type: isFinalDay ? 'capital_return' : 'roi_claim',
      amount: claimAmount,
      planName: inv.planName,
      description: isFinalDay ? `Final claim from ${inv.planName}` : `Daily claim from ${inv.planName}`,
      investmentId: invId,
      wallet: 'withdrawal',
      createdAt: FV.serverTimestamp()
    });
    
    await batch.commit();
    
    showROIToast(claimAmount, isFinalDay);
    await loadAllData();
    Swal.close();
    
  } catch (error) {
    console.error('Claim error:', error);
    Swal.fire({
      icon: 'error',
      title: 'Claim Failed',
      text: error.message || 'Please try again later.',
      confirmButtonColor: '#EF4444'
    });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   COUNTDOWN UPDATER
═══════════════════════════════════════════════════════════════════ */
function updateAllCountdowns() {
  const now = Date.now();
  
  document.querySelectorAll('[id^="cd_"]').forEach(el => {
    const invId = el.dataset.invid;
    const inv = allInvestments.find(i => i.id === invId);
    if (!inv || inv.status !== 'active') return;
    
    const nextTime = getNextClaimTime(inv);
    const timeLeft = Math.max(0, nextTime - now);
    
    el.textContent = formatCountdown(timeLeft);
    
    if (timeLeft === 0) {
      el.classList.add('ready');
    } else {
      el.classList.remove('ready');
    }
    
    const btn = document.getElementById(`claimBtn_${invId}`);
    if (btn) {
      btn.disabled = timeLeft > 0;
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
   ROI TOAST
═══════════════════════════════════════════════════════════════════ */
function showROIToast(amount, isFinal) {
  const existing = document.querySelector('.roi-toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'roi-toast';
  toast.innerHTML = `
    <div class="toast-icon">${isFinal ? '🎉' : '💰'}</div>
    <div class="toast-content">
      <h4>${isFinal ? 'Final Claim!' : 'ROI Claimed!'} +₦${formatCurrency(amount)}</h4>
      <p>${isFinal ? 'Capital returned to withdrawal wallet' : 'Added to withdrawal wallet'}</p>
    </div>
  `;
  
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

/* ═══════════════════════════════════════════════════════════════════
   FILTER & REFRESH
═══════════════════════════════════════════════════════════════════ */
function filterInvestments(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInvestments();
}

async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadAllData();
  setTimeout(() => btn.classList.remove('spinning'), 700);
}

/* ═══════════════════════════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════════════════════════ */
window.filterInvestments = filterInvestments;
window.manualRefresh = manualRefresh;
window.claimDailyROI = claimDailyROI;

console.log('🚀 KineticWealth Investments Page Ready');
</script>
