<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · Investment Plans</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

[data-theme="dark"] {
  --bg: #0A0C15;
  --bg-card: #121826;
  --bg-card2: #1A1F2E;
  --border: rgba(59, 130, 246, 0.2);
  --text: #FFFFFF;
  --text-muted: #94A3B8;
  --primary: #3B82F6;
  --primary-dark: #2563EB;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
}

[data-theme="light"] {
  --bg: #F0F6FF;
  --bg-card: #FFFFFF;
  --bg-card2: #F8FAFE;
  --border: #DBEAFE;
  --text: #1E293B;
  --text-muted: #64748B;
  --primary: #3B82F6;
  --primary-dark: #2563EB;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  padding-bottom: 80px;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  width: 40px;
  height: 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  text-decoration: none;
  transition: all 0.2s;
}

.back-btn:hover {
  border-color: var(--primary);
  transform: scale(1.02);
}

.logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #3B82F6, #06B6D4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.theme-toggle {
  width: 40px;
  height: 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}

/* Balance Banner */
.balance-banner {
  margin: 20px;
  background: linear-gradient(135deg, #1E293B, #0F172A);
  border: 1px solid rgba(59, 130, 246, 0.3);
  border-radius: 24px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.balance-info .label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.balance-amount {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.balance-icon {
  width: 50px;
  height: 50px;
  background: rgba(59, 130, 246, 0.15);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--primary);
}

/* Section Header */
.section-header {
  padding: 0 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.section-title {
  font-size: 20px;
  font-weight: 700;
}

.plan-count {
  font-size: 12px;
  color: var(--text-muted);
}

/* Referral Banner */
.referral-banner {
  margin: 0 20px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
}

.referral-banner h4 {
  font-size: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.referral-levels {
  display: flex;
  gap: 12px;
}

.level {
  flex: 1;
  text-align: center;
  padding: 8px;
  background: var(--bg-card2);
  border-radius: 12px;
}

.level .percent {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
}

.level .label {
  font-size: 10px;
  color: var(--text-muted);
}

/* Plans Grid */
.plans-grid {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.plan-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  transition: all 0.3s;
}

.plan-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

.plan-card.purchased {
  opacity: 0.7;
}

.plan-header {
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.plan-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, #3B82F6, #06B6D4);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
}

.plan-name h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}

.badge.hot {
  background: rgba(239, 68, 68, 0.15);
  color: #EF4444;
}

.badge.popular {
  background: rgba(245, 158, 11, 0.15);
  color: #F59E0B;
}

.badge.premium {
  background: rgba(139, 92, 246, 0.15);
  color: #8B5CF6;
}

.plan-details {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.detail {
  text-align: center;
}

.detail .detail-label {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.detail .detail-value {
  font-size: 14px;
  font-weight: 700;
}

.detail .detail-value.highlight {
  color: var(--success);
}

.plan-footer {
  padding: 16px 20px;
  background: var(--bg-card2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.plan-price {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.invest-btn {
  padding: 10px 24px;
  background: linear-gradient(135deg, #3B82F6, #2563EB);
  border: none;
  border-radius: 30px;
  color: white;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.invest-btn:active {
  transform: scale(0.97);
}

.invest-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.purchased-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--success);
  font-size: 13px;
  font-weight: 600;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 12px 20px 20px;
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 11px;
  transition: all 0.2s;
}

.nav-item i {
  font-size: 22px;
}

.nav-item.active {
  color: var(--primary);
}

@media (max-width: 450px) {
  .plan-details {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="home.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <span class="logo">KineticWealth</span>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i>
  </button>
</div>

<div class="balance-banner">
  <div class="balance-info">
    <div class="label">Deposit Balance</div>
    <div class="balance-amount" id="depositBalance">₦0</div>
  </div>
  <div class="balance-icon">
    <i class="fas fa-wallet"></i>
  </div>
</div>

<div class="section-header">
  <div class="section-title">Investment Plans</div>
  <div class="plan-count" id="planCount">10 Plans</div>
</div>

<div class="referral-banner">
  <h4><i class="fas fa-gift"></i> Referral Bonuses</h4>
  <div class="referral-levels">
    <div class="level">
      <div class="percent">10%</div>
      <div class="label">Level 1</div>
    </div>
    <div class="level">
      <div class="percent">3%</div>
      <div class="label">Level 2</div>
    </div>
    <div class="level">
      <div class="percent">1%</div>
      <div class="label">Level 3</div>
    </div>
  </div>
</div>

<div class="plans-grid" id="plansGrid"></div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item">
    <i class="fas fa-chart-pie"></i>
    <span>Portfolio</span>
  </a>
  <a href="plans.html" class="nav-item active">
    <i class="fas fa-cube"></i>
    <span>Invest</span>
  </a>
  <a href="referrals.html" class="nav-item">
    <i class="fas fa-users"></i>
    <span>Team</span>
  </a>
  <a href="dashboard.html" class="nav-item">
    <i class="fas fa-user"></i>
    <span>Profile</span>
  </a>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE INIT - YOUR CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;

/* ═══════════════════════════════════════════════════════════════════
   INVESTMENT PLANS
═══════════════════════════════════════════════════════════════════ */
const INVESTMENT_PLANS = [
  { id: 'spark', name: 'Spark', capital: 5000, dailyROI: 500, duration: 20, badge: 'hot', dailyPercent: 10 },
  { id: 'pulse', name: 'Pulse', capital: 10000, dailyROI: 1080, duration: 20, badge: 'popular', dailyPercent: 10.8 },
  { id: 'surge', name: 'Surge', capital: 30000, dailyROI: 3500, duration: 25, badge: 'hot', dailyPercent: 11.67 },
  { id: 'flow', name: 'Flow', capital: 60000, dailyROI: 7500, duration: 25, badge: 'popular', dailyPercent: 12.5 },
  { id: 'momentum', name: 'Momentum', capital: 130000, dailyROI: 16200, duration: 30, badge: '', dailyPercent: 12.46 },
  { id: 'velocity', name: 'Velocity', capital: 220000, dailyROI: 24200, duration: 30, badge: 'premium', dailyPercent: 11 },
  { id: 'reactor', name: 'Reactor', capital: 450000, dailyROI: 49000, duration: 35, badge: 'premium', dailyPercent: 10.89 },
  { id: 'dynamo', name: 'Dynamo', capital: 550000, dailyROI: 60000, duration: 35, badge: 'premium', dailyPercent: 10.91 },
  { id: 'apex', name: 'Apex', capital: 720000, dailyROI: 75000, duration: 40, badge: 'premium', dailyPercent: 10.42 },
  { id: 'infinity', name: 'Infinity', capital: 950000, dailyROI: 98000, duration: 43, badge: 'premium', dailyPercent: 10.32 }
];

/* ═══════════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════════ */
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const newTheme = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('kw-theme', newTheme);
  
  const icon = document.querySelector('.theme-toggle i');
  if (icon) {
    icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
  }
}

const savedTheme = localStorage.getItem('kw-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════════════════════════════════ */
let currentUser = null;
let depositBalance = 0;
let purchasedPlans = new Set();

const formatCur = (n) => '₦' + Number(n || 0).toLocaleString('en-NG', { minimumFractionDigits: 0 });

/* ═══════════════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = user;
  await loadUserData();
  renderPlans();
});

async function loadUserData() {
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const data = doc.data();
      depositBalance = data.depositBalance || 0;
      purchasedPlans = new Set(data.purchasedPlans || []);
      document.getElementById('depositBalance').textContent = formatCur(depositBalance);
      document.getElementById('planCount').textContent = INVESTMENT_PLANS.length + ' Plans';
    }
  } catch (error) {
    console.error('Error loading user:', error);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER PLANS
═══════════════════════════════════════════════════════════════════ */
function renderPlans() {
  const grid = document.getElementById('plansGrid');
  
  grid.innerHTML = INVESTMENT_PLANS.map(plan => {
    const isPurchased = purchasedPlans.has(plan.id);
    const totalReturn = plan.dailyROI * plan.duration;
    const profit = totalReturn - plan.capital;
    
    return `
      <div class="plan-card ${isPurchased ? 'purchased' : ''}">
        <div class="plan-header">
          <div class="plan-icon">
            <i class="fas fa-chart-line"></i>
          </div>
          <div class="plan-name">
            <h3>${plan.name}</h3>
            ${plan.badge ? `<span class="badge ${plan.badge}">${plan.badge.toUpperCase()}</span>` : ''}
          </div>
        </div>
        <div class="plan-details">
          <div class="detail">
            <div class="detail-label">Capital</div>
            <div class="detail-value">${formatCur(plan.capital)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Daily</div>
            <div class="detail-value highlight">${formatCur(plan.dailyROI)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Duration</div>
            <div class="detail-value">${plan.duration}d</div>
          </div>
          <div class="detail">
            <div class="detail-label">Total Return</div>
            <div class="detail-value highlight">${formatCur(totalReturn)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Profit</div>
            <div class="detail-value highlight">+${formatCur(profit)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">Daily Rate</div>
            <div class="detail-value">${plan.dailyPercent}%</div>
          </div>
        </div>
        <div class="plan-footer">
          <div class="plan-price">${formatCur(plan.capital)}</div>
          ${isPurchased 
            ? `<div class="purchased-badge"><i class="fas fa-check-circle"></i> Purchased</div>`
            : `<button class="invest-btn" onclick="purchasePlan('${plan.id}')" ${depositBalance < plan.capital ? 'disabled' : ''}>
                Invest Now
               </button>`
          }
        </div>
      </div>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   PURCHASE PLAN
═══════════════════════════════════════════════════════════════════ */
async function purchasePlan(planId) {
  const plan = INVESTMENT_PLANS.find(p => p.id === planId);
  if (!plan) return;
  
  if (purchasedPlans.has(plan.id)) {
    Swal.fire({ icon: 'info', title: 'Already Purchased', text: 'You already own this plan.', confirmButtonColor: '#3B82F6' });
    return;
  }
  
  if (depositBalance < plan.capital) {
    Swal.fire({
      icon: 'warning', title: 'Insufficient Balance',
      html: `Need ${formatCur(plan.capital)}<br>Your balance: ${formatCur(depositBalance)}`,
      confirmButtonText: 'Deposit Now',
      confirmButtonColor: '#3B82F6',
      showCancelButton: true
    }).then((result) => {
      if (result.isConfirmed) window.location.href = 'deposit.html';
    });
    return;
  }
  
  const totalReturn = plan.dailyROI * plan.duration;
  const profit = totalReturn - plan.capital;
  
  const result = await Swal.fire({
    title: plan.name,
    html: `
      <div style="text-align: left; background: var(--bg-card2); border-radius: 16px; padding: 16px;">
        <div style="display: flex; justify-content: space-between; padding: 8px 0;">
          <span>Capital</span><span><strong>${formatCur(plan.capital)}</strong></span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 8px 0;">
          <span>Daily Income</span><span style="color: #10B981;"><strong>${formatCur(plan.dailyROI)}</strong></span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 8px 0;">
          <span>Duration</span><span><strong>${plan.duration} days</strong></span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 8px 0;">
          <span>Total Return</span><span style="color: #10B981;"><strong>${formatCur(totalReturn)}</strong></span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 12px;">
          <span>Net Profit</span><span style="color: #3B82F6;"><strong>+${formatCur(profit)}</strong></span>
        </div>
      </div>
      <div style="margin-top: 12px; padding: 12px; background: rgba(59,130,246,0.1); border-radius: 12px;">
        <p>Balance after purchase: <strong>${formatCur(depositBalance - plan.capital)}</strong></p>
      </div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Confirm Purchase',
    confirmButtonColor: '#3B82F6'
  });
  
  if (!result.isConfirmed) return;
  
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    // Verify balance again
    const userSnap = await db.collection('users').doc(currentUser.uid).get();
    const freshBalance = userSnap.data()?.depositBalance || 0;
    
    if (freshBalance < plan.capital) throw new Error('Insufficient balance');
    
    const batch = db.batch();
    const now = new Date();
    const nextClaim = new Date(now.getTime() + 86400000);
    
    // Create investment document
    const investmentRef = db.collection('investments').doc();
    batch.set(investmentRef, {
      userId: currentUser.uid,
      planId: plan.id,
      planName: plan.name,
      capital: plan.capital,
      dailyROI: plan.dailyROI,
      duration: plan.duration,
      claimedDays: 0,
      daysRemaining: plan.duration,
      totalEarned: 0,
      status: 'active',
      createdAt: FV.serverTimestamp(),
      activatedAt: FV.serverTimestamp(),
      nextClaimAt: nextClaim
    });
    
    // Update user
    batch.update(db.collection('users').doc(currentUser.uid), {
      depositBalance: FV.increment(-plan.capital),
      totalInvested: FV.increment(plan.capital),
      purchasedPlans: FV.arrayUnion(plan.id)
    });
    
    // Transaction record
    batch.set(db.collection('transactions').doc(), {
      userId: currentUser.uid,
      type: 'investment',
      amount: plan.capital,
      planId: plan.id,
      planName: plan.name,
      description: `Purchased ${plan.name} plan`,
      wallet: 'deposit',
      createdAt: FV.serverTimestamp()
    });
    
    await batch.commit();
    
    // Pay referral bonuses
    await payReferralBonuses(currentUser.uid, plan.capital, plan.name);
    
    // Update local state
    depositBalance -= plan.capital;
    purchasedPlans.add(plan.id);
    document.getElementById('depositBalance').textContent = formatCur(depositBalance);
    renderPlans();
    
    Swal.fire({
      icon: 'success',
      title: '🎉 Investment Activated!',
      html: `
        <div style="font-size: 16px; font-weight: 700; color: #10B981; margin-bottom: 8px;">${formatCur(plan.dailyROI)}</div>
        <p>Daily returns for ${plan.duration} days</p>
        <p style="margin-top: 12px;">First claim available in 24 hours</p>
      `,
      confirmButtonColor: '#3B82F6'
    });
    
  } catch (error) {
    console.error('Purchase error:', error);
    Swal.fire({ icon: 'error', title: 'Purchase Failed', text: error.message, confirmButtonColor: '#EF4444' });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   REFERRAL BONUSES
═══════════════════════════════════════════════════════════════════ */
async function payReferralBonuses(userId, amount, planName) {
  try {
    const userSnap = await db.collection('users').doc(userId).get();
    if (!userSnap.exists) return;
    
    let referrerUid = userSnap.data().referrerUid;
    if (!referrerUid || referrerUid === 'direct') return;
    
    const batch = db.batch();
    let currentUid = referrerUid;
    const levels = [
      { level: 1, percent: 0.10 },
      { level: 2, percent: 0.03 },
      { level: 3, percent: 0.01 }
    ];
    
    for (const lvl of levels) {
      if (!currentUid || currentUid === 'direct') break;
      
      const uplineSnap = await db.collection('users').doc(currentUid).get();
      if (!uplineSnap.exists) break;
      
      const bonus = Math.floor(amount * lvl.percent);
      if (bonus > 0) {
        batch.update(db.collection('users').doc(currentUid), {
          depositBalance: FV.increment(bonus),
          totalRefEarnings: FV.increment(bonus),
          totalEarnings: FV.increment(bonus),
          [`level${lvl.level}Count`]: FV.increment(1)
        });
        
        batch.set(db.collection('transactions').doc(), {
          userId: currentUid,
          type: 'referral_bonus',
          amount: bonus,
          level: lvl.level,
          fromUserId: userId,
          planName: planName,
          description: `Level ${lvl.level} (${lvl.percent * 100}%) referral bonus`,
          wallet: 'deposit',
          createdAt: FV.serverTimestamp()
        });
      }
      
      currentUid = uplineSnap.data().referrerUid;
      if (!currentUid || currentUid === 'direct') break;
    }
    
    await batch.commit();
    console.log('Referral bonuses paid');
  } catch (error) {
    console.error('Referral bonus error:', error);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   EXPORTS
═══════════════════════════════════════════════════════════════════ */
window.toggleTheme = toggleTheme;
window.purchasePlan = purchasePlan;
</script>
