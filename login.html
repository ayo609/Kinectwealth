<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · Sign In</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    /* KineticWealth Blue Color System */
    --primary:       #1E40AF;   /* Deep Blue */
    --primary-dark:  #1E3A8A;   /* Darker Blue */
    --secondary:     #3B82F6;   /* Bright Blue */
    --accent:        #06B6D4;   /* Cyan Accent */
    --accent-light:  #67E8F9;   /* Light Cyan */
    --bg-light:      #EFF6FF;   /* Ice Blue Background */
    --card-bg:       #FFFFFF;
    --text-primary:  #1E293B;
    --text-muted:    #64748B;
    --border-light:  #DBEAFE;
    --success:       #10B981;
    --danger:        #EF4444;
    --warning:       #F59E0B;
    --gradient-1:    #1E40AF;
    --gradient-2:    #3B82F6;
    --gradient-3:    #06B6D4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated Background Elements */
  .bg-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  
  .particle {
    position: absolute;
    background: var(--secondary);
    border-radius: 50%;
    opacity: 0.1;
    animation: float 20s infinite;
  }
  
  .particle:nth-child(1) { width: 300px; height: 300px; top: -50px; right: -50px; animation-delay: 0s; }
  .particle:nth-child(2) { width: 200px; height: 200px; bottom: 10%; left: -50px; animation-delay: -5s; }
  .particle:nth-child(3) { width: 150px; height: 150px; top: 50%; right: 20%; animation-delay: -10s; }
  .particle:nth-child(4) { width: 100px; height: 100px; bottom: 20%; right: 10%; animation-delay: -15s; }
  
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(50px, -50px) rotate(90deg); }
    50% { transform: translate(0, -100px) rotate(180deg); }
    75% { transform: translate(-50px, -50px) rotate(270deg); }
  }

  /* ════════════════════════════════
     MAIN CONTAINER
  ════════════════════════════════ */
  .main-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }

  .auth-wrapper {
    width: 100%;
    max-width: 480px;
    animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes slideInUp {
    from { 
      opacity: 0; 
      transform: translateY(40px);
    }
    to { 
      opacity: 1; 
      transform: translateY(0);
    }
  }

  /* ════════════════════════════════
     LOGO & BRANDING
  ════════════════════════════════ */
  .brand-section {
    text-align: center;
    margin-bottom: 32px;
  }
  
  .logo-container {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(30, 64, 175, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
  }
  
  .kw-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
    position: relative;
    overflow: hidden;
  }
  
  .kw-icon::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    top: 30%;
    left: 30%;
  }
  
  .kw-icon i {
    font-size: 24px;
    color: white;
    position: relative;
    z-index: 1;
  }
  
  .brand-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  
  .brand-tagline {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* ════════════════════════════════
     AUTH CARD
  ════════════════════════════════ */
  .auth-card {
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(30, 64, 175, 0.25);
    overflow: hidden;
    border: 1px solid rgba(59, 130, 246, 0.15);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  
  .auth-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 30px 60px -12px rgba(30, 64, 175, 0.35);
  }

  /* Card Header with Tabs */
  .card-tabs {
    display: flex;
    background: var(--bg-light);
    border-bottom: 2px solid var(--border-light);
  }
  
  .tab-btn {
    flex: 1;
    padding: 16px;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  
  .tab-btn.active {
    color: var(--primary);
    background: white;
  }
  
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 20%;
    width: 60%;
    height: 3px;
    background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2));
    border-radius: 2px;
  }
  
  .tab-btn i {
    margin-right: 8px;
  }

  .card-body {
    padding: 32px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Welcome Text */
  .welcome-text {
    text-align: center;
    margin-bottom: 8px;
  }
  
  .welcome-text h2 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  
  .welcome-text p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* Social Login Buttons */
  .social-login {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }
  
  .social-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border-light);
    border-radius: 12px;
    background: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .social-btn:hover {
    border-color: var(--secondary);
    background: var(--bg-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
  }
  
  .social-btn i {
    font-size: 18px;
  }
  
  .social-btn.google i { color: #EA4335; }
  .social-btn.apple i { color: #000000; }
  .social-btn.microsoft i { color: #00A4EF; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  /* Input Fields */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .input-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .input-label i {
    font-size: 14px;
    color: var(--secondary);
  }
  
  .input-wrapper {
    display: flex;
    align-items: center;
    background: var(--bg-light);
    border: 2px solid var(--border-light);
    border-radius: 14px;
    transition: all 0.3s;
    position: relative;
  }
  
  .input-wrapper:focus-within {
    border-color: var(--secondary);
    background: white;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  }
  
  .input-wrapper.error {
    border-color: var(--danger);
    animation: shake 0.5s;
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .input-prefix {
    padding: 14px 0 14px 16px;
    color: var(--secondary);
    font-size: 16px;
  }
  
  .input-field {
    flex: 1;
    padding: 14px 16px 14px 8px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text-primary);
    width: 100%;
  }
  
  .input-field::placeholder {
    color: var(--text-muted);
    font-weight: 400;
    opacity: 0.5;
  }
  
  .input-suffix {
    padding: 14px 16px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    background: none;
    border: none;
    transition: color 0.2s;
  }
  
  .input-suffix:hover {
    color: var(--secondary);
  }

  /* Password Strength Indicator */
  .password-strength {
    margin-top: -4px;
    display: flex;
    gap: 4px;
  }
  
  .strength-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border-light);
    transition: background 0.3s;
  }
  
  .strength-bar.weak { background: var(--danger); }
  .strength-bar.medium { background: var(--warning); }
  .strength-bar.strong { background: var(--success); }

  /* Options Row */
  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: -4px;
  }
  
  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  
  .remember-me input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--secondary);
    cursor: pointer;
  }
  
  .remember-me span {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }
  
  .forgot-link {
    font-size: 14px;
    font-weight: 600;
    color: var(--secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
  
  .forgot-link:hover {
    color: var(--primary);
    text-decoration: underline;
  }

  /* Submit Button */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
    box-shadow: 0 8px 25px rgba(30, 64, 175, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
  }
  
  .btn-primary:hover::before {
    left: 100%;
  }
  
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(30, 64, 175, 0.4);
  }
  
  .btn-primary:active {
    transform: translateY(0);
  }
  
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Signup Footer */
  .signup-footer {
    padding: 24px 28px 28px;
    text-align: center;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 500;
    border-top: 2px solid var(--border-light);
    background: var(--bg-light);
  }
  
  .signup-footer a {
    color: var(--secondary);
    font-weight: 700;
    text-decoration: none;
    transition: color 0.2s;
  }
  
  .signup-footer a:hover {
    color: var(--primary);
    text-decoration: underline;
  }

  /* Trust Indicators */
  .trust-indicators {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  
  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }
  
  .trust-item i {
    color: var(--success);
    font-size: 16px;
  }

  /* Biometric Login Feature */
  .biometric-login {
    text-align: center;
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-light);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px dashed var(--border-light);
  }
  
  .biometric-login:hover {
    border-color: var(--secondary);
    background: white;
  }
  
  .biometric-login i {
    font-size: 28px;
    color: var(--secondary);
    margin-bottom: 8px;
  }
  
  .biometric-login p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .auth-wrapper {
      max-width: 100%;
    }
    
    .card-body {
      padding: 24px 20px 20px;
    }
    
    .social-login {
      flex-direction: column;
    }
    
    .trust-indicators {
      gap: 16px;
    }
  }

  .spacer { height: 20px; }
</style>
</head>
<body>

<!-- Animated Background -->
<div class="bg-particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- MAIN CONTAINER -->
<div class="main-container">
  <div class="auth-wrapper">
    
    <!-- Brand Section -->
    <div class="brand-section">
      <div class="logo-container">
        <div class="kw-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <span class="brand-name">KineticWealth</span>
      </div>
      <p class="brand-tagline">Smart Investing · Real Growth</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      
      <!-- Tabs -->
      <div class="card-tabs">
        <button class="tab-btn active" id="loginTab">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        <button class="tab-btn" id="registerTab" onclick="window.location.href='signup.html'">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </div>

      <div class="card-body">
        
        <!-- Welcome Text -->
        <div class="welcome-text">
          <h2>Welcome Back!</h2>
          <p>Access your KineticWealth dashboard</p>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button class="social-btn google" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="social-btn apple" onclick="socialLogin('apple')">
            <i class="fab fa-apple"></i> Apple
          </button>
        </div>

        <!-- Divider -->
        <div class="divider">or continue with email</div>
        
        <!-- Email Field -->
        <div class="input-group">
          <div class="input-label">
            <i class="fas fa-envelope"></i>
            Email Address
          </div>
          <div class="input-wrapper" id="emailWrapper">
            <span class="input-prefix">
              <i class="fas fa-at"></i>
            </span>
            <input 
              type="email" 
              id="emailInput" 
              class="input-field" 
              placeholder="your@email.com"
              autocomplete="email"
              oninput="clearError('emailWrapper')"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="input-group">
          <div class="input-label">
            <i class="fas fa-lock"></i>
            Password
          </div>
          <div class="input-wrapper" id="passwordWrapper">
            <span class="input-prefix">
              <i class="fas fa-key"></i>
            </span>
            <input 
              type="password" 
              id="passwordInput" 
              class="input-field" 
              placeholder="Enter your password"
              autocomplete="current-password"
              oninput="clearError('passwordWrapper'); checkPasswordStrength()"
            />
            <button type="button" class="input-suffix" onclick="togglePassword()" id="toggleBtn">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
          <!-- Password Strength Indicator -->
          <div class="password-strength" id="passwordStrength" style="display: none;">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
          </div>
        </div>

        <!-- Options Row -->
        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe"/>
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" onclick="showForgotPassword()">
            Forgot password?
          </a>
        </div>

        <!-- Login Button -->
        <button class="btn-primary" onclick="handleLogin()" id="loginBtn">
          <i class="fas fa-arrow-right-to-bracket"></i>
          <span>Sign In to KineticWealth</span>
        </button>

        <!-- Biometric Login (New Feature) -->
        <div class="biometric-login" onclick="biometricLogin()">
          <i class="fas fa-fingerprint"></i>
          <p>Quick login with biometrics</p>
        </div>

      </div>

      <!-- Signup Footer -->
      <div class="signup-footer">
        New to KineticWealth? <a href="signup.html">Create your free account →</a>
      </div>
    </div>

    <!-- Trust Indicators -->
    <div class="trust-indicators">
      <div class="trust-item">
        <i class="fas fa-shield-halved"></i>
        <span>256-bit SSL Secure</span>
      </div>
      <div class="trust-item">
        <i class="fas fa-lock"></i>
        <span>Bank-Level Encryption</span>
      </div>
      <div class="trust-item">
        <i class="fas fa-clock"></i>
        <span>24/7 Monitoring</span>
      </div>
    </div>

  </div>
</div>

<div class="spacer"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE INIT
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCFwefJ8rxZUDLbDsRHnHdA-28zPs49rlo",
  authDomain: "cashpoint-ac4f4.firebaseapp.com",
  projectId: "cashpoint-ac4f4",
  storageBucket: "cashpoint-ac4f4.firebasestorage.app",
  messagingSenderId: "16133206416",
  appId: "1:16133206416:web:a093f4e153ad2c9bcc8315"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ═══════════════════════════════════════════════════════════════════
   UTILITY FUNCTIONS
═══════════════════════════════════════════════════════════════════ */
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('toggleIcon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function clearError(wrapperId) {
  document.getElementById(wrapperId).classList.remove('error');
}

function showError(wrapperId) {
  document.getElementById(wrapperId).classList.add('error');
}

/* ═══════════════════════════════════════════════════════════════════
   PASSWORD STRENGTH CHECKER (New Feature)
═══════════════════════════════════════════════════════════════════ */
function checkPasswordStrength() {
  const password = document.getElementById('passwordInput').value;
  const strengthDiv = document.getElementById('passwordStrength');
  const bar1 = document.getElementById('bar1');
  const bar2 = document.getElementById('bar2');
  const bar3 = document.getElementById('bar3');
  
  if (password.length === 0) {
    strengthDiv.style.display = 'none';
    return;
  }
  
  strengthDiv.style.display = 'flex';
  
  // Reset bars
  bar1.className = 'strength-bar';
  bar2.className = 'strength-bar';
  bar3.className = 'strength-bar';
  
  let strength = 0;
  
  // Length check
  if (password.length >= 8) strength++;
  
  // Contains number
  if (/\d/.test(password)) strength++;
  
  // Contains special character
  if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
  
  // Contains uppercase
  if (/[A-Z]/.test(password)) strength++;
  
  if (strength >= 3) {
    bar1.className = 'strength-bar strong';
    bar2.className = 'strength-bar strong';
    bar3.className = 'strength-bar strong';
  } else if (strength >= 2) {
    bar1.className = 'strength-bar medium';
    bar2.className = 'strength-bar medium';
  } else if (strength >= 1) {
    bar1.className = 'strength-bar weak';
  }
}

/* ═══════════════════════════════════════════════════════════════════
   FORGOT PASSWORD
═══════════════════════════════════════════════════════════════════ */
async function showForgotPassword() {
  const email = document.getElementById('emailInput').value.trim();
  
  const { value: resetEmail } = await Swal.fire({
    title: 'Reset Your Password',
    html: `
      <p style="margin-bottom: 16px; color: #64748B;">Enter your email address and we'll send you a password reset link.</p>
      <input 
        id="swalEmail" 
        class="swal2-input" 
        placeholder="your@email.com" 
        value="${email}"
        style="width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #DBEAFE;"
      />
    `,
    icon: 'info',
    confirmButtonText: 'Send Reset Link',
    confirmButtonColor: '#3B82F6',
    showCancelButton: true,
    cancelButtonText: 'Cancel',
    preConfirm: () => {
      const emailInput = document.getElementById('swalEmail').value.trim();
      if (!emailInput) {
        Swal.showValidationMessage('Please enter your email address');
        return false;
      }
      if (!emailInput.includes('@')) {
        Swal.showValidationMessage('Please enter a valid email address');
        return false;
      }
      return emailInput;
    }
  });

  if (resetEmail) {
    try {
      await auth.sendPasswordResetEmail(resetEmail);
      
      Swal.fire({
        icon: 'success',
        title: 'Reset Email Sent!',
        text: `Check ${resetEmail} for a password reset link.`,
        confirmButtonColor: '#3B82F6'
      });
    } catch (err) {
      console.error('Password reset error:', err);
      
      let msg = 'Failed to send reset email.';
      if (err.code === 'auth/user-not-found') {
        msg = 'No account found with this email address.';
      } else if (err.code === 'auth/invalid-email') {
        msg = 'Please enter a valid email address.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Too many requests. Please try again later.';
      }
      
      Swal.fire({
        icon: 'error',
        title: 'Reset Failed',
        text: msg,
        confirmButtonColor: '#EF4444'
      });
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
   HANDLE LOGIN
═══════════════════════════════════════════════════════════════════ */
async function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');

  // Reset error states
  document.getElementById('emailWrapper').classList.remove('error');
  document.getElementById('passwordWrapper').classList.remove('error');

  // Validation
  if (!email) {
    showError('emailWrapper');
    Swal.fire({
      icon: 'warning',
      title: 'Email Required',
      text: 'Please enter your email address',
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000
    });
    return;
  }

  if (!email.includes('@')) {
    showError('emailWrapper');
    Swal.fire({
      icon: 'warning',
      title: 'Invalid Email',
      text: 'Please enter a valid email address',
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000
    });
    return;
  }

  if (!password) {
    showError('passwordWrapper');
    Swal.fire({
      icon: 'warning',
      title: 'Password Required',
      text: 'Please enter your password',
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000
    });
    return;
  }

  // Show loading state
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Signing in...</span>';

  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;

    // Update last login timestamp
    try {
      await db.collection('users').doc(user.uid).update({
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        lastLoginDevice: navigator.userAgent
      });
    } catch (updateErr) {
      console.warn('Could not update last login:', updateErr.message);
    }

    // Get user name for welcome message
    let userName = 'Investor';
    try {
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (userDoc.exists) {
        const data = userDoc.data();
        userName = data.fullName || data.username || 'Investor';
      }
    } catch (docErr) {
      console.warn('Could not fetch user data:', docErr.message);
    }

    // Handle "Remember Me"
    const rememberMe = document.getElementById('rememberMe').checked;
    if (!rememberMe) {
      await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
    } else {
      await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    }

    // Show success notification
    Swal.fire({
      icon: 'success',
      title: 'Login Successful!',
      text: `Welcome back, ${userName.split(' ')[0]}! 🚀`,
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true
    });

    // Redirect to dashboard
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 800);

  } catch (err) {
    console.error('Login error:', err.code, err.message);

    // Reset button
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i><span>Sign In to KineticWealth</span>';

    let msg = 'Login failed. Please try again.';
    let title = 'Login Failed';
    
    if (err.code === 'auth/user-not-found') {
      msg = 'No account found with this email.';
      showError('emailWrapper');
    } else if (err.code === 'auth/wrong-password') {
      msg = 'Incorrect password. Please try again.';
      showError('passwordWrapper');
    } else if (err.code === 'auth/invalid-email') {
      msg = 'Invalid email address format.';
      showError('emailWrapper');
    } else if (err.code === 'auth/user-disabled') {
      msg = 'This account has been disabled. Contact support.';
    } else if (err.code === 'auth/too-many-requests') {
      msg = 'Too many failed attempts. Try again later or reset your password.';
    } else if (err.code === 'auth/network-request-failed') {
      msg = 'Network error. Check your internet connection.';
    } else if (err.code === 'auth/invalid-credential') {
      msg = 'Invalid email or password. Please check your credentials.';
      showError('emailWrapper');
      showError('passwordWrapper');
    }

    Swal.fire({
      icon: 'error',
      title: title,
      text: msg,
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 4000,
      timerProgressBar: true
    });
  }
}

document.addEventListener('keypress', (e) => {
