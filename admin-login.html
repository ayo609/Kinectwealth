<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · Admin Login</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0F172A;
  color: #F1F5F9;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated Background */
.bg-grid {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.grid-line {
  position: absolute;
  background: rgba(59, 130, 246, 0.03);
}

.grid-line:nth-child(1) { width: 1px; height: 100%; left: 20%; }
.grid-line:nth-child(2) { width: 1px; height: 100%; left: 40%; }
.grid-line:nth-child(3) { width: 1px; height: 100%; left: 60%; }
.grid-line:nth-child(4) { width: 1px; height: 100%; left: 80%; }
.grid-line:nth-child(5) { width: 100%; height: 1px; top: 25%; }
.grid-line:nth-child(6) { width: 100%; height: 1px; top: 50%; }
.grid-line:nth-child(7) { width: 100%; height: 1px; top: 75%; }

.bg-glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.bg-glow:nth-child(8) {
  width: 400px; height: 400px;
  background: #3B82F6;
  top: -100px; right: -100px;
}

.bg-glow:nth-child(9) {
  width: 300px; height: 300px;
  background: #8B5CF6;
  bottom: -80px; left: -80px;
}

/* Login Container */
.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Shield Icon */
.shield-icon {
  text-align: center;
  margin-bottom: 24px;
}

.shield-circle {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1E40AF, #3B82F6);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: white;
  box-shadow: 0 8px 30px rgba(30, 64, 175, 0.4);
  position: relative;
}

.shield-circle::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid rgba(59, 130, 246, 0.3);
  animation: pulse-ring 2s infinite;
}

@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.5; }
}

/* Login Card */
.login-card {
  background: #1E293B;
  border-radius: 24px;
  padding: 32px 28px;
  border: 1px solid rgba(59, 130, 246, 0.15);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.login-header {
  text-align: center;
  margin-bottom: 28px;
}

.login-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 800;
  color: white;
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 13px; color: #94A3B8;
}

.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 20px;
  font-size: 11px; font-weight: 700;
  color: #EF4444;
  margin-top: 10px;
}

/* Input Fields */
.input-group {
  margin-bottom: 18px;
}

.input-label {
  display: block;
  font-size: 11px; font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-icon {
  position: absolute;
  left: 14px;
  color: #64748B;
  font-size: 16px;
  z-index: 1;
}

.input-field {
  width: 100%;
  padding: 14px 18px 14px 44px;
  background: #0F172A;
  border: 2px solid rgba(59, 130, 246, 0.15);
  border-radius: 14px;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}

.input-field:focus {
  border-color: #3B82F6;
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}

.input-field::placeholder {
  color: #475569;
}

.toggle-password {
  position: absolute;
  right: 14px;
  background: none;
  border: none;
  color: #64748B;
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
}

.toggle-password:hover {
  color: #3B82F6;
}

/* Login Button */
.login-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #1E40AF, #3B82F6);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 15px; font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 25px rgba(30, 64, 175, 0.3);
  transition: all 0.3s;
  margin-top: 8px;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(30, 64, 175, 0.4);
}

.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Back Link */
.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: #64748B;
  font-size: 13px;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}

.back-link a:hover {
  color: #3B82F6;
}

/* Error Message */
.error-message {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 12px;
  padding: 12px 16px;
  color: #EF4444;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
  display: none;
}

.error-message.show {
  display: block;
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Responsive */
@media (max-width: 480px) {
  .login-card { padding: 24px 20px; }
  .login-title { font-size: 20px; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-grid">
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow"></div>
</div>

<!-- Login Form -->
<div class="login-wrapper">
  
  <!-- Shield Icon -->
  <div class="shield-icon">
    <div class="shield-circle">
      <i class="fas fa-shield-halved"></i>
    </div>
  </div>
  
  <!-- Login Card -->
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Admin Panel</h1>
      <p class="login-subtitle">KineticWealth Management</p>
      <div class="admin-badge">
        <i class="fas fa-lock"></i> Restricted Access
      </div>
    </div>
    
    <!-- Error Message -->
    <div class="error-message" id="errorMessage">
      <i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid credentials</span>
    </div>
    
    <!-- Email -->
    <div class="input-group">
      <label class="input-label">Admin Email</label>
      <div class="input-wrapper">
        <span class="input-icon"><i class="fas fa-envelope"></i></span>
        <input type="email" class="input-field" id="emailInput" 
               placeholder="admin@kineticwealth.com" autocomplete="email"
               oninput="hideError()">
      </div>
    </div>
    
    <!-- Password -->
    <div class="input-group">
      <label class="input-label">Password</label>
      <div class="input-wrapper">
        <span class="input-icon"><i class="fas fa-key"></i></span>
        <input type="password" class="input-field" id="passwordInput" 
               placeholder="Enter your password" autocomplete="current-password"
               oninput="hideError()">
        <button type="button" class="toggle-password" onclick="togglePassword()">
          <i class="fas fa-eye" id="toggleIcon"></i>
        </button>
      </div>
    </div>
    
    <!-- Login Button -->
    <button class="login-btn" onclick="adminLogin()" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i>
      <span>Sign In to Admin Panel</span>
    </button>
  </div>
  
  <!-- Back Link -->
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE INIT
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCFwefJ8rxZUDLbDsRHnHdA-28zPs49rlo",
  authDomain: "cashpoint-ac4f4.firebaseapp.com",
  projectId: "cashpoint-ac4f4",
  storageBucket: "cashpoint-ac4f4.firebasestorage.app",
  messagingSenderId: "16133206416",
  appId: "1:16133206416:web:a093f4e153ad2c9bcc8315"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ═══════════════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════════════ */
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('toggleIcon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showError(message) {
  const errorDiv = document.getElementById('errorMessage');
  document.getElementById('errorText').textContent = message;
  errorDiv.classList.add('show');
}

function hideError() {
  document.getElementById('errorMessage').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════════════════
   AUTO-REDIRECT IF ALREADY LOGGED IN AS ADMIN
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    // Check if already logged in user is admin
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().isAdmin) {
      // Already logged in as admin, redirect to panel
      window.location.href = 'admin.html';
    }
  }
});

/* ═══════════════════════════════════════════════════════════════════
   ADMIN LOGIN
═══════════════════════════════════════════════════════════════════ */
async function adminLogin() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  const password = document.getElementById('passwordInput').value;
  const loginBtn = document.getElementById('loginBtn');
  
  // Validation
  if (!email) {
    showError('Please enter your admin email address');
    return;
  }
  
  if (!email.includes('@')) {
    showError('Please enter a valid email address');
    return;
  }
  
  if (!password) {
    showError('Please enter your password');
    return;
  }
  
  // Disable button
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Authenticating...</span>';
  
  try {
    // Step 1: Sign in with Firebase Auth
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;
    
    console.log('✅ User authenticated:', user.email);
    
    // Step 2: Check if user is admin in Firestore
    const userDoc = await db.collection('users').doc(user.uid).get();
    
    if (!userDoc.exists) {
      // User document doesn't exist
      await auth.signOut();
      showError('Account not found in database');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Sign In to Admin Panel</span>';
      return;
    }
    
    const userData = userDoc.data();
    
    // Step 3: Verify admin status
    if (!userData.isAdmin) {
      // User is not an admin
      await auth.signOut();
      
      Swal.fire({
        icon: 'error',
        title: 'Access Denied',
        html: `
          <div style="font-size: 14px; line-height: 1.8;">
            <p>You do not have <strong>administrator privileges</strong>.</p>
            <p style="color: #94A3B8; font-size: 13px;">
              This panel is restricted to authorized administrators only.
            </p>
          </div>
        `,
        confirmButtonText: 'Go Back',
        confirmButtonColor: '#EF4444'
      });
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Sign In to Admin Panel</span>';
      return;
    }
    
    // Step 4: Success! Admin verified
    console.log('✅ Admin access granted:', userData.fullName || userData.username);
    console.log('👑 Role:', userData.adminRole || 'admin');
    
    // Show success toast
    Swal.fire({
      icon: 'success',
      title: 'Welcome, Admin!',
      text: `Signed in as ${userData.fullName || userData.username || 'Administrator'}`,
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 2000,
      timerProgressBar: true
    });
    
    // Redirect to admin panel
    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 500);
    
  } catch (error) {
    console.error('Login error:', error.code, error.message);
    
    let errorMessage = 'Login failed. Please try again.';
    
    if (error.code === 'auth/user-not-found') {
      errorMessage = 'No account found with this email address';
    } else if (error.code === 'auth/wrong-password') {
      errorMessage = 'Incorrect password. Please try again.';
    } else if (error.code === 'auth/invalid-email') {
      errorMessage = 'Invalid email address format';
    } else if (error.code === 'auth/user-disabled') {
      errorMessage = 'This account has been disabled';
    } else if (error.code === 'auth/too-many-requests') {
      errorMessage = 'Too many failed attempts. Please try again later.';
    } else if (error.code === 'auth/network-request-failed') {
      errorMessage = 'Network error. Check your internet connection.';
    } else if (error.code === 'auth/invalid-credential') {
      errorMessage = 'Invalid email or password';
    }
    
    showError(errorMessage);
    
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Sign In to Admin Panel</span>';
  }
}

/* ═══════════════════════════════════════════════════════════════════
   ENTER KEY SUPPORT
═══════════════════════════════════════════════════════════════════ */
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    adminLogin();
  }
});

console.log('🔐 KineticWealth Admin Login Ready');
</script>

</body>
</html>
