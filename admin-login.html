<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>KineticWealth · Admin Portal</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0A0C10;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated Gradient Background */
.bg-gradient {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 20% 50%, rgba(139,92,246,0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(59,130,246,0.1) 0%, transparent 50%);
  z-index: 0;
}

/* Floating Particles */
.particle {
  position: fixed;
  background: rgba(139,92,246,0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: float 15s infinite linear;
}

.particle:nth-child(1) { width: 3px; height: 3px; top: 20%; left: 10%; animation-duration: 12s; }
.particle:nth-child(2) { width: 5px; height: 5px; top: 60%; left: 85%; animation-duration: 18s; }
.particle:nth-child(3) { width: 2px; height: 2px; top: 80%; left: 25%; animation-duration: 10s; }
.particle:nth-child(4) { width: 4px; height: 4px; top: 40%; left: 70%; animation-duration: 14s; }
.particle:nth-child(5) { width: 3px; height: 3px; top: 15%; left: 50%; animation-duration: 20s; }
.particle:nth-child(6) { width: 6px; height: 6px; top: 75%; left: 15%; animation-duration: 16s; }
.particle:nth-child(7) { width: 2px; height: 2px; top: 30%; left: 90%; animation-duration: 11s; }
.particle:nth-child(8) { width: 4px; height: 4px; top: 85%; left: 60%; animation-duration: 13s; }

@keyframes float {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  50% { opacity: 0.5; }
  100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
}

/* Login Container */
.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Logo Section */
.logo-section {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, #8B5CF6, #3B82F6);
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(139,92,246,0.3);
}

.logo-icon i {
  font-size: 32px;
  color: white;
}

.logo-title {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #8B5CF6, #3B82F6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.logo-sub {
  font-size: 13px;
  color: #6B7280;
}

/* Admin Badge */
.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 40px;
  padding: 6px 16px;
  margin-top: 12px;
  font-size: 12px;
  font-weight: 500;
  color: #A78BFA;
}

/* Login Card */
.login-card {
  background: #13161E;
  border-radius: 32px;
  padding: 36px 28px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}

/* Input Groups */
.input-group {
  margin-bottom: 20px;
}

.input-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: #9CA3AF;
  margin-bottom: 8px;
}

.input-label i {
  font-size: 11px;
  color: #8B5CF6;
}

.input-field {
  width: 100%;
  padding: 14px 16px;
  background: #1A1D26;
  border: 1px solid #2D313E;
  border-radius: 16px;
  font-size: 14px;
  color: #F3F4F6;
  outline: none;
  transition: all 0.2s;
}

.input-field:focus {
  border-color: #8B5CF6;
  box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}

.input-field::placeholder {
  color: #4B5563;
}

/* Password Wrapper */
.password-wrapper {
  position: relative;
}

.password-wrapper .input-field {
  padding-right: 48px;
}

.toggle-eye {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #6B7280;
  cursor: pointer;
  font-size: 16px;
}

/* Login Button */
.login-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #8B5CF6, #3B82F6);
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
  transition: all 0.2s;
}

.login-btn:active {
  transform: scale(0.98);
}

.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Error Alert */
.error-alert {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 20px;
  display: none;
  align-items: center;
  gap: 10px;
}

.error-alert i {
  color: #EF4444;
  font-size: 16px;
}

.error-alert span {
  flex: 1;
  font-size: 13px;
  color: #EF4444;
}

.error-alert.show {
  display: flex;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Security Note */
.security-note {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
  font-size: 11px;
  color: #4B5563;
}

.security-note i {
  font-size: 10px;
  color: #8B5CF6;
}

/* Back Link */
.back-link {
  text-align: center;
  margin-top: 24px;
}

.back-link a {
  color: #6B7280;
  text-decoration: none;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.back-link a:hover {
  color: #8B5CF6;
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="login-container">
  
  <div class="logo-section">
    <div class="logo-icon">
      <i class="fas fa-crown"></i>
    </div>
    <div class="logo-title">KineticWealth</div>
    <div class="logo-sub">Management Portal</div>
    <div class="admin-badge">
      <i class="fas fa-shield-alt"></i> Administrator Access
    </div>
  </div>

  <div class="login-card">
    
    <div class="error-alert" id="errorAlert">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid credentials</span>
    </div>

    <div class="input-group">
      <div class="input-label">
        <i class="fas fa-envelope"></i> Admin Email
      </div>
      <input type="email" class="input-field" id="emailInput" 
             placeholder="admin@kineticwealth.com" autocomplete="email"
             oninput="hideError()">
    </div>

    <div class="input-group">
      <div class="input-label">
        <i class="fas fa-lock"></i> Password
      </div>
      <div class="password-wrapper">
        <input type="password" class="input-field" id="passwordInput" 
               placeholder="Enter your password" autocomplete="current-password"
               oninput="hideError()">
        <button class="toggle-eye" onclick="togglePassword()">
          <i class="fas fa-eye" id="toggleIcon"></i>
        </button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="adminLogin()">
      <i class="fas fa-arrow-right-to-bracket"></i>
      <span>Access Admin Panel</span>
    </button>

    <div class="security-note">
      <i class="fas fa-lock"></i>
      <span>Secure encrypted connection</span>
    </div>

  </div>

  <div class="back-link">
    <a href="login.html">
      <i class="fas fa-arrow-left"></i> Back to User Login
    </a>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   FIREBASE CONFIG - YOUR CONFIG
═══════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBl6HEVa9mUuROvnohMKzeEzzc0aTREU54",
  authDomain: "kinetic-dc8e6.firebaseapp.com",
  projectId: "kinetic-dc8e6",
  storageBucket: "kinetic-dc8e6.firebasestorage.app",
  messagingSenderId: "980527555815",
  appId: "1:980527555815:web:131ccee594e0c8f122ee42"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('toggleIcon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showError(message) {
  const alertDiv = document.getElementById('errorAlert');
  document.getElementById('errorText').textContent = message;
  alertDiv.classList.add('show');
}

function hideError() {
  document.getElementById('errorAlert').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════════════════
   CHECK EXISTING SESSION
═══════════════════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().isAdmin) {
      window.location.href = 'admin.html';
    }
  }
});

/* ═══════════════════════════════════════════════════════════════════
   ADMIN LOGIN
═══════════════════════════════════════════════════════════════════ */
async function adminLogin() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  
  if (!email) {
    showError('Enter admin email address');
    return;
  }
  if (!email.includes('@')) {
    showError('Enter valid email address');
    return;
  }
  if (!password) {
    showError('Enter your password');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Authenticating...</span>';
  
  try {
    const userCred = await auth.signInWithEmailAndPassword(email, password);
    const user = userCred.user;
    
    const userDoc = await db.collection('users').doc(user.uid).get();
    
    if (!userDoc.exists) {
      await auth.signOut();
      showError('Account not found');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> <span>Access Admin Panel</span>';
      return;
    }
    
    const userData = userDoc.data();
    
    if (!userData.isAdmin) {
      await auth.signOut();
      Swal.fire({
        icon: 'error',
        title: 'Access Denied',
        text: 'You do not have administrator privileges.',
        confirmButtonColor: '#8B5CF6'
      });
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> <span>Access Admin Panel</span>';
      return;
    }
    
    Swal.fire({
      icon: 'success',
      title: 'Welcome, Admin!',
      text: `Signed in as ${userData.fullName || userData.username || 'Administrator'}`,
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 2000
    });
    
    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 500);
    
  } catch (err) {
    console.error('Admin login error:', err.code);
    
    let msg = 'Login failed. Please try again.';
    if (err.code === 'auth/user-not-found') msg = 'No admin account found with this email';
    else if (err.code === 'auth/wrong-password') msg = 'Incorrect password';
    else if (err.code === 'auth/invalid-email') msg = 'Invalid email format';
    else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later';
    else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check connection';
    
    showError(msg);
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> <span>Access Admin Panel</span>';
  }
}

/* ═══════════════════════════════════════════════════════════════════
   ENTER KEY SUPPORT
═══════════════════════════════════════════════════════════════════ */
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    adminLogin();
  }
});
</script>

</body>
</html>
